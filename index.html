                  {rows.map((a) => {
                    const since = daysSince(a.date);
                    const urgent = typeof since === 'number' && since >= 7;
                    const ln = lessonNumberFor(a.date);
                    return (
                      <tr key={a.id} className="border-t border-navy-50 hover:bg-navy-50/30 transition">
                        <td className="px-5 py-2.5">{prettyDate(a.date)}</td>
                        <td className="px-5 py-2.5">
                          {ln != null
                            ? <span className="chip bg-navy-50 text-navy-600 border border-navy-100 !text-[10px]">Lesson {ln}</span>
                            : <span className="text-navy-300">—</span>}
                        </td>
                        <td className="px-5 py-2.5 font-mono text-navy">{a.classId}</td>
                        <td className="px-5 py-2.5 font-medium">{a.studentNickname}</td>
                        <td className="px-5 py-2.5"><AttendanceChip status={a.status} /></td>
                        <td className={`px-5 py-2.5 text-right tabular-nums ${urgent ? 'text-red-600 font-semibold' : 'text-navy-500'}`}>
                          {typeof since === 'number' ? since : ''}
                        </td>
                        <td className="px-5 py-2.5 text-right">
                          <button onClick={() => onCreateMakeup(a)} className="btn-accent !py-1 !text-xs">
                            + Log makeup
                          </button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    );
  };

  // Modal that lists makeup requests already on file. Opened by clicking the
  // "With scheduled makeup" pie chart or the count chip next to it.
  const ScheduledMakeupsDrillDown = ({ title, rows, onClose, onNavigateToRequest }) => {
    return (
      <div className="fixed inset-0 z-40 flex items-start justify-center pt-12 px-4 overflow-y-auto">
        <div className="fixed inset-0 bg-navy-900/40 backdrop-blur-[2px]" onClick={onClose} />
        <div className="relative w-full max-w-3xl card shadow-pop overflow-hidden my-6">
          <div className="px-6 py-5 border-b border-navy-50 flex items-start justify-between gap-4">
            <div>
              <div className="text-xs font-semibold uppercase tracking-[0.18em] text-leaf-600">Makeup logged</div>
              <h2 className="text-xl font-bold text-navy mt-0.5">{title}</h2>
              <p className="text-xs text-navy-400 mt-1 max-w-lg">
                {rows.length} makeup request{rows.length === 1 ? '' : 's'} on file.
                Click <strong className="text-navy">View in Makeup tab</strong> to manage them.
              </p>
            </div>
            <button onClick={onClose} className="text-navy-400 hover:text-navy w-8 h-8 rounded-md hover:bg-navy-50 flex items-center justify-center" aria-label="Close">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          {rows.length === 0 ? (
            <div className="p-10 text-center text-sm text-navy-400">No makeup requests in this view.</div>
          ) : (
            <div className="overflow-x-auto max-h-[60vh] overflow-y-auto">
              <table className="min-w-full text-sm">
                <thead className="text-xs uppercase text-navy-400 bg-navy-50/40 sticky top-0">
                  <tr>
                    <th className="text-left px-5 py-2 font-medium">Request</th>
                    <th className="text-left px-5 py-2 font-medium">Student</th>
                    <th className="text-left px-5 py-2 font-medium">Class</th>
                    <th className="text-left px-5 py-2 font-medium">Missed</th>
                    <th className="text-left px-5 py-2 font-medium">Proposed</th>
                    <th className="text-left px-5 py-2 font-medium">Status</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r) => (
                    <tr key={r.id} className="border-t border-navy-50 hover:bg-navy-50/30 transition">
                      <td className="px-5 py-2.5 font-mono text-xs text-navy-500">{r.id}</td>
                      <td className="px-5 py-2.5 font-medium">{r.studentNickname}</td>
                      <td className="px-5 py-2.5 font-mono text-navy">{r.classId}</td>
                      <td className="px-5 py-2.5">{prettyDate(r.missedDate)}</td>
                      <td className="px-5 py-2.5">{prettyDate(r.proposedDate)} {toHHMM(r.proposedTime)}</td>
                      <td className="px-5 py-2.5"><StatusBadge status={r.status} /></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          <div className="px-6 py-3 border-t border-navy-50 flex justify-end">
            <button onClick={onNavigateToRequest} className="btn-ghost !py-1.5 !text-xs">View in Makeup tab →</button>
          </div>
        </div>
      </div>
    );
  };

  const Dashboard = ({ requests, attendance, onNavigate, onNewRequest, onCreateFromAbsence }) => {
    const reqs = requests.map(r => ({ ...r, status: deriveStatus(r) }));
    const pendingTeacher       = reqs.filter(r => !r.teacherConfirmed);
    const pendingAdmin         = reqs.filter(r => r.teacherConfirmed && !r.adminApproved);
    const approvedNotScheduled = reqs.filter(r => r.adminApproved && !r.calendarEventCreated);
    const scheduled            = reqs.filter(r => r.calendarEventCreated);

    // Helper: does this absence have a corresponding makeup request? (any status counts)
    const findMakeup = (a) => reqs.find(r =>
      r.studentNickname === a.studentNickname &&
      toISODate(r.missedDate) === toISODate(a.date)
    );

    // "With scheduled makeup" = makeup requests on file. Group by reason and keep the full list
    // so the chart slices are clickable into a drill-down.
    const withMakeupByReason = {};
    for (const r of reqs) {
      const reason = r.reason || '(no reason)';
      if (!withMakeupByReason[reason]) withMakeupByReason[reason] = [];
      withMakeupByReason[reason].push(r);
    }
    const withMakeup = Object.entries(withMakeupByReason)
      .map(([reason, list]) => ({ reason, count: list.length }))
      .sort((a, b) => b.count - a.count);
    const allWithMakeup = [...reqs].sort((a, b) => (a.missedDate < b.missedDate ? 1 : -1));

    // "Without scheduled makeup" = absences in the log that DO NOT have a matching makeup request.
    // Both no-notice AND pre-notified absences are filtered out once a makeup is logged for them.
    const unmatchedByReason = { 'No notice': [], 'Pre-notified, no makeup yet': [] };
    for (const a of attendance) {
      if (a.status !== 'Absent (no notice)' && a.status !== 'Absent (pre-notified)') continue;
      if (findMakeup(a)) continue; // absence is covered by an existing makeup request
      if (a.status === 'Absent (no notice)') unmatchedByReason['No notice'].push(a);
      else                                   unmatchedByReason['Pre-notified, no makeup yet'].push(a);
    }
    const withoutMakeup = Object.entries(unmatchedByReason)
      .filter(([, list]) => list.length > 0)
      .map(([reason, list]) => ({ reason, count: list.length }))
      .sort((a, b) => b.count - a.count);
    const allUnmatched = [...unmatchedByReason['No notice'], ...unmatchedByReason['Pre-notified, no makeup yet']]
      .sort((a, b) => (a.date < b.date ? 1 : -1));

    // Drill-down modal state — one for the "needs follow-up" pie, one for the "already logged" pie.
    const [detailReason, setDetailReason] = React.useState(null);
    const detailRows = detailReason === '__all__'
      ? allUnmatched
      : (detailReason ? (unmatchedByReason[detailReason] || []) : []);

    const [scheduledReason, setScheduledReason] = React.useState(null);
    const scheduledRows = scheduledReason === '__all__'
      ? allWithMakeup
      : (scheduledReason ? (withMakeupByReason[scheduledReason] || []) : []);

    const StatCard = ({ label, value, tone, onClick }) => {
      const accents = { sun:'border-l-sun', sky:'border-l-sky', leaf:'border-l-leaf', navy:'border-l-navy' };
      return (
        <button onClick={onClick} className={`card p-5 border-l-4 ${accents[tone]} text-navy text-left hover:shadow-pop transition`}>
          <div className="text-xs uppercase tracking-wider text-navy-400 font-semibold">{label}</div>
          <div className="text-3xl font-bold mt-1">{value}</div>
        </button>
      );
    };

    return (
      <div className="space-y-8">
        <SectionHeader
          eyebrow="Welcome to MMT"
          title="Operations Dashboard"
          description="Live snapshot of makeup requests across all stages. Click a stat to filter the list."
          action={<button onClick={onNewRequest} className="btn-accent">+ New Makeup Request</button>}
        />

        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          <StatCard label="Pending Teacher"            value={pendingTeacher.length}       tone="sun"  onClick={() => onNavigate('makeup', 'pending-teacher')} />
          <StatCard label="Pending Admin"              value={pendingAdmin.length}         tone="sky"  onClick={() => onNavigate('makeup', 'pending-admin')} />
          <StatCard label="Approved · Not on Calendar" value={approvedNotScheduled.length} tone="leaf" onClick={() => onNavigate('makeup', 'approved-not-scheduled')} />
          <StatCard label="Scheduled"                  value={scheduled.length}            tone="navy" onClick={() => onNavigate('makeup', 'scheduled')} />
        </div>

        <div>
          <div className="flex items-end justify-between mb-3 flex-wrap gap-2">
            <div>
              <h2 className="font-semibold text-navy text-lg">Absence summary · last 30 days</h2>
              <p className="text-xs text-navy-400">Hover a slice or legend row to focus a reason.</p>
            </div>
            <div className="text-xs text-navy-400 flex items-center gap-1.5">
              <span className="live-dot" /> live from Sheet
            </div>
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div className="card p-5">
              <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
                <div>
                  <div className="text-xs uppercase tracking-wider font-semibold text-leaf-600">With scheduled makeup</div>
                  <div className="text-sm text-navy-400">Absences where a makeup class has been logged. <em className="text-navy-500">Click the chart to see who.</em></div>
                </div>
                <button
                  onClick={() => allWithMakeup.length > 0 && setScheduledReason('__all__')}
                  disabled={allWithMakeup.length === 0}
                  className="chip bg-leaf-100 text-leaf-600 border border-leaf-200 hover:bg-leaf-200 transition disabled:cursor-default disabled:hover:bg-leaf-100"
                  title={allWithMakeup.length > 0 ? 'View all students' : 'No makeup requests yet'}
                >
                  {withMakeup.reduce((a, b) => a + b.count, 0)} absences
                </button>
              </div>
              <PieChart data={withMakeup} onSliceClick={(reason) => setScheduledReason(reason)} />
            </div>

            <div className="card p-5">
              <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
                <div>
                  <div className="text-xs uppercase tracking-wider font-semibold text-red-500">Without scheduled makeup</div>
                  <div className="text-sm text-navy-400">Absences with no makeup logged — action needed. <em className="text-navy-500">Click the chart to see who.</em></div>
                </div>
                <button
                  onClick={() => allUnmatched.length > 0 && setDetailReason('__all__')}
                  disabled={allUnmatched.length === 0}
                  className="chip bg-red-100 text-red-700 border border-red-200 hover:bg-red-200 transition disabled:cursor-default disabled:hover:bg-red-100"
                  title={allUnmatched.length > 0 ? 'View all students' : 'No absences to show'}
                >
                  {withoutMakeup.reduce((a, b) => a + b.count, 0)} absences
                </button>
              </div>
              <PieChart data={withoutMakeup} onSliceClick={(reason) => setDetailReason(reason)} />
            </div>
          </div>
        </div>

        <div className="card overflow-hidden">
          <div className="px-5 py-4 border-b border-navy-50 flex items-center justify-between">
            <div>
              <h2 className="font-semibold text-navy">Awaiting action</h2>
              <p className="text-xs text-navy-400">Requests that need someone on staff to move them forward.</p>
            </div>
            <button onClick={() => onNavigate('makeup')} className="text-sm text-sky hover:underline">See all →</button>
          </div>
          <div className="divide-y divide-navy-50">
            {[...pendingTeacher, ...pendingAdmin, ...approvedNotScheduled].slice(0, 8).map(r => (
              <button key={r.id} onClick={() => onNavigate('makeup')}
                className="w-full flex items-center justify-between px-5 py-3 hover:bg-navy-50/40 transition text-left gap-3">
                <div className="min-w-0">
                  <div className="font-medium text-navy flex items-baseline gap-2 flex-wrap">
                    <span>{r.studentNickname}</span>
                    <span className="text-navy-300 font-normal">· {r.classId}</span>
                    <span className="chip bg-navy-50 text-navy-600 border border-navy-100 !text-[10px] !uppercase tracking-wider">Lesson {r.lesson}</span>
                  </div>
                  <div className="text-xs text-navy-400 mt-0.5">
                    Missed {prettyDate(r.missedDate)} → Proposed {prettyDate(r.proposedDate)} {toHHMM(r.proposedTime)} · {r.teacher}
                  </div>
                </div>
                <StatusBadge status={r.status} />
              </button>
            ))}
            {pendingTeacher.length + pendingAdmin.length + approvedNotScheduled.length === 0 && (
              <div className="p-6 text-sm text-navy-400">Inbox zero. Nothing pending. ✨</div>
            )}
          </div>
        </div>

        {detailReason && (
          <AbsencesDrillDown
            title={detailReason === '__all__' ? 'All absences needing makeup' : detailReason}
            rows={detailRows}
            onClose={() => setDetailReason(null)}
            onCreateMakeup={(a) => { setDetailReason(null); onCreateFromAbsence?.(a); }}
          />
        )}

        {scheduledReason && (
          <ScheduledMakeupsDrillDown
            title={scheduledReason === '__all__' ? 'All absences with a makeup logged' : `Reason: ${scheduledReason}`}
            rows={scheduledRows}
            onClose={() => setScheduledReason(null)}
            onNavigateToRequest={() => { setScheduledReason(null); onNavigate('makeup'); }}
          />
        )}
      </div>
    );
  };

  // ============================================================
  // MAKEUP — modal + card + list
  // ============================================================
  const MakeupModal = ({ onSubmit, onClose, initial = null }) => {
    // Only treat the call as "editing" when the pre-filled object has an id.
    // A prefill from an absence (no id) should open the modal in new-request mode.
    const isEdit = Boolean(initial?.id);
    const [classId, setClassId] = React.useState(initial?.classId ?? '');
    const [student, setStudent] = React.useState(initial?.studentNickname ?? '');
    const [teacher, setTeacher] = React.useState(initial?.teacher ?? '');
    const [lesson, setLesson]   = React.useState(initial?.lesson != null ? String(initial.lesson) : '');
    const [missedDate, setMissedDate] = React.useState(toISODate(initial?.missedDate) || todayISO());
    const [propDate, setPropDate]     = React.useState(toISODate(initial?.proposedDate) || todayISO());
    const [propTime, setPropTime]     = React.useState(toHHMM(initial?.proposedTime) || '10:00');
    const [reason, setReason]   = React.useState(initial?.reason ?? '');
    const [notes, setNotes]     = React.useState(initial?.notes ?? '');
    const [err, setErr] = React.useState('');

    const defaultTeacher = classId ? (CLASSES.find((c) => c.id === classId)?.teacher ?? '') : '';
    const skipFirstReset = React.useRef(isEdit);
    React.useEffect(() => {
      if (skipFirstReset.current) { skipFirstReset.current = false; return; }
      setTeacher(defaultTeacher);
      setStudent('');
    /* eslint-disable-line */ }, [classId]);
    const studentsForClass = classId ? (STUDENTS_BY_CLASS[classId] ?? []) : [];

    // When the missed date falls on a workshop/break week there's no lesson to make up.
    // Disable the lesson input entirely so the user can't enter a misleading number.
    const missedNonLesson = nonLessonReason(missedDate);
    const lessonDisabled  = !!missedNonLesson && (missedNonLesson.reason === 'workshop' || missedNonLesson.reason === 'break');

    // Auto-fill the Lesson field from the Missed Date when the user hasn't typed in it manually.
    // Pre-existing edits (initial.lesson set) are respected. Clears the field if the date moves
    // onto a workshop/break week.
    const lessonTouched = React.useRef(Boolean(initial?.lesson));
    React.useEffect(() => {
      if (lessonDisabled) { setLesson(''); return; }
      if (lessonTouched.current) return;
      const computed = lessonNumberFor(missedDate);
      if (computed != null) setLesson(String(computed));
    }, [missedDate, lessonDisabled]);

    function submit(e) {
      e.preventDefault();
      // Lesson is only required when there *is* a lesson on the missed date.
      const lessonOk = lessonDisabled || !!lesson;
      if (!classId || !student || !teacher || !lessonOk || !reason) {
        setErr('Please fill in class, student, teacher, lesson number, and reason.');
        return;
      }
      setErr('');
      onSubmit({
        classId, studentNickname: student, teacher,
        lesson: Number(lesson), missedDate,
        proposedDate: propDate, proposedTime: propTime,
        reason, notes,
      });
    }

    return (
      <div className="fixed inset-0 z-40 flex items-start justify-center pt-16 px-4 overflow-y-auto">
        <div className="fixed inset-0 bg-navy-900/40 backdrop-blur-[2px]" onClick={onClose} />
        <div className="relative w-full max-w-2xl card shadow-pop overflow-hidden my-6">
          <div className="px-6 py-5 border-b border-navy-50 flex items-start justify-between gap-4">
            <div>
              <div className="text-xs font-semibold uppercase tracking-[0.18em] text-leaf">Makeup Requests</div>
              <h2 className="text-xl font-bold text-navy mt-0.5">{isEdit ? `Edit ${initial.id}` : 'New makeup request'}</h2>
              <p className="text-xs text-navy-400 mt-1 max-w-md">
                {isEdit
                  ? 'Update any details that were logged incorrectly. Approval flags are preserved.'
                  : 'Parents request via WhatsApp — staff log it here. Teacher confirms, then the admin manager approves.'}
              </p>
            </div>
            <button onClick={onClose} className="text-navy-400 hover:text-navy w-8 h-8 rounded-md hover:bg-navy-50 flex items-center justify-center" aria-label="Close">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>

          <form className="p-6 grid gap-5" onSubmit={submit}>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label className="label">Class</label>
                <select className="input" value={classId} onChange={(e)=>setClassId(e.target.value)}>
                  <option value="">Select class…</option>
                  {sortedClasses().map((c) => (
                    <option key={c.id} value={c.id}>{c.slot} · {c.id} · {c.teacher}</option>
                  ))}
                </select>
              </div>
              <div>
                <label className="label">Student nickname</label>
                <select className="input disabled:bg-navy-50/50 disabled:text-navy-300"
                  value={student} onChange={(e)=>setStudent(e.target.value)} disabled={!classId}>
                  <option value="">{classId ? 'Select student…' : 'Pick a class first'}</option>
                  {studentsForClass.map((s) => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>

              <div>
                <label className="label">Teacher to confirm</label>
                <select className="input disabled:bg-navy-50/50 disabled:text-navy-300"
                  value={teacher} onChange={(e)=>setTeacher(e.target.value)} disabled={!classId}>
                  <option value="">{classId ? 'Select teacher…' : 'Pick a class first'}</option>
                  {TEACHERS.map((t) => (
                    <option key={t} value={t}>{t}{t === defaultTeacher ? ' (class teacher)' : ''}</option>
                  ))}
                </select>
              </div>
              <div>
                <label className="label">Lesson number missed</label>
                <input
                  type="number" min="1" max={MMT_CONFIG.TOTAL_LESSONS || 36}
                  className={`input ${lessonDisabled ? '!bg-navy-50/60 !text-navy-400 !cursor-not-allowed' : ''}`}
                  placeholder={lessonDisabled ? '— no lesson this week —' : 'auto-filled from missed date'}
                  value={lessonDisabled ? '' : lesson}
                  disabled={lessonDisabled}
                  onChange={(e)=>{ if (lessonDisabled) return; lessonTouched.current = true; setLesson(e.target.value); }}
                />
                {lessonDisabled && (
                  <div className="text-[11px] text-navy-400 mt-1">
                    Missed date is in a <strong className="text-navy-600">{missedNonLesson.reason}</strong> week
                    {missedNonLesson.label ? ` (${missedNonLesson.label})` : ''} — no lesson to make up.
                  </div>
                )}
              </div>

              <div>
                <label className="label">Missed date</label>
                <input type="date" className="input" value={missedDate} onChange={(e)=>setMissedDate(e.target.value)} />
              </div>
              <div>
                <label className="label">Proposed makeup date</label>
                <input type="date" className="input" value={propDate} onChange={(e)=>setPropDate(e.target.value)} />
              </div>
              <div>
                <label className="label">Proposed time (24h, Bangkok)</label>
                <input type="time" className="input" value={propTime} onChange={(e)=>setPropTime(e.target.value)} />
              </div>
              <div />
            </div>

            <div>
              <label className="label">Reason</label>
              <select className="input" value={reason} onChange={(e)=>setReason(e.target.value)}>
                <option value="">Select reason…</option>
                {REASONS.map((r) => <option key={r} value={r}>{r}</option>)}
              </select>
            </div>

            <div>
              <label className="label">Notes (optional)</label>
              <textarea rows={3} className="input" placeholder="Anything Ploy or the teacher should know" value={notes} onChange={(e)=>setNotes(e.target.value)} />
            </div>

            {err && <div className="text-sm text-red-600 bg-red-50 rounded-md p-3 border border-red-100">{err}</div>}

            <div className="flex items-center justify-between gap-2 pt-1 flex-wrap">
              <p className="text-xs text-navy-400 max-w-sm">
                {isEdit
                  ? <>Editing <strong>{initial.id}</strong>. Approval status is unchanged.</>
                  : <>Status will start at <em>Pending teacher approval</em>. All makeup classes are <strong>1.5 hours</strong>.</>}
              </p>
              <div className="flex gap-2">
                <button type="button" onClick={onClose} className="btn-ghost">Cancel</button>
                <button type="submit" className="btn-primary">{isEdit ? 'Save changes' : 'Submit request'}</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    );
  };

  const MakeupCard = ({ request: r, onUpdate, onEdit, onDelete, attended }) => {
    const status = deriveStatus(r);
    const calendarUrl = buildCalendarUrl(r);
    return (
      <article className={['card p-5 transition', r.calendarEventCreated ? 'bg-navy-50/40' : ''].join(' ')}>
        <header className="flex items-start justify-between gap-4 flex-wrap">
          <div>
            <div className="flex items-baseline gap-2 flex-wrap">
              <h3 className="text-lg font-semibold text-navy">{r.studentNickname}</h3>
              <span className="text-sm text-navy-400">· {r.classId}</span>
              <span className="chip bg-navy-50 text-navy-600 border border-navy-100 !text-[10px] !uppercase tracking-wider">Lesson {r.lesson}</span>
              <span className="text-xs text-navy-300">· {r.teacher}</span>
            </div>
            <p className="text-sm text-navy-500 mt-0.5">
              Missed <strong>{prettyDate(r.missedDate)}</strong> → Proposed <strong>{prettyDate(r.proposedDate)} {toHHMM(r.proposedTime)}</strong>{' '}
              <span className="text-navy-300">· 1.5h</span>
            </p>
          </div>
          <div className="flex flex-col items-end gap-1.5">
            <StatusBadge status={status} />
            {/* Makeup-attendance status: only meaningful once admin-approved/scheduled. */}
            {r.adminApproved && (
              attended
                ? <span className="chip bg-leaf-100 text-leaf-600 border border-leaf-200 !text-[10px] inline-flex items-center gap-1">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    Makeup attended
                  </span>
                : <span className="chip bg-sun-100 text-navy-700 border border-sun-300 !text-[10px]">Awaiting makeup</span>
            )}
          </div>
        </header>

        {(r.reason || r.notes) && (
          <div className="mt-3 text-sm text-navy-600 bg-navy-50/60 rounded-lg p-3">
            {r.reason && <div><strong>Reason:</strong> {r.reason}</div>}
            {r.notes && <div className="text-navy-500 mt-1">{r.notes}</div>}
          </div>
        )}

        <div className="mt-4 flex flex-wrap gap-2 items-center">
          {!r.teacherConfirmed && (
            <button className="btn-info" onClick={() => onUpdate(r.id, { teacherConfirmed: true })}>Teacher confirm</button>
          )}
          {r.teacherConfirmed && !r.adminApproved && (
            <button className="btn-success" onClick={() => onUpdate(r.id, { adminApproved: true })}>Admin Manager approve</button>
          )}
          {r.adminApproved && !r.calendarEventCreated && (
            <>
              {/* Opening the calendar template auto-marks the request as scheduled. */}
              <a href={calendarUrl} target="_blank" rel="noopener noreferrer" className="btn-accent"
                 onClick={() => onUpdate(r.id, { calendarEventCreated: true })}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                + Add to Google Calendar
              </a>
              <span className="text-[11px] font-mono text-navy-400 ml-1 truncate max-w-[280px]" title={`[MAKEUP - ${r.classId}] ${r.studentNickname} - Lesson ${r.lesson}`}>
                [MAKEUP - {r.classId}] {r.studentNickname} - Lesson {r.lesson}
              </span>
            </>
          )}
          {r.calendarEventCreated && (
            <span className="text-xs text-leaf-600 font-medium flex items-center gap-1.5">
              <span className="w-2 h-2 rounded-full bg-leaf" /> On calendar · all done
            </span>
          )}
          <div className="ml-auto flex items-center gap-1.5">
            <button
              onClick={() => onEdit?.(r)}
              className="text-navy-400 hover:text-navy w-8 h-8 rounded-md hover:bg-navy-50 flex items-center justify-center transition"
              aria-label={`Edit ${r.id}`}
              title="Edit request"
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </button>
            <button
              onClick={() => onDelete?.(r)}
              className="text-navy-400 hover:text-red-500 w-8 h-8 rounded-md hover:bg-red-50 flex items-center justify-center transition"
              aria-label={`Delete ${r.id}`}
              title="Delete request"
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
            </button>
            <div className="text-xs text-navy-300 font-mono pl-1">{r.id}</div>
          </div>
        </div>
      </article>
    );
  };

  const FILTERS = [
    { id: 'all', label: 'All' },
    { id: 'pending-teacher', label: 'Pending teacher' },
    { id: 'pending-admin', label: 'Pending admin' },
    { id: 'approved-not-scheduled', label: 'Approved · need calendar' },
    { id: 'scheduled', label: 'Scheduled · all' },
    { id: 'scheduled-attended', label: 'Scheduled · attended' },
    { id: 'scheduled-awaiting', label: 'Scheduled · awaiting' },
  ];

  const MakeupList = ({ requests, attendance = [], onUpdateRequest, onEditRequest, onDeleteRequest, onNewRequest, initialFilter = 'all', onToast }) => {
    const [filter, setFilter] = React.useState(initialFilter);
    const [query, setQuery]   = React.useState('');
    React.useEffect(() => setFilter(initialFilter), [initialFilter]);

    // A makeup request is "attended" when the student has logged a makeup-attendee row for the
    // missed lesson — NOT tied to the exact proposed calendar date (makeups often shift days).
    // We pair each student's approved requests (oldest missed lesson first) with their
    // makeup-attendee rows (earliest first): the i-th makeup fulfils the i-th outstanding miss.
    const attendedRequestIds = React.useMemo(() => {
      // Makeup-attendee dates per student, ascending.
      const rowsByStudent = {};
      for (const a of attendance) {
        if (a.status !== 'Makeup attendee') continue;
        const k = a.studentNickname;
        if (!rowsByStudent[k]) rowsByStudent[k] = [];
        rowsByStudent[k].push(toISODate(a.date));
      }
      for (const k in rowsByStudent) rowsByStudent[k].sort();

      // Approved requests per student.
      const reqByStudent = {};
      for (const r of requests) {
        if (!r.adminApproved) continue;
        const k = r.studentNickname;
        if (!reqByStudent[k]) reqByStudent[k] = [];
        reqByStudent[k].push(r);
      }

      const attended = new Set();
      for (const student in reqByStudent) {
        const reqs = reqByStudent[student].slice().sort((x, y) =>
          toISODate(x.missedDate).localeCompare(toISODate(y.missedDate)));
        const dates = rowsByStudent[student] || [];
        const n = Math.min(reqs.length, dates.length);
        for (let i = 0; i < n; i++) attended.add(reqs[i].id);
      }
      return attended;
    }, [attendance, requests]);
    const isAttended = (r) => attendedRequestIds.has(r.id);

    function filtered() {
      // Sort newest-first across every sub-tab. MR IDs are sequential ('MR-0001', 'MR-0142',
      // …) so we sort by the numeric suffix descending; fall back to timestamp / proposed
      // date for any rows that lack a parseable id.
      let base = requests.slice().sort((a, b) => {
        const an = parseInt(String(a.id || '').replace(/\D/g, ''), 10);
        const bn = parseInt(String(b.id || '').replace(/\D/g, ''), 10);
        if (!isNaN(an) && !isNaN(bn) && an !== bn) return bn - an;
        const at = String(a.timestamp || a.proposedDate || a.missedDate || '');
        const bt = String(b.timestamp || b.proposedDate || b.missedDate || '');
        if (at !== bt) return at < bt ? 1 : -1;
        return 0;
      });
      if (filter === 'pending-teacher')             base = base.filter(r => !r.teacherConfirmed);
      else if (filter === 'pending-admin')          base = base.filter(r => r.teacherConfirmed && !r.adminApproved);
      else if (filter === 'approved-not-scheduled') base = base.filter(r => r.adminApproved && !r.calendarEventCreated);
      else if (filter === 'scheduled')              base = base.filter(r => r.calendarEventCreated);
      else if (filter === 'scheduled-attended')     base = base.filter(r => r.calendarEventCreated && isAttended(r));
      else if (filter === 'scheduled-awaiting')     base = base.filter(r => r.calendarEventCreated && !isAttended(r));
      if (query.trim()) {
        const q = query.toLowerCase();
        base = base.filter(r =>
          r.studentNickname.toLowerCase().includes(q) ||
          r.classId.toLowerCase().includes(q) ||
          r.teacher.toLowerCase().includes(q));
      }
      return base;
    }

    function handleExport(from, to) {
      const inRange = (d) => d >= from && d <= to;
      const matches = requests.filter(r => inRange(toISODate(r.missedDate)) || inRange(toISODate(r.proposedDate)));
      const rows = [
        ['Request ID','Class','Student','Lesson missed','Teacher','Missed date','Proposed date','Proposed time','Reason','Status','Attended?','Notes'],
        ...matches.map(r => [
          r.id, r.classId, r.studentNickname,
          r.lesson != null ? r.lesson : (lessonNumberFor(r.missedDate) ?? ''),
          r.teacher,
          toISODate(r.missedDate),
          toISODate(r.proposedDate),
          toHHMM(r.proposedTime),
          r.reason,
          deriveStatus(r),
          // Only meaningful for admin-approved / scheduled rows
          r.adminApproved ? (isAttended(r) ? 'Yes' : 'No') : '',
          r.notes || '',
        ])
      ];
      downloadCsv(`makeup-requests_${from}_to_${to}.csv`, rows);
      onToast?.(`Exported ${matches.length} makeup request${matches.length === 1 ? '' : 's'} (${from} → ${to})`);
    }

    const rows = filtered();

    return (
      <div className="space-y-6">
        <SectionHeader
          eyebrow="Workflow"
          title="Makeup Requests"
          description="Submit, approve, and schedule makeup classes. All classes are 1.5 hours."
          action={<button className="btn-accent" onClick={onNewRequest}>+ New Request</button>}
        />

        <div className="flex flex-wrap items-center gap-2">
          {FILTERS.map(f => (
            <button key={f.id} onClick={() => setFilter(f.id)}
              className={[
                'px-3 py-1.5 rounded-full text-xs font-medium transition',
                f.id === filter ? 'bg-navy text-white' : 'bg-white text-navy-600 border border-navy-100 hover:bg-navy-50'
              ].join(' ')}>{f.label}</button>
          ))}
          <input value={query} onChange={(e)=>setQuery(e.target.value)} className="input ml-auto max-w-xs" placeholder="Search by student, class, teacher…" />
        </div>

        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="text-xs text-navy-400">
            Showing <strong className="text-navy">{rows.length}</strong> of {requests.length} requests
          </div>
          <ExportRange label="makeup requests" onExport={handleExport} />
        </div>

        <div className="grid gap-3">
          {rows.map(r => <MakeupCard key={r.id} request={r} attended={isAttended(r)} onUpdate={onUpdateRequest} onEdit={onEditRequest} onDelete={onDeleteRequest} />)}
          {rows.length === 0 && (
            <div className="card p-10 text-center text-sm text-navy-400">No requests in this view.</div>
          )}
        </div>
      </div>
    );
  };

  // ============================================================
  // ATTENDANCE — weekly tracker + log roster + recent log
  // ============================================================
  const STATUS_BTNS = ['Present', 'Absent (no notice)', 'Absent (pre-notified)'];

  const AttendanceChip = ({ status }) => {
    const map = {
      'Present':               'bg-leaf-100 text-leaf-600 border border-leaf-200',
      'Absent (no notice)':    'bg-red-100 text-red-700 border border-red-200',
      'Absent (pre-notified)': 'bg-sky-100 text-sky-600 border border-sky-200',
      'Makeup attendee':       'bg-sun-100 text-navy-700 border border-sun-300',
      'Trial':                 'bg-navy-50 text-navy-600 border border-navy-100',
      'Workshop attendee':     'bg-sky-50 text-sky-700 border border-sky-200',
    };
    return <span className={`chip ${map[status] ?? ''}`}>{status}</span>;
  };

  // Special class-ID markers for non-regular sessions.
  const OFF_SCHEDULE_ID = 'OFF-SCHEDULE';
  const WORKSHOP_ID     = 'WORKSHOP';
  const TRIAL_ID        = 'TRIAL';
  const isSpecialClassId = (id) => id === OFF_SCHEDULE_ID || id === WORKSHOP_ID || id === TRIAL_ID;
  const displayClassId = (id) =>
    id === OFF_SCHEDULE_ID ? 'Off-schedule'
    : id === WORKSHOP_ID   ? 'Workshop'
    : id === TRIAL_ID      ? 'Trial walk-in'
    : id;

  // Week starts on Saturday for MMT. Order used when sorting classes/dropdowns by day-of-week.
  const DAY_ORDER = { Sat: 0, Sun: 1, Mon: 2, Tue: 3, Wed: 4, Thu: 5, Fri: 6 };
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']; // index 0..6 from Date.getDay()
  function sortedClasses(list) {
    return [...(list ?? CLASSES)].sort((a, b) => {
      const dayDiff = (DAY_ORDER[a.day] ?? 99) - (DAY_ORDER[b.day] ?? 99);
      if (dayDiff !== 0) return dayDiff;
      const timeDiff = (a.time || '').localeCompare(b.time || '');
      if (timeDiff !== 0) return timeDiff;
      return (a.id || '').localeCompare(b.id || '');
    });
  }
  function fmtDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  // Always returns today's local date in YYYY-MM-DD. Used as the default for every date picker
  // so they reflect the real "today" instead of a stale config value.
  function todayISO() { return fmtDate(new Date()); }
  function daysAgoISO(n) { const d = new Date(); d.setDate(d.getDate() - n); return fmtDate(d); }

  // Coerce any inbound date representation (ISO, JS Date.toString, long locale string,
  // partial ISO with time, etc.) into a clean 'YYYY-MM-DD' string. Returns '' if empty.
  function toISODate(v) {
    if (v == null) return '';
    const s = String(v).trim();
    if (!s) return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const iso = s.match(/^(\d{4}-\d{2}-\d{2})T/);
    if (iso) return iso[1];
    const d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return fmtDate(d);
  }

  // Coerce any inbound time representation into a clean 'HH:MM' string.
  function toHHMM(v) {
    if (v == null) return '';
    const s = String(v).trim();
    if (!s) return '';
    const hm = s.match(/^(\d{1,2}):(\d{2})/);
    if (hm) return `${hm[1].padStart(2,'0')}:${hm[2]}`;
    const isoT = s.match(/T(\d{2}):(\d{2})/);
    if (isoT) return `${isoT[1]}:${isoT[2]}`;
    const d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  // Pretty-print 'YYYY-MM-DD' as 'Wed 20 May 2026'.
  const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function prettyDate(v) {
    const iso = toISODate(v);
    if (!/^\d{4}-\d{2}-\d{2}$/.test(iso)) return iso || '';
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d.getTime())) return iso;
    return `${DAY_NAMES[d.getDay()]} ${d.getDate()} ${MONTH_SHORT[d.getMonth()]} ${d.getFullYear()}`;
  }
  // Pretty-print a date + time pair as 'Tue 19 May, 15:30'. No year, no timezone.
  function prettyDateTime(dateV, timeV) {
    const hhmm = toHHMM(timeV);
    const iso = toISODate(dateV);
    if (!/^\d{4}-\d{2}-\d{2}$/.test(iso)) return hhmm;
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d.getTime())) return hhmm;
    const datePart = `${DAY_NAMES[d.getDay()]} ${d.getDate()} ${MONTH_SHORT[d.getMonth()]}`;
    return hhmm ? `${datePart}, ${hhmm}` : datePart;
  }

  // Apply a settings object (from the backend Settings tab) onto MMT_CONFIG so the
  // calendar-aware helpers (lessonNumberFor etc.) use the live values from the Sheet.
  // Safe to call multiple times; missing keys leave defaults intact.
  function applySettingsToConfig(settings) {
    if (!settings || typeof settings !== 'object') return;
    if (settings['academic.label'])           MMT_CONFIG.ACADEMIC_LABEL       = settings['academic.label'];
    if (settings['academic.yearStart'])       MMT_CONFIG.ACADEMIC_YEAR_START  = settings['academic.yearStart'];
    if (settings['academic.totalLessons']) {
      const n = parseInt(settings['academic.totalLessons'], 10);
      if (!isNaN(n) && n > 0) MMT_CONFIG.TOTAL_LESSONS = n;
    }
    if (Array.isArray(settings['academic.breaks'])) {
      MMT_CONFIG.ACADEMIC_BREAKS = settings['academic.breaks']
        .map(b => (b && b.date) ? String(b.date) : '')
        .filter(Boolean);
      MMT_CONFIG.ACADEMIC_BREAK_LABELS = {};
      MMT_CONFIG.ACADEMIC_BREAK_TYPES = {};
      settings['academic.breaks'].forEach(b => {
        if (b && b.date) {
          MMT_CONFIG.ACADEMIC_BREAK_LABELS[b.date] = b.label || '';
          MMT_CONFIG.ACADEMIC_BREAK_TYPES[b.date] = (String(b.type || 'break').toLowerCase() === 'workshop') ? 'workshop' : 'break';
        }
      });
    }
    if (Array.isArray(settings['academic.closures'])) {
      // Per-Monday (or any-date) open/close overrides on top of the default "Mondays closed" rule.
      MMT_CONFIG.ACADEMIC_CLOSURES = settings['academic.closures']
        .filter(c => c && c.date)
        .map(c => ({ date: String(c.date), state: (String(c.state || c.label || 'open').toLowerCase() === 'closed') ? 'closed' : 'open' }));
    }
    if (Array.isArray(settings['academic.holidays'])) {
      // Holidays close the centre that day; events are informational (centre stays open).
      MMT_CONFIG.ACADEMIC_HOLIDAYS = settings['academic.holidays']
        .filter(h => h && h.date)
        .map(h => ({ date: String(h.date), label: String(h.label || ''), kind: (String(h.kind || 'holiday').toLowerCase() === 'event') ? 'event' : 'holiday' }));
      MMT_CONFIG.ACADEMIC_HOLIDAY_LABELS = {};
      MMT_CONFIG.ACADEMIC_HOLIDAYS.forEach(h => { MMT_CONFIG.ACADEMIC_HOLIDAY_LABELS[h.date] = h.label || ''; });
    }
  }

  // Compute the lesson number (1..TOTAL_LESSONS) for a given date, skipping ACADEMIC_BREAKS.
  // Returns null for dates before Lesson 1, dates on break weeks, or dates after the last lesson.
  function lessonNumberFor(dateV) {
    const iso = toISODate(dateV);
    if (!iso) return null;
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d.getTime())) return null;
    const start = new Date((MMT_CONFIG.ACADEMIC_YEAR_START || '2025-09-13') + 'T00:00:00');
    if (d < start) return null;
    // Find the Saturday of the week containing this date.
    const dow = d.getDay(); // 0=Sun … 6=Sat
    const daysBack = (dow + 1) % 7;
    const sat = new Date(d); sat.setDate(d.getDate() - daysBack);
    const satISO = fmtDate(sat);
    const breaks = new Set(MMT_CONFIG.ACADEMIC_BREAKS || []);
    if (breaks.has(satISO)) return null;
    // Iterate Saturdays from start, counting non-break weeks until we reach this week.
    const totalLessons = MMT_CONFIG.TOTAL_LESSONS || 36;
    let lesson = 0;
    const iter = new Date(start);
    while (iter <= sat) {
      if (!breaks.has(fmtDate(iter))) lesson++;
      iter.setDate(iter.getDate() + 7);
    }
    if (lesson < 1 || lesson > totalLessons) return null;
    return lesson;
  }

  // Why does a date have no lesson? Returns null when the date IS a lesson day; otherwise
  // returns { reason: 'break'|'workshop'|'before-start'|'past-end', label, satISO }.
  // Used to gate regular-class attendance + the lesson-number input in the makeup form.
  function nonLessonReason(dateV) {
    const iso = toISODate(dateV);
    if (!iso) return null;
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d.getTime())) return null;
    if (lessonNumberFor(iso) != null) return null;
    const start = new Date((MMT_CONFIG.ACADEMIC_YEAR_START || '2025-09-13') + 'T00:00:00');
    if (d < start) return { reason: 'before-start', label: 'before academic year starts', satISO: '' };
    const sat = new Date(d); sat.setDate(d.getDate() - ((d.getDay() + 1) % 7));
    const satISO = fmtDate(sat);
    const breaks  = new Set(MMT_CONFIG.ACADEMIC_BREAKS || []);
    const types   = MMT_CONFIG.ACADEMIC_BREAK_TYPES  || {};
    const labels  = MMT_CONFIG.ACADEMIC_BREAK_LABELS || {};
    if (breaks.has(satISO)) {
      const isWorkshop = types[satISO] === 'workshop';
      return { reason: isWorkshop ? 'workshop' : 'break', label: labels[satISO] || (isWorkshop ? 'Workshop week' : 'Break week'), satISO };
    }
    return { reason: 'past-end', label: 'after final lesson', satISO };
  }

  // Reusable picker — search students across all classes.
  const StudentPickerPopover = ({ excludeKeys = new Set(), onSelect, onClose, title = 'Add student' }) => {
    const [q, setQ] = React.useState('');
    const all = React.useMemo(() => {
      const out = [];
      for (const [classId, nicks] of Object.entries(STUDENTS_BY_CLASS)) {
        for (const nick of nicks) out.push({ nickname: nick, classId, fullName: FULL_NAME_BY_NICK[nick] || '' });
      }
      return out.sort((a, b) => a.nickname.localeCompare(b.nickname));
    }, []);
    const filtered = q.trim()
      ? all.filter(s => {
          const t = q.toLowerCase();
          return s.nickname.toLowerCase().includes(t) || s.classId.toLowerCase().includes(t) || s.fullName.toLowerCase().includes(t);
        })
      : all;
    return (
      <div className="fixed inset-0 z-40 flex items-start justify-center pt-20 px-4">
        <div className="fixed inset-0 bg-navy-900/40 backdrop-blur-[2px]" onClick={onClose} />
        <div className="relative w-full max-w-md card shadow-pop overflow-hidden">
          <div className="px-4 py-3 border-b border-navy-50 flex items-center justify-between">
            <div className="font-semibold text-navy text-sm">{title}</div>
            <button onClick={onClose} className="text-navy-400 hover:text-navy w-7 h-7 rounded-md hover:bg-navy-50 flex items-center justify-center" aria-label="Close">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div className="p-3 border-b border-navy-50">
            <input autoFocus className="input" placeholder="Search by name or class…" value={q} onChange={(e)=>setQ(e.target.value)} />
          </div>
          <ul className="max-h-72 overflow-y-auto divide-y divide-navy-50">
            {filtered.length === 0 && <li className="p-4 text-sm text-navy-400">No matches.</li>}
            {filtered.map(s => {
              const key = s.nickname + '|' + s.classId;
              const disabled = excludeKeys.has(key);
              return (
                <li key={key}>
                  <button
                    disabled={disabled}
                    onClick={() => onSelect(s)}
                    className={`w-full text-left px-4 py-2 flex items-center justify-between gap-3 transition ${disabled ? 'opacity-40 cursor-not-allowed' : 'hover:bg-navy-50/60'}`}
                  >
                    <div>
                      <div className="font-medium text-navy text-sm">{s.nickname}</div>
                      {s.fullName && <div className="text-[11px] text-navy-300">{s.fullName}</div>}
                    </div>
                    <span className="chip bg-navy-50 text-navy-500 border border-navy-100 !text-[10px]">{s.classId}</span>
                  </button>
                </li>
              );
            })}
          </ul>
        </div>
      </div>
    );
  };

  // DailyTracker — shows attendance progress for a single chosen date,
  // derived entirely from the live attendance log (no stale tracker state).
  const DailyTracker = ({ attendance, defaultDate }) => {
    const [date, setDate] = React.useState(defaultDate);
    const [hover, setHover] = React.useState(null);
    const [expandedClassId, setExpandedClassId] = React.useState(null);

    // 7 day-buttons for the Saturday→Friday week that contains the selected date.
    // Recomputes whenever `date` moves into a different week.
    const weekDays = React.useMemo(() => {
      const days = [];
      const d = new Date(date + 'T00:00:00');
      if (isNaN(d.getTime())) return days;
      const dow = d.getDay();            // 0=Sun … 6=Sat
      const daysBack = (dow + 1) % 7;    // distance back to most recent Saturday
      const sat = new Date(d); sat.setDate(d.getDate() - daysBack);
      for (let i = 0; i < 7; i++) {
        const dd = new Date(sat); dd.setDate(sat.getDate() + i);
        days.push({ date: fmtDate(dd), dayName: DAY_NAMES[dd.getDay()], dayNum: String(dd.getDate()).padStart(2,'0') });
      }
      return days;
    }, [date]);

    const selDate = new Date(date + 'T00:00:00');
    const selDayName = DAY_NAMES[selDate.getDay()];

    // Workshop / break weeks have no regular classes — surface a banner and hide the
    // class roster instead of letting users think they should be logging attendance.
    const dayNonLesson    = nonLessonReason(date);
    const isNonLessonWeek = !!dayNonLesson && (dayNonLesson.reason === 'workshop' || dayNonLesson.reason === 'break');

    // Classes scheduled on this weekday, sorted by start time. Skipped on non-lesson weeks.
    const classesOnDay = isNonLessonWeek ? [] : [...CLASSES]
      .filter(c => c.day === selDayName)
      .sort((a, b) => (a.time || '').localeCompare(b.time || ''));

    const entries = classesOnDay.map(cls => {
      const rows = attendance.filter(a => a.classId === cls.id && a.date === date);
      const expected = (STUDENTS_BY_CLASS[cls.id] ?? []).length;
      const present = rows.filter(r => r.status === 'Present').length;
      const preNotified = rows.filter(r => r.status === 'Absent (pre-notified)').length;
      const noNotice = rows.filter(r => r.status === 'Absent (no notice)').length;
      const hasLog = rows.some(r => ['Present','Absent (pre-notified)','Absent (no notice)'].includes(r.status));
      return {
        classId: cls.id, teacher: cls.teacher, time: cls.time,
        expected, present, preNotified, noNotice,
        status: hasLog ? 'logged' : 'pending',
      };
    });

    return (
      <div className="card overflow-hidden">
        <div className="px-5 py-3 border-b border-navy-50 flex items-center justify-between flex-wrap gap-2">
          <div>
            <h2 className="font-semibold text-navy">Daily attendance tracker</h2>
            <p className="text-xs text-navy-400">{selDayName} · {date} · stacked bars show Present / Pre-notified / No notice.</p>
          </div>
          <div className="flex items-center gap-3 text-[11px] text-navy-500 flex-wrap">
            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-leaf" /> Present</span>
            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-sky" /> Pre-notified</span>
            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-red-400" /> No notice</span>
            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-navy-100" /> Not yet logged</span>
          </div>
        </div>

        {/* Day selector: 7 quick buttons for the current week + free date picker */}
        <div className="px-5 py-3 border-b border-navy-50 bg-navy-50/30 flex items-center justify-between flex-wrap gap-3">
          <div className="flex gap-1 flex-wrap">
            {weekDays.map(d => {
              const isActive = d.date === date;
              return (
                <button key={d.date} onClick={() => setDate(d.date)}
                  className={['flex flex-col items-center px-2.5 py-1 rounded-md transition leading-tight',
                    isActive ? 'bg-navy text-white' : 'bg-white text-navy-600 border border-navy-100 hover:bg-navy-50'
                  ].join(' ')}
                  title={d.date}
                >
                  <span className="text-[10px] uppercase tracking-wider font-semibold">{d.dayName}</span>
                  <span className="text-sm font-bold tabular-nums">{d.dayNum}</span>
                </button>
              );
            })}
          </div>
          <input type="date" value={date} onChange={(e)=>setDate(e.target.value)} className="input !w-auto !py-1 text-sm" title="Pick any date" />
        </div>

        {isNonLessonWeek ? (
          <div className="p-5 bg-sun-50/60 border-t border-sun-200">
            <div className="flex items-start gap-2.5 text-sm text-navy-700">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F0B429" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="flex-shrink-0 mt-0.5"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              <div>
                <strong className="font-semibold">No regular classes this week.</strong>{' '}
                The week of <strong>{prettyDate(dayNonLesson.satISO || date)}</strong> is a <strong>{dayNonLesson.reason}</strong> week
                {dayNonLesson.label ? ` (${dayNonLesson.label})` : ''}.
                Use the <strong>Off-schedule</strong>, <strong>Trial</strong>, or <strong>Workshop</strong> tab to log attendance for this date.
              </div>
            </div>
          </div>
        ) : entries.length === 0 ? (
          <div className="p-6 text-sm text-navy-400">No classes scheduled on {selDayName}.</div>
        ) : (
          <ul className="divide-y divide-navy-50">
            {entries.map((c, i) => {
              const logged = c.status === 'logged';
              const accounted = c.present + c.preNotified + c.noNotice;
              const unlogged  = logged ? Math.max(0, c.expected - accounted) : c.expected;
              const max = c.expected || 1;
              const pct = (n) => `${(n / max) * 100}%`;
              const isHover = hover === i;
              const isExpanded = expandedClassId === c.classId;
              // Build per-student detail rows for the expanded view: roster + any extras (makeup / trial).
              let detail = null;
              if (isExpanded) {
                const rosterList = STUDENTS_BY_CLASS[c.classId] ?? [];
                const rowsForCell = attendance.filter(a => a.classId === c.classId && a.date === date);
                const statusByNick = {};
                rowsForCell.forEach(a => { statusByNick[a.studentNickname] = a; });
                const regulars = rosterList.map(nick => ({
                  nickname: nick, fullName: FULL_NAME_BY_NICK[nick] || '',
                  status: statusByNick[nick]?.status || 'Not yet logged',
                  kind: 'regular',
                }));
                const extras = rowsForCell
                  .filter(a => !rosterList.includes(a.studentNickname))
                  .map(a => ({
                    nickname: a.studentNickname, fullName: FULL_NAME_BY_NICK[a.studentNickname] || '',
                    status: a.status,
                    kind: a.status === 'Makeup attendee' ? 'makeup'
                        : a.status === 'Trial'           ? 'trial'
                        : 'other',
                    notes: a.notes || '',
                  }));
                detail = { regulars, extras };
              }
              return (
                <React.Fragment key={c.classId + i}>
                  <li
                    onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}
                    onClick={() => setExpandedClassId(isExpanded ? null : c.classId)}
                    className={`px-5 py-3 grid grid-cols-12 gap-3 items-center transition cursor-pointer ${isHover ? 'bg-navy-50/40' : ''} ${isExpanded ? 'bg-navy-50/40' : ''}`}
                    title="Click to see who was present, absent, or not yet logged"
                  >
                    <div className="col-span-4 sm:col-span-2 flex items-center gap-2">
                      <span className={`text-navy-400 text-xs transition-transform ${isExpanded ? 'rotate-90' : ''}`}>▸</span>
                      <div>
                        <div className="font-mono text-sm text-navy font-semibold">{c.classId}</div>
                        <div className="text-xs text-navy-400">{c.teacher ?? ''}</div>
                      </div>
                    </div>
                    <div className="col-span-4 sm:col-span-2 text-sm text-navy-600">
                      <div className="font-medium">{prettyDateTime(date, c.time)}</div>
                      <div className="text-xs text-navy-300">{logged ? 'Logged' : 'Not yet logged'}</div>
                    </div>
                    <div className="col-span-12 sm:col-span-6 order-last sm:order-none">
                      <div className="h-3 rounded-full bg-navy-50 overflow-hidden flex">
                        {logged ? (
                          <>
                            <div className="bg-leaf h-full transition-all"    style={{ width: pct(c.present) }}    title={`Present: ${c.present}`} />
                            <div className="bg-sky h-full transition-all"     style={{ width: pct(c.preNotified) }} title={`Pre-notified: ${c.preNotified}`} />
                            <div className="bg-red-400 h-full transition-all" style={{ width: pct(c.noNotice) }}   title={`No notice: ${c.noNotice}`} />
                            {unlogged > 0 && <div className="bg-navy-100 h-full" style={{ width: pct(unlogged) }} />}
                          </>
                        ) : (
                          <div className="h-full w-full" style={{
                            background: 'repeating-linear-gradient(45deg, #D6DEEC 0 6px, transparent 6px 12px)'
                          }} />
                        )}
                      </div>
                      <div className="mt-1 text-[11px] text-navy-400 flex gap-3 flex-wrap">
                        {logged ? (
                          <>
                            <span><strong className="text-leaf-600">{c.present}</strong> present</span>
                            {c.preNotified > 0 && <span><strong className="text-sky-600">{c.preNotified}</strong> pre-notified</span>}
                            {c.noNotice > 0    && <span><strong className="text-red-600">{c.noNotice}</strong> no notice</span>}
                          </>
                        ) : (
                          <span className="text-navy-300">Roster not submitted yet</span>
                        )}
                      </div>
                    </div>
                    <div className="col-span-4 sm:col-span-2 text-right">
                      <div className="text-xs text-navy-400 uppercase tracking-wider font-semibold">Attended</div>
                      <div className="font-bold tabular-nums text-navy">
                        {logged ? c.present : 0}<span className="text-navy-300 font-normal"> / {c.expected}</span>
                      </div>
                    </div>
                  </li>
                  {isExpanded && detail && (
                    <li className="px-5 py-3 bg-navy-50/30 border-t border-navy-100">
                      {detail.regulars.length === 0 && detail.extras.length === 0 ? (
                        <div className="text-sm text-navy-400">No students mapped to this class. Add some via the Roster tab.</div>
                      ) : (
                        <>
                          <div className="text-[11px] uppercase tracking-wider font-semibold text-navy-500 mb-2">Roster</div>
                          <ul className="grid sm:grid-cols-2 gap-1.5 mb-3">
                            {detail.regulars.map(s => (
                              <li key={s.nickname} className="flex items-center justify-between gap-2 px-3 py-1.5 bg-white rounded-md border border-navy-50">
                                <div className="min-w-0">
                                  <div className="font-medium text-sm text-navy truncate">{s.nickname}</div>
                                  {s.fullName && <div className="text-[11px] text-navy-300 truncate">{s.fullName}</div>}
                                </div>
                                {s.status === 'Not yet logged'
                                  ? <span className="chip bg-navy-50 text-navy-400 border border-navy-100 !text-[10px]">Not yet logged</span>
                                  : <AttendanceChip status={s.status} />}
                              </li>
                            ))}
                          </ul>
                          {detail.extras.length > 0 && (
                            <>
                              <div className="text-[11px] uppercase tracking-wider font-semibold text-navy-500 mb-2">Extras (makeup / trial / workshop)</div>
                              <ul className="grid sm:grid-cols-2 gap-1.5">
                                {detail.extras.map((s, idx) => (
                                  <li key={s.nickname + idx} className="flex items-center justify-between gap-2 px-3 py-1.5 bg-white rounded-md border border-navy-50">
                                    <div className="min-w-0">
                                      <div className="font-medium text-sm text-navy truncate">{s.nickname}</div>
                                      {s.notes && <div className="text-[11px] text-navy-300 truncate">{s.notes}</div>}
                                    </div>
                                    <AttendanceChip status={s.status} />
                                  </li>
                                ))}
                              </ul>
                            </>
                          )}
                        </>
                      )}
                    </li>
                  )}
                </React.Fragment>
              );
            })}
          </ul>
        )}
      </div>
    );
  };

  const ATTENDANCE_STATUSES     = ['Present', 'Absent (no notice)', 'Absent (pre-notified)'];
  const ATTENDANCE_STATUSES_ALL = ['Present', 'Absent (no notice)', 'Absent (pre-notified)', 'Makeup attendee', 'Trial', 'Workshop attendee'];

  // -------- Regular class attendance form (with extras section) --------
  const RegularClassForm = ({ onLogSession, onToast }) => {
    const today = todayISO();
    const [date, setDate]         = React.useState(today);
    const [classId, setClassId]   = React.useState('');
    const [statuses, setStatuses] = React.useState({});
    const [extras, setExtras]     = React.useState([]); // [{ kind:'makeup'|'trial', nickname, sourceClass? }]
    const [notes, setNotes]       = React.useState('');
    const [picker, setPicker]     = React.useState(null); // 'makeup' | 'trial' | null
    const [trialName, setTrialName] = React.useState('');
    // Two-step save: clicking "Save N rows" opens a ConfirmDialog listing exactly who'll
    // be marked. The Sheet only gets written after the user confirms.
    const [confirmSave, setConfirmSave] = React.useState(false);

    const selectedClass = CLASSES.find(c => c.id === classId);
    const roster  = classId ? (STUDENTS_BY_CLASS[classId] ?? []) : [];
    const teacher = selectedClass?.teacher ?? '';

    // When a class is picked, auto-set the date to the most recent occurrence of that class's
    // weekday (today if today is that day). This prevents the "today date got saved as the class
    // date" bug when users log attendance a few days after the class actually happened.
    React.useEffect(() => {
      if (!classId) return;
      const cls = CLASSES.find(c => c.id === classId);
      if (!cls?.day) return;
      const targetDow = DAY_NAMES.indexOf(cls.day);
      if (targetDow < 0) return;
      const now = new Date(todayISO() + 'T00:00:00');
      const offset = (now.getDay() - targetDow + 7) % 7;
      const d = new Date(now); d.setDate(now.getDate() - offset);
      setDate(fmtDate(d));
    }, [classId]);

    const setStatus = (nick, st) => setStatuses(s => ({ ...s, [nick]: st }));
    const removeExtra = (idx) => setExtras(es => es.filter((_, i) => i !== idx));

    function addMakeup(s) {
      const exists = extras.some(e => e.kind === 'makeup' && e.nickname === s.nickname && e.sourceClass === s.classId);
      if (!exists) setExtras(e => [...e, { kind: 'makeup', nickname: s.nickname, sourceClass: s.classId }]);
      setPicker(null);
    }
    function addTrial(e) {
      e.preventDefault();
      const name = trialName.trim();
      if (!name) return;
      setExtras(es => [...es, { kind: 'trial', nickname: name }]);
      setTrialName('');
      setPicker(null);
    }

    // Pure builder — produces the rows that would be written. Used both by the
    // confirmation preview and the actual save.
    function buildRows() {
      const slot = selectedClass.slot;
      const base = Date.now();
      const rows = roster.map((nick, i) => ({
        id: `A${base}-${i}`,
        date, slot, classId, teacher,
        studentNickname: nick,
        status: statuses[nick] ?? 'Absent (no notice)',
        notes,
      }));
      extras.forEach((ex, i) => {
        rows.push({
          id: `A${base}-x${i}`,
          date, slot, classId, teacher,
          studentNickname: ex.nickname,
          status: ex.kind === 'makeup' ? 'Makeup attendee' : 'Trial',
          notes: ex.kind === 'makeup'
            ? `From ${ex.sourceClass}${notes ? ' · ' + notes : ''}`
            : (notes || ''),
        });
      });
      return rows;
    }

    // Workshops/breaks have no regular lesson — disable the form on those weeks so the
    // user can't accidentally log fixed-class attendance.
    const nonLesson = nonLessonReason(date);
    const isNonLessonWeek = !!nonLesson && (nonLesson.reason === 'break' || nonLesson.reason === 'workshop');

    // Step 1: validate, then open the confirmation dialog listing who gets marked.
    function requestSave() {
      if (isNonLessonWeek) {
        onToast?.('Regular classes don\'t run during workshop / break weeks. Use Off-schedule, Trial, or Workshop instead.');
        return;
      }
      if (!classId) { onToast?.('Pick a class first.'); return; }
      setConfirmSave(true);
    }

    // Step 2: actually write the rows (runs after the user confirms).
    function doSave() {
      const rows = buildRows();
      onLogSession(rows);
      // logSession owns the toast: it knows the dedupe result.
      setStatuses({}); setExtras([]); setNotes('');
      setConfirmSave(false);
    }

    const excludeSet = new Set([
      ...roster.map(n => n + '|' + classId),
      ...extras.filter(e => e.kind === 'makeup').map(e => e.nickname + '|' + e.sourceClass),
    ]);

    return (
      <>
        <div className="card p-5 grid gap-4">
          <div className="text-xs font-semibold uppercase tracking-wider text-navy-500">Log a regular class session</div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label className="label">Class date <span className="text-navy-400 normal-case">(when the lesson actually happened)</span></label>
              <input type="date" className="input" value={date} max={todayISO()} onChange={(e)=>setDate(e.target.value)} />
            </div>
            <div>
              <label className="label">Class</label>
              <select className="input" value={classId} onChange={(e)=>{ setClassId(e.target.value); setStatuses({}); setExtras([]); }} disabled={isNonLessonWeek}>
                <option value="">Select class…</option>
                {sortedClasses().map((c) => (
                  <option key={c.id} value={c.id}>{c.slot} · {c.id} · {c.teacher}</option>
                ))}
              </select>
            </div>
          </div>
          {isNonLessonWeek && (
            <div className="flex items-start gap-2.5 rounded-xl bg-sun-50 border border-sun-200 px-3.5 py-3 text-sm text-navy-700">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F0B429" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="flex-shrink-0 mt-0.5"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              <div>
                <strong className="font-semibold">No regular class on this date.</strong>{' '}
                The week of <strong>{prettyDate(nonLesson.satISO || date)}</strong> is a <strong>{nonLesson.reason}</strong> week{nonLesson.label ? ` (${nonLesson.label})` : ''}.
                Switch to <strong>Off-schedule</strong>, <strong>Trial</strong>, or <strong>Workshop</strong> instead, or pick a different date.
              </div>
            </div>
          )}
        </div>

        {classId && !isNonLessonWeek && (
          <div className="card overflow-hidden">
            <div className="px-5 py-3 border-b border-navy-50 flex items-center justify-between flex-wrap gap-2">
              <div className="font-semibold text-navy">
                Roster · {classId}
                <span className="text-navy-400 font-normal"> · {roster.length} student{roster.length === 1 ? '' : 's'} · {teacher}</span>
                {(() => { const ln = lessonNumberFor(date); return ln != null ? <span className="ml-2 chip bg-sun-100 text-navy-700 border border-sun-300 !text-[10px]">Lesson {ln} of {MMT_CONFIG.TOTAL_LESSONS || 36}</span> : null; })()}
              </div>
              <div className="text-xs text-navy-400">Default = Absent (no notice). Toggle as you go.</div>
            </div>
            {roster.length === 0 ? (
              <div className="p-6 text-sm text-navy-400">No active students mapped to {classId}.</div>
            ) : (
              <ul className="divide-y divide-navy-50">
                {roster.map(nick => {
                  const active = statuses[nick] ?? '';
                  const fullName = FULL_NAME_BY_NICK[nick];
                  return (
                    <li key={nick} className="px-5 py-3 flex items-center justify-between gap-4 flex-wrap">
                      <div>
                        <div className="font-medium text-navy">{nick}</div>
                        {fullName && <div className="text-xs text-navy-300">{fullName}</div>}
                      </div>
                      <div className="flex flex-wrap gap-1">
                        {STATUS_BTNS.map(st => {
                          const isActive = active === st;
                          const tone = st === 'Present'
                            ? (isActive ? 'bg-leaf text-white' : 'border border-leaf text-leaf-600 hover:bg-leaf-50')
                            : st === 'Absent (pre-notified)'
                            ? (isActive ? 'bg-sky text-white' : 'border border-sky text-sky-600 hover:bg-sky-50')
                            : (isActive ? 'bg-red-500 text-white' : 'border border-red-300 text-red-600 hover:bg-red-50');
                          return (
                            <button key={st} className={`text-xs px-2.5 py-1 rounded-full transition ${tone}`} onClick={() => setStatus(nick, st)}>
                              {st}
                            </button>
                          );
                        })}
                      </div>
                    </li>
                  );
                })}
              </ul>
            )}

            {/* Additional attendees: makeup students from other classes + trial students */}
            <div className="px-5 py-3 border-t border-navy-50 bg-navy-50/30 flex items-center justify-between flex-wrap gap-2">
              <div>
                <div className="font-semibold text-navy text-sm">Additional attendees</div>
                <div className="text-xs text-navy-400">Makeup students from other classes, or trial students.</div>
              </div>
              <div className="flex gap-1.5">
                <button className="btn-ghost !py-1.5 !text-xs" onClick={() => setPicker('makeup')}>+ Makeup attendee</button>
                <button className="btn-ghost !py-1.5 !text-xs" onClick={() => setPicker('trial')}>+ Trial student</button>
              </div>
            </div>
            {extras.length > 0 ? (
              <ul className="divide-y divide-navy-50">
                {extras.map((ex, idx) => (
                  <li key={idx} className="px-5 py-2.5 flex items-center justify-between gap-3">
                    <div className="flex items-center gap-2.5 flex-wrap">
                      <AttendanceChip status={ex.kind === 'makeup' ? 'Makeup attendee' : 'Trial'} />
                      <span className="font-medium text-navy">{ex.nickname}</span>
                      {ex.kind === 'makeup' && <span className="text-xs text-navy-400">from {ex.sourceClass}</span>}
                    </div>
                    <button onClick={() => removeExtra(idx)} className="text-navy-300 hover:text-red-500 w-7 h-7 rounded-md hover:bg-red-50 flex items-center justify-center transition" aria-label="Remove">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                  </li>
                ))}
              </ul>
            ) : (
              <div className="px-5 py-3 text-xs text-navy-400">No extras added yet.</div>
            )}

            <div className="p-5 border-t border-navy-50 grid gap-3">
              <label className="label">Notes for this session (optional)</label>
              <textarea rows={2} className="input" value={notes} onChange={(e)=>setNotes(e.target.value)} placeholder="Anything notable about this session…" />
              <div className="flex justify-end">
                <button className="btn-primary" onClick={requestSave} disabled={isNonLessonWeek || (roster.length === 0 && extras.length === 0)}>
                  {`Save ${roster.length + extras.length} row${(roster.length + extras.length) === 1 ? '' : 's'}`}
                </button>
              </div>
            </div>
          </div>
        )}

        {picker === 'makeup' && (
          <StudentPickerPopover
            title="Add makeup attendee"
            excludeKeys={excludeSet}
