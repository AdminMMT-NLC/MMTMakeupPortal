  function weekContaining(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const dow = d.getDay();           // 0=Sun … 6=Sat
    const daysBack = (dow + 1) % 7;   // distance back to most recent Saturday
    const sat = new Date(d); sat.setDate(d.getDate() - daysBack);
    const fri = new Date(sat); fri.setDate(sat.getDate() + 6);
    const fmt = (x) => `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
    return { start: fmt(sat), end: fmt(fri) };
  }
  const HEADCOUNT_WEEK = weekContaining(todayISO());

  // Title format: [MAKEUP - <classId>] <Student> - Lesson <n>, 1.5h duration, Asia/Bangkok.
  function buildCalendarUrl(r) {
    // Defensive: normalise in case raw Date strings sneak in from the backend.
    const propDate = toISODate(r.proposedDate);
    const propTime = toHHMM(r.proposedTime);
    const [y, m, d] = propDate.split('-').map(Number);
    const [hh, mm]  = propTime.split(':').map(Number);
    const pad = (n) => String(n).padStart(2, '0');
    const startLocal = `${y}${pad(m)}${pad(d)}T${pad(hh)}${pad(mm)}00`;
    let endH = hh + 1, endM = mm + 30;
    if (endM >= 60) { endM -= 60; endH += 1; }
    const endLocal = `${y}${pad(m)}${pad(d)}T${pad(endH)}${pad(endM)}00`;
    const title = `[MAKEUP - ${r.classId}] ${r.studentNickname} - Lesson ${r.lesson}`;
    const details = [
      `Student: ${r.studentNickname}`,
      `Class: ${r.classId}`,
      `Lesson missed: ${r.lesson}`,
      `Teacher: ${r.teacher}`,
      `Original missed date: ${prettyDate(r.missedDate)}`,
      `Reason: ${r.reason}`,
      r.notes ? `Notes: ${r.notes}` : '',
      ``,
      `Request ID: ${r.id}`,
    ].filter(Boolean).join('\n');
    const params = new URLSearchParams({
      action: 'TEMPLATE',
      text:   title,
      dates:  `${startLocal}/${endLocal}`,
      ctz:    'Asia/Bangkok',
      details,
    });
    return `https://calendar.google.com/calendar/render?${params.toString()}`;
  }

  function downloadCsv(filename, rows) {
    const esc = (v) => {
      const s = v == null ? '' : String(v);
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    };
    const body = rows.map(r => r.map(esc).join(',')).join('\n');
    const blob = new Blob([body], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  const PIE_PALETTE = ['#0B2545', '#3B82F6', '#2A9D8F', '#F4D35E', '#F0B429', '#7C92B9', '#A9B8D2', '#E76F51'];

  const PieChart = ({ data, size = 220, onSliceClick }) => {
    const [hover, setHover] = React.useState(null);
    const total = data.reduce((a, b) => a + b.count, 0) || 1;
    const cx = size / 2, cy = size / 2;
    const R  = size * 0.42;
    const r  = size * 0.26;

    let angle = -Math.PI / 2;
    const slices = data.map((d, i) => {
      const frac = d.count / total;
      let path;
      if (frac >= 0.9999) {
        // Single slice covering the entire ring — use two semicircle arcs to avoid
        // a degenerate "M point → A back to same point" path that renders as nothing.
        path = [
          `M ${cx} ${cy - R}`,
          `A ${R} ${R} 0 1 1 ${cx} ${cy + R}`,
          `A ${R} ${R} 0 1 1 ${cx} ${cy - R}`,
          `Z`,
          `M ${cx} ${cy - r}`,
          `A ${r} ${r} 0 1 0 ${cx} ${cy + r}`,
          `A ${r} ${r} 0 1 0 ${cx} ${cy - r}`,
          `Z`,
        ].join(' ');
        angle = angle + Math.PI * 2;
      } else {
        const a0 = angle;
        const a1 = angle + frac * Math.PI * 2;
        angle = a1;
        const large = a1 - a0 > Math.PI ? 1 : 0;
        const x0o = cx + R * Math.cos(a0), y0o = cy + R * Math.sin(a0);
        const x1o = cx + R * Math.cos(a1), y1o = cy + R * Math.sin(a1);
        const x0i = cx + r * Math.cos(a1), y0i = cy + r * Math.sin(a1);
        const x1i = cx + r * Math.cos(a0), y1i = cy + r * Math.sin(a0);
        path = [
          `M ${x0o} ${y0o}`,
          `A ${R} ${R} 0 ${large} 1 ${x1o} ${y1o}`,
          `L ${x0i} ${y0i}`,
          `A ${r} ${r} 0 ${large} 0 ${x1i} ${y1i}`,
          'Z',
        ].join(' ');
      }
      return { ...d, path, color: PIE_PALETTE[i % PIE_PALETTE.length], frac, i };
    });

    const focused = hover != null ? slices[hover] : null;
    const centerLabel = focused ? `${focused.count}` : `${total}`;
    const centerSub   = focused ? focused.reason : 'total';
    const centerPct   = focused ? `${Math.round(focused.frac * 100)}%` : '';

    if (data.reduce((a, b) => a + b.count, 0) === 0) {
      return <div className="text-sm text-navy-400 py-10 text-center">No absences in this period.</div>;
    }

    return (
      <div className="flex items-center gap-5 flex-wrap">
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="flex-shrink-0">
          {slices.map((s) => {
            const isHover = hover === s.i;
            return (
              <path key={s.i} d={s.path} fill={s.color} fillRule="evenodd"
                opacity={hover == null || isHover ? 1 : 0.35}
                style={{
                  transition: 'opacity 160ms, transform 200ms',
                  transformOrigin: `${cx}px ${cy}px`,
                  transform: isHover ? 'scale(1.04)' : 'scale(1)',
                  cursor: onSliceClick ? 'pointer' : 'default',
                }}
                onMouseEnter={() => setHover(s.i)}
                onMouseLeave={() => setHover(null)}
                onClick={() => onSliceClick?.(s.reason)}
              />
            );
          })}
          <text x={cx} y={cy - 6} textAnchor="middle" className="fill-navy" style={{ fontSize: 28, fontWeight: 700 }}>{centerLabel}</text>
          <text x={cx} y={cy + 14} textAnchor="middle" className="fill-navy-400" style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.12em' }}>{centerSub}</text>
          {centerPct && <text x={cx} y={cy + 30} textAnchor="middle" className="fill-navy-500" style={{ fontSize: 11, fontWeight: 600 }}>{centerPct}</text>}
        </svg>
        <ul className="text-sm flex-1 min-w-0 space-y-1.5">
          {slices.map((s) => {
            const isHover = hover === s.i;
            return (
              <li key={s.i}
                onMouseEnter={() => setHover(s.i)}
                onMouseLeave={() => setHover(null)}
                onClick={() => onSliceClick?.(s.reason)}
                className={[
                  'flex items-center gap-2 px-2 py-1 rounded-md transition',
                  isHover ? 'bg-navy-50' : '',
                  onSliceClick ? 'cursor-pointer' : '',

              >
                <span className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{ background: s.color }} />
                <span className="flex-1 truncate text-navy-600">{s.reason}</span>
                <span className="tabular-nums font-semibold text-navy">{s.count}</span>
                <span className="tabular-nums text-xs text-navy-400 w-9 text-right">{Math.round(s.frac * 100)}%</span>

            );
          })}
        </ul>
      </div>
    );
  };

  const Dashboard = ({ requests, attendance, onNavigate, onNewRequest, onCreateFromAbsence }) => {
    const reqs = requests.map(r => ({ ...r, status: deriveStatus(r) }));
    const pendingTeacher       = reqs.filter(r => !r.teacherConfirmed);
    const pendingAdmin         = reqs.filter(r => r.teacherConfirmed && !r.adminApproved);
    const approvedNotScheduled = reqs.filter(r => r.adminApproved && !r.calendarEventCreated);
    const scheduled            = reqs.filter(r => r.calendarEventCreated);

    const withMakeupByReason = {};
    for (const r of reqs) (withMakeupByReason[r.reason] = (withMakeupByReason[r.reason] || 0) + 1);
    const withMakeup = Object.entries(withMakeupByReason)
      .map(([reason, count]) => ({ reason, count }))
      .sort((a, b) => b.count - a.count);

    // "Without scheduled makeup" = absences in the log that don't have a matching makeup request.
    // Keep the actual rows so we can show a drill-down list when the chart is clicked.
    const unmatchedByReason = { 'No notice': [], 'Pre-notified, no makeup yet': [] };
    for (const a of attendance) {
      if (a.status === 'Absent (no notice)') {

          unmatchedByReason['Pre-notified, no makeup yet'].push(a);

      .filter(([, list]) => list.length > 0)
      .map(([reason, list]) => ({ reason, count: list.length }))

    const allUnmatched = [...unmatchedByReason['No notice'], ...unmatchedByReason['Pre-notified, no makeup yet']]

  // Special class-ID markers for non-regular sessions.
  const OFF_SCHEDULE_ID = 'OFF-SCHEDULE';
  const WORKSHOP_ID     = 'WORKSHOP';
  const isSpecialClassId = (id) => id === OFF_SCHEDULE_ID || id === WORKSHOP_ID;
  const displayClassId = (id) => id === OFF_SCHEDULE_ID ? 'Off-schedule' : (id === WORKSHOP_ID ? 'Workshop' : id);

  // Week starts on Saturday for MMT. Order used when sorting classes/dropdowns by day-of-week.
  const DAY_ORDER = { Sat: 0, Sun: 1, Mon: 2, Tue: 3, Wed: 4, Thu: 5, Fri: 6 };
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']; // index 0..6 from Date.getDay()
  function sortedClasses(list) {
    return [...(list ?? CLASSES)].sort((a, b) => {
      const dayDiff = (DAY_ORDER[a.day] ?? 99) - (DAY_ORDER[b.day] ?? 99);
      if (dayDiff !== 0) return dayDiff;
      const timeDiff = (a.time || '').localeCompare(b.time || '');
      if (timeDiff !== 0) return timeDiff;
      return (a.id || '').localeCompare(b.id || '');
    });
  }
  function fmtDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  // Always returns today's local date in YYYY-MM-DD. Used as the default for every date picker
  // so they reflect the real "today" instead of a stale config value.
  function todayISO() { return fmtDate(new Date()); }
  function daysAgoISO(n) { const d = new Date(); d.setDate(d.getDate() - n); return fmtDate(d); }

  // Coerce any inbound date representation (ISO, JS Date.toString, long locale string,
  // partial ISO with time, etc.) into a clean 'YYYY-MM-DD' string. Returns '' if empty.
  function toISODate(v) {
    if (v == null) return '';
    const s = String(v).trim();
    if (!s) return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const iso = s.match(/^(\d{4}-\d{2}-\d{2})T/);
    if (iso) return iso[1];
    const d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return fmtDate(d);
  }

  // Coerce any inbound time representation into a clean 'HH:MM' string.
  function toHHMM(v) {
    if (v == null) return '';
    const s = String(v).trim();
    if (!s) return '';
    const hm = s.match(/^(\d{1,2}):(\d{2})/);
    if (hm) return `${hm[1].padStart(2,'0')}:${hm[2]}`;
    const isoT = s.match(/T(\d{2}):(\d{2})/);
    if (isoT) return `${isoT[1]}:${isoT[2]}`;
    const d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  // Pretty-print 'YYYY-MM-DD' as 'Wed 20 May 2026'.
  const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function prettyDate(v) {
    const iso = toISODate(v);
    if (!/^\d{4}-\d{2}-\d{2}$/.test(iso)) return iso || '';
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d.getTime())) return iso;
    return `${DAY_NAMES[d.getDay()]} ${d.getDate()} ${MONTH_SHORT[d.getMonth()]} ${d.getFullYear()}`;
  }

  // Reusable picker — search students across all classes.
  const StudentPickerPopover = ({ excludeKeys = new Set(), onSelect, onClose, title = 'Add student' }) => {
    const [q, setQ] = React.useState('');
    const all = React.useMemo(() => {
      const out = [];
      for (const [classId, nicks] of Object.entries(STUDENTS_BY_CLASS)) {
        for (const nick of nicks) out.push({ nickname: nick, classId, fullName: FULL_NAME_BY_NICK[nick] || '' });
      }
      return out.sort((a, b) => a.nickname.localeCompare(b.nickname));
    }, []);
    const filtered = q.trim()
      ? all.filter(s => {
          const t = q.toLowerCase();
          return s.nickname.toLowerCase().includes(t) || s.classId.toLowerCase().includes(t) || s.fullName.toLowerCase().includes(t);
        })
      : all;
    return (
      <div className="fixed inset-0 z-40 flex items-start justify-center pt-20 px-4">
        <div className="fixed inset-0 bg-navy-900/40 backdrop-blur-[2px]" onClick={onClose} />
        <div className="relative w-full max-w-md card shadow-pop overflow-hidden">
          <div className="px-4 py-3 border-b border-navy-50 flex items-center justify-between">
            <div className="font-semibold text-navy text-sm">{title}</div>
            <button onClick={onClose} className="text-navy-400 hover:text-navy w-7 h-7 rounded-md hover:bg-navy-50 flex items-center justify-center" aria-label="Close">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div className="p-3 border-b border-navy-50">
            <input autoFocus className="input" placeholder="Search by name or class…" value={q} onChange={(e)=>setQ(e.target.value)} />
          </div>
          <ul className="max-h-72 overflow-y-auto divide-y divide-navy-50">
            {filtered.length === 0 && <li className="p-4 text-sm text-navy-400">No matches.</li>}
            {filtered.map(s => {
              const key = s.nickname + '|' + s.classId;
              const disabled = excludeKeys.has(key);
              return (
                <li key={key}>
                  <button
                    disabled={disabled}
                    onClick={() => onSelect(s)}
                    className={`w-full text-left px-4 py-2 flex items-center justify-between gap-3 transition ${disabled ? 'opacity-40 cursor-not-allowed' : 'hover:bg-navy-50/60'}`}
                  >
                    <div>
                      <div className="font-medium text-navy text-sm">{s.nickname}</div>
                      {s.fullName && <div className="text-[11px] text-navy-300">{s.fullName}</div>}
                    </div>
                    <span className="chip bg-navy-50 text-navy-500 border border-navy-100 !text-[10px]">{s.classId}</span>
                  </button>
                </li>
              );
            })}
          </ul>
        </div>
      </div>
    );
  };

  // DailyTracker — shows attendance progress for a single chosen date,
  // derived entirely from the live attendance log (no stale tracker state).
  const DailyTracker = ({ attendance, defaultDate }) => {
    const [date, setDate] = React.useState(defaultDate);
    const [hover, setHover] = React.useState(null);

    // 7 day-buttons for the Saturday→Friday week that contains the selected date.
    // Recomputes whenever `date` moves into a different week.
    const weekDays = React.useMemo(() => {
      const days = [];
      const d = new Date(date + 'T00:00:00');
      if (isNaN(d.getTime())) return days;
      const dow = d.getDay();            // 0=Sun … 6=Sat
      const daysBack = (dow + 1) % 7;    // distance back to most recent Saturday
      const sat = new Date(d); sat.setDate(d.getDate() - daysBack);
      for (let i = 0; i < 7; i++) {
        const dd = new Date(sat); dd.setDate(sat.getDate() + i);
        days.push({ date: fmtDate(dd), dayName: DAY_NAMES[dd.getDay()], dayNum: String(dd.getDate()).padStart(2,'0') });
      }
      return days;
    }, [date]);

    const selDate = new Date(date + 'T00:00:00');
    const selDayName = DAY_NAMES[selDate.getDay()];

    // Classes scheduled on this weekday, sorted by start time.
    const classesOnDay = [...CLASSES]
      .filter(c => c.day === selDayName)
      .sort((a, b) => (a.time || '').localeCompare(b.time || ''));

    const entries = classesOnDay.map(cls => {
      const rows = attendance.filter(a => a.classId === cls.id && a.date === date);
      const expected = (STUDENTS_BY_CLASS[cls.id] ?? []).length;
      const present = rows.filter(r => r.status === 'Present').length;
      const preNotified = rows.filter(r => r.status === 'Absent (pre-notified)').length;
      const noNotice = rows.filter(r => r.status === 'Absent (no notice)').length;
      const hasLog = rows.some(r => ['Present','Absent (pre-notified)','Absent (no notice)'].includes(r.status));
      return {
        classId: cls.id, teacher: cls.teacher, time: cls.time,
        expected, present, preNotified, noNotice,
        status: hasLog ? 'logged' : 'pending',
      };
    });

    return (
      <div className="card overflow-hidden">
        <div className="px-5 py-3 border-b border-navy-50 flex items-center justify-between flex-wrap gap-2">
          <div>
            <h2 className="font-semibold text-navy">Daily attendance tracker</h2>
            <p className="text-xs text-navy-400">{selDayName} · {date} · stacked bars show Present / Pre-notified / No notice.</p>
          </div>
          <div className="flex items-center gap-3 text-[11px] text-navy-500 flex-wrap">
            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-leaf" /> Present</span>
            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-sky" /> Pre-notified</span>
            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-red-400" /> No notice</span>
            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-navy-100" /> Not yet logged</span>
          </div>
        </div>

        {/* Day selector: 7 quick buttons for the current week + free date picker */}
        <div className="px-5 py-3 border-b border-navy-50 bg-navy-50/30 flex items-center justify-between flex-wrap gap-3">
          <div className="flex gap-1 flex-wrap">
            {weekDays.map(d => {
              const isActive = d.date === date;
              return (
                <button key={d.date} onClick={() => setDate(d.date)}
                  className={['flex flex-col items-center px-2.5 py-1 rounded-md transition leading-tight',
                    isActive ? 'bg-navy text-white' : 'bg-white text-navy-600 border border-navy-100 hover:bg-navy-50'
                  ].join(' ')}
                  title={d.date}
                >
                  <span className="text-[10px] uppercase tracking-wider font-semibold">{d.dayName}</span>
                  <span className="text-sm font-bold tabular-nums">{d.dayNum}</span>
                </button>
              );
            })}
          </div>
          <input type="date" value={date} onChange={(e)=>setDate(e.target.value)} className="input !w-auto !py-1 text-sm" title="Pick any date" />
        </div>

        {entries.length === 0 ? (
          <div className="p-6 text-sm text-navy-400">No classes scheduled on {selDayName}.</div>
        ) : (
          <ul className="divide-y divide-navy-50">
            {entries.map((c, i) => {
              const logged = c.status === 'logged';
              const accounted = c.present + c.preNotified + c.noNotice;
              const unlogged  = logged ? Math.max(0, c.expected - accounted) : c.expected;
              const max = c.expected || 1;
              const pct = (n) => `${(n / max) * 100}%`;
              const isHover = hover === i;
              return (
                <li key={c.classId + i}
                  onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}
                  className={`px-5 py-3 grid grid-cols-12 gap-3 items-center transition ${isHover ? 'bg-navy-50/40' : ''}`}>
                  <div className="col-span-4 sm:col-span-2">
                    <div className="font-mono text-sm text-navy font-semibold">{c.classId}</div>
                    <div className="text-xs text-navy-400">{c.teacher ?? ''}</div>
                  </div>
                  <div className="col-span-4 sm:col-span-2 text-sm text-navy-600">
                    <div className="font-medium">{c.time}</div>
                    <div className="text-xs text-navy-300">{logged ? 'Logged' : 'Not yet logged'}</div>
                  </div>
                  <div className="col-span-12 sm:col-span-6 order-last sm:order-none">
                    <div className="h-3 rounded-full bg-navy-50 overflow-hidden flex">
                      {logged ? (
                        <>
                          <div className="bg-leaf h-full transition-all"    style={{ width: pct(c.present) }}    title={`Present: ${c.present}`} />
                          <div className="bg-sky h-full transition-all"     style={{ width: pct(c.preNotified) }} title={`Pre-notified: ${c.preNotified}`} />
                          <div className="bg-red-400 h-full transition-all" style={{ width: pct(c.noNotice) }}   title={`No notice: ${c.noNotice}`} />
                          {unlogged > 0 && <div className="bg-navy-100 h-full" style={{ width: pct(unlogged) }} />}
                        </>
                      ) : (
                        <div className="h-full w-full" style={{
                          background: 'repeating-linear-gradient(45deg, #D6DEEC 0 6px, transparent 6px 12px)'
                        }} />
                      )}
                    </div>
                    <div className="mt-1 text-[11px] text-navy-400 flex gap-3 flex-wrap">
                      {logged ? (
                        <>
                          <span><strong className="text-leaf-600">{c.present}</strong> present</span>
                          {c.preNotified > 0 && <span><strong className="text-sky-600">{c.preNotified}</strong> pre-notified</span>}
                          {c.noNotice > 0    && <span><strong className="text-red-600">{c.noNotice}</strong> no notice</span>}
                        </>
                      ) : (
                        <span className="text-navy-300">Roster not submitted yet</span>
                      )}
                    </div>
                  </div>
                  <div className="col-span-4 sm:col-span-2 text-right">
                    <div className="text-xs text-navy-400 uppercase tracking-wider font-semibold">Attended</div>
                    <div className="font-bold tabular-nums text-navy">
                      {logged ? c.present : 0}<span className="text-navy-300 font-normal"> / {c.expected}</span>
                    </div>
                  </div>
                </li>
              );
            })}
          </ul>
        )}
      </div>
    );
  };

  const ATTENDANCE_STATUSES     = ['Present', 'Absent (no notice)', 'Absent (pre-notified)'];
  const ATTENDANCE_STATUSES_ALL = ['Present', 'Absent (no notice)', 'Absent (pre-notified)', 'Makeup attendee', 'Trial', 'Workshop attendee'];

  // -------- Regular class attendance form (with extras section) --------
  const RegularClassForm = ({ onLogSession, onToast }) => {
    const today = todayISO();
    const [date, setDate]         = React.useState(today);
    const [classId, setClassId]   = React.useState('');
    const [statuses, setStatuses] = React.useState({});
    const [extras, setExtras]     = React.useState([]); // [{ kind:'makeup'|'trial', nickname, sourceClass? }]
    const [notes, setNotes]       = React.useState('');
    const [picker, setPicker]     = React.useState(null); // 'makeup' | 'trial' | null
    const [trialName, setTrialName] = React.useState('');

    const selectedClass = CLASSES.find(c => c.id === classId);
    const roster  = classId ? (STUDENTS_BY_CLASS[classId] ?? []) : [];
    const teacher = selectedClass?.teacher ?? '';

    const setStatus = (nick, st) => setStatuses(s => ({ ...s, [nick]: st }));
    const removeExtra = (idx) => setExtras(es => es.filter((_, i) => i !== idx));

    function addMakeup(s) {
      const exists = extras.some(e => e.kind === 'makeup' && e.nickname === s.nickname && e.sourceClass === s.classId);
      if (!exists) setExtras(e => [...e, { kind: 'makeup', nickname: s.nickname, sourceClass: s.classId }]);
      setPicker(null);
    }
    function addTrial(e) {
      e.preventDefault();
      const name = trialName.trim();
      if (!name) return;
      setExtras(es => [...es, { kind: 'trial', nickname: name }]);
      setTrialName('');
      setPicker(null);
    }

    function save() {
      if (!classId) { onToast?.('Pick a class first.'); return; }
      const slot = selectedClass.slot;
      const base = Date.now();
      const rows = roster.map((nick, i) => ({
        id: `A${base}-${i}`,
        date, slot, classId, teacher,
        studentNickname: nick,
        status: statuses[nick] ?? 'Absent (no notice)',
        notes,
      }));
      extras.forEach((ex, i) => {
        rows.push({
          id: `A${base}-x${i}`,
          date, slot, classId, teacher,
          studentNickname: ex.nickname,
          status: ex.kind === 'makeup' ? 'Makeup attendee' : 'Trial',
          notes: ex.kind === 'makeup'
            ? `From ${ex.sourceClass}${notes ? ' · ' + notes : ''}`
            : (notes || ''),
        });
      });
      onLogSession(rows);
      onToast?.(`Logged ${rows.length} row${rows.length === 1 ? '' : 's'} for ${classId}.`);
      setStatuses({}); setExtras([]); setNotes('');
    }

    const excludeSet = new Set([
      ...roster.map(n => n + '|' + classId),
      ...extras.filter(e => e.kind === 'makeup').map(e => e.nickname + '|' + e.sourceClass),
    ]);

    return (
      <>
        <div className="card p-5 grid gap-4">
          <div className="text-xs font-semibold uppercase tracking-wider text-navy-500">Log a regular class session</div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label className="label">Class date</label>
              <input type="date" className="input" value={date} onChange={(e)=>setDate(e.target.value)} />
            </div>
            <div>
              <label className="label">Class</label>
              <select className="input" value={classId} onChange={(e)=>{ setClassId(e.target.value); setStatuses({}); setExtras([]); }}>
                <option value="">Select class…</option>
                {sortedClasses().map((c) => (
                  <option key={c.id} value={c.id}>{c.slot} · {c.id} · {c.teacher}</option>
                ))}
              </select>
            </div>
          </div>
        </div>

        {classId && (
          <div className="card overflow-hidden">
            <div className="px-5 py-3 border-b border-navy-50 flex items-center justify-between flex-wrap gap-2">
              <div className="font-semibold text-navy">
                Roster · {classId} <span className="text-navy-400 font-normal">· {roster.length} student{roster.length === 1 ? '' : 's'} · {teacher}</span>
              </div>
              <div className="text-xs text-navy-400">Default = Absent (no notice). Toggle as you go.</div>
            </div>
            {roster.length === 0 ? (
              <div className="p-6 text-sm text-navy-400">No active students mapped to {classId}.</div>
            ) : (
              <ul className="divide-y divide-navy-50">
                {roster.map(nick => {
                  const active = statuses[nick] ?? '';
                  const fullName = FULL_NAME_BY_NICK[nick];
                  return (
                    <li key={nick} className="px-5 py-3 flex items-center justify-between gap-4 flex-wrap">
                      <div>
                        <div className="font-medium text-navy">{nick}</div>
                        {fullName && <div className="text-xs text-navy-300">{fullName}</div>}
                      </div>
                      <div className="flex flex-wrap gap-1">
                        {STATUS_BTNS.map(st => {
                          const isActive = active === st;
                          const tone = st === 'Present'
                            ? (isActive ? 'bg-leaf text-white' : 'border border-leaf text-leaf-600 hover:bg-leaf-50')
                            : st === 'Absent (pre-notified)'
                            ? (isActive ? 'bg-sky text-white' : 'border border-sky text-sky-600 hover:bg-sky-50')
                            : (isActive ? 'bg-red-500 text-white' : 'border border-red-300 text-red-600 hover:bg-red-50');
                          return (
                            <button key={st} className={`text-xs px-2.5 py-1 rounded-full transition ${tone}`} onClick={() => setStatus(nick, st)}>
                              {st}
                            </button>
                          );
                        })}
                      </div>
                    </li>
                  );
                })}
              </ul>
            )}

            {/* Additional attendees: makeup students from other classes + trial students */}
            <div className="px-5 py-3 border-t border-navy-50 bg-navy-50/30 flex items-center justify-between flex-wrap gap-2">
              <div>
                <div className="font-semibold text-navy text-sm">Additional attendees</div>
                <div className="text-xs text-navy-400">Makeup students from other classes, or trial students.</div>
              </div>
              <div className="flex gap-1.5">
                <button className="btn-ghost !py-1.5 !text-xs" onClick={() => setPicker('makeup')}>+ Makeup attendee</button>
                <button className="btn-ghost !py-1.5 !text-xs" onClick={() => setPicker('trial')}>+ Trial student</button>
              </div>
            </div>
            {extras.length > 0 ? (
              <ul className="divide-y divide-navy-50">
                {extras.map((ex, idx) => (
                  <li key={idx} className="px-5 py-2.5 flex items-center justify-between gap-3">
                    <div className="flex items-center gap-2.5 flex-wrap">
                      <AttendanceChip status={ex.kind === 'makeup' ? 'Makeup attendee' : 'Trial'} />
                      <span className="font-medium text-navy">{ex.nickname}</span>
                      {ex.kind === 'makeup' && <span className="text-xs text-navy-400">from {ex.sourceClass}</span>}
                    </div>
                    <button onClick={() => removeExtra(idx)} className="text-navy-300 hover:text-red-500 w-7 h-7 rounded-md hover:bg-red-50 flex items-center justify-center transition" aria-label="Remove">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                  </li>
                ))}
              </ul>
            ) : (
              <div className="px-5 py-3 text-xs text-navy-400">No extras added yet.</div>
            )}

            <div className="p-5 border-t border-navy-50 grid gap-3">
              <label className="label">Notes for this session (optional)</label>
              <textarea rows={2} className="input" value={notes} onChange={(e)=>setNotes(e.target.value)} placeholder="Anything notable about this session…" />
              <div className="flex justify-end">
                <button className="btn-primary" onClick={save} disabled={roster.length === 0 && extras.length === 0}>
                  Save {roster.length + extras.length} row{(roster.length + extras.length) === 1 ? '' : 's'}
                </button>
              </div>
            </div>
          </div>
        )}

        {picker === 'makeup' && (
          <StudentPickerPopover
            title="Add makeup attendee"
            excludeKeys={excludeSet}
            onSelect={addMakeup}
            onClose={() => setPicker(null)}
          />
        )}
        {picker === 'trial' && (
          <div className="fixed inset-0 z-40 flex items-start justify-center pt-20 px-4">
            <div className="fixed inset-0 bg-navy-900/40 backdrop-blur-[2px]" onClick={() => setPicker(null)} />
            <div className="relative w-full max-w-sm card shadow-pop overflow-hidden">
              <div className="px-4 py-3 border-b border-navy-50 font-semibold text-navy text-sm">Add trial student</div>
              <form onSubmit={addTrial} className="p-4 grid gap-3">
                <div>
                  <label className="label">Trial student nickname</label>
                  <input autoFocus className="input" value={trialName} onChange={(e)=>setTrialName(e.target.value)} placeholder="e.g. Mango" />
                </div>
                <div className="flex justify-end gap-2">
                  <button type="button" className="btn-ghost !py-1.5" onClick={() => setPicker(null)}>Cancel</button>
                  <button type="submit" className="btn-primary !py-1.5" disabled={!trialName.trim()}>Add</button>
                </div>
              </form>
            </div>
          </div>
        )}
      </>
    );
  };

  // -------- Off-schedule makeup form --------
  const OffScheduleMakeupForm = ({ onLogSession, onToast }) => {
    const today = todayISO();
    const [date, setDate]       = React.useState(today);
    const [time, setTime]       = React.useState('14:00');
    const [teacher, setTeacher] = React.useState(TEACHERS[0]);
    const [attendees, setAttendees] = React.useState([]); // [{ nickname, sourceClass }]
    const [notes, setNotes]     = React.useState('');
    const [picker, setPicker]   = React.useState(false);

    const removeAttendee = (idx) => setAttendees(a => a.filter((_, i) => i !== idx));
    const addAttendee = (s) => {
      const exists = attendees.some(a => a.nickname === s.nickname && a.sourceClass === s.classId);
      if (!exists) setAttendees(a => [...a, { nickname: s.nickname, sourceClass: s.classId }]);
      setPicker(false);
    };

    function save() {
      if (attendees.length === 0) { onToast?.('Add at least one student.'); return; }
      const slot = `Off-schedule · ${time}`;
      const base = Date.now();
      const rows = attendees.map((a, i) => ({
        id: `A${base}-${i}`,
        date, slot, classId: OFF_SCHEDULE_ID, teacher,
        studentNickname: a.nickname,
        status: 'Makeup attendee',
        notes: `From ${a.sourceClass}${notes ? ' · ' + notes : ''}`,
      }));
      onLogSession(rows);
      onToast?.(`Logged ${rows.length} off-schedule makeup row${rows.length === 1 ? '' : 's'} with ${teacher}.`);
      setAttendees([]); setNotes('');
    }

    const excludeSet = new Set(attendees.map(a => a.nickname + '|' + a.sourceClass));

    return (
      <>
        <div className="card p-5 grid gap-4">
          <div className="text-xs font-semibold uppercase tracking-wider text-navy-500">Log an off-schedule makeup</div>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div>
              <label className="label">Date</label>
              <input type="date" className="input" value={date} onChange={(e)=>setDate(e.target.value)} />
            </div>
            <div>
              <label className="label">Time</label>
              <input type="time" className="input" value={time} onChange={(e)=>setTime(e.target.value)} />
            </div>
            <div>
              <label className="label">Teacher</label>
              <select className="input" value={teacher} onChange={(e)=>setTeacher(e.target.value)}>
                {TEACHERS.map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
          </div>
        </div>

        <div className="card overflow-hidden">
          <div className="px-5 py-3 border-b border-navy-50 flex items-center justify-between flex-wrap gap-2">
            <div>
              <div className="font-semibold text-navy">Makeup attendees <span className="text-navy-400 font-normal">· {attendees.length}</span></div>
              <div className="text-xs text-navy-400">Add students who attended this off-schedule makeup.</div>
            </div>
            <button className="btn-ghost !py-1.5 !text-xs" onClick={() => setPicker(true)}>+ Add student</button>
          </div>
          {attendees.length === 0 ? (
            <div className="p-6 text-sm text-navy-400">No attendees yet. Add at least one student above.</div>
          ) : (
            <ul className="divide-y divide-navy-50">
              {attendees.map((a, idx) => (
                <li key={idx} className="px-5 py-2.5 flex items-center justify-between gap-3">
                  <div className="flex items-center gap-2.5 flex-wrap">
                    <AttendanceChip status="Makeup attendee" />
                    <span className="font-medium text-navy">{a.nickname}</span>
                    <span className="text-xs text-navy-400">from {a.sourceClass}</span>
                  </div>

  // -------- Workshop form --------

      setNewName('');

      if (!workshopName.trim()) { onToast?.('Add a workshop name.'); return; }

        date, slot, classId: WORKSHOP_ID, teacher,
        studentNickname: nick,
        status: 'Workshop attendee',
        notes: workshopName.trim(),
      }));
      onLogSession(rows);
      onToast?.(`Logged ${rows.length} workshop row${rows.length === 1 ? '' : 's'} for "${workshopName.trim()}" with ${teacher}.`);

  // -------- Parent component: mode tabs + DailyTracker + form + recent --------

  const TEACHER_TONES = {

  const TeacherClassesTable = ({ teacher, rows }) => {
    const tone = teacherTone(teacher);
    const regularRowCount = rows.filter(r => !r.isSpecial).length;
    const totals = rows.reduce((acc, r) => ({
      expected:  acc.expected  + r.expected,

      makeups:   acc.makeups   + r.makeups,
      trials:    acc.trials    + r.trials,
      workshops: acc.workshops + (r.workshops || 0),

    return (
      <div className="card overflow-hidden">

  const Headcount = ({ headcountRows, onToast }) => {

    const byTeacher = {};
    for (const r of headcountRows) {
      const teacher = r.teacher
        || CLASSES.find(c => c.id === r.classId)?.teacher
        || 'UNASSIGNED';
      (byTeacher[teacher] = byTeacher[teacher] || []).push(r);
    }
    const teachers = Object.keys(byTeacher).sort();

    const grand = headcountRows.reduce((acc, r) => ({
      expected:  acc.expected  + r.expected,
      actual:    acc.actual    + r.actual,
      makeups:   acc.makeups   + r.makeups,
      trials:    acc.trials    + r.trials,

        ...teachers.flatMap(t =>
          byTeacher[t].map(r => [from, to, t, r.classId, r.className, r.expected, r.actual, r.makeups, r.trials, r.workshops || 0, r.total])

  // ============================================================
  // APP SHELL — state + routing + modal + persistence
  // ============================================================
  const App = () => {
    // Auth gate. Show the LoginScreen if there's no valid session token in localStorage.
    // BACKEND_ENABLED off bypasses login (useful for local-only demo testing).
    const [authToken, setAuthToken] = React.useState(() => MMT_CONFIG.BACKEND_ENABLED ? getSessionToken() : 'no-backend');
    if (!authToken) {
      return <LoginScreen onSuccess={(t) => setAuthToken(t)} />;
    }

    function signOut() {
      // Best-effort server-side revoke; even if it fails, clear the local token.
      callBackend('logout', {});
      clearSessionToken();
      setAuthToken(null);
    }

    // Hydrate from localStorage if present, else use seed data.
    const initial = storage.load();
    const [route, setRoute]             = React.useState('dashboard');
    const [filter, setFilter]           = React.useState('all');
    const [requests, setRequests]       = React.useState(() => initial?.requests   ?? SEED_REQUESTS);
    const [attendance, setAttendance]   = React.useState(() => initial?.attendance ?? SEED_RECENT_ATTENDANCE);
    const [modalOpen, setModalOpen]     = React.useState(false);
    const [editingRequest, setEditingRequest] = React.useState(null);
    const [toast, setToast]             = React.useState(null);
    const [, bump] = React.useReducer(x => x + 1, 0);

    // Persist on every meaningful change. (Tracker is now derived from attendance — no state to save.)
    React.useEffect(() => {
      storage.save({ requests, attendance });
    }, [requests, attendance]);

    // Cross-device sync: hydrate from the Apps Script backend on mount, on tab-focus,
    // and on a slow background poll (30s). The poll skips refreshing while any write
    // is in-flight so a fetched snapshot can't clobber an optimistic local change.
    React.useEffect(() => {
      if (!MMT_CONFIG.BACKEND_ENABLED || !MMT_CONFIG.APPS_SCRIPT_URL) return;
      let cancelled = false;

      async function refresh(initial) {
        // Don't refresh while writes are in flight — would overwrite local changes
        // with a not-yet-up-to-date server snapshot.
        if (!initial && window.__mmtPendingWrites && window.__mmtPendingWrites() > 0) return;
        try {
          const [serverMakeups, serverAttendance] = await Promise.all([
            callBackend('listMakeups'),
            callBackend('listAttendance'),
          ]);
          if (cancelled) return;
          // Normalize date/time fields so the portal always renders clean strings even
          // if the backend sends ISO timestamps or JS Date.toString().
          if (Array.isArray(serverMakeups)) {
            setRequests(serverMakeups.map(r => ({
              ...r,
              missedDate:   toISODate(r.missedDate),
              proposedDate: toISODate(r.proposedDate),
              proposedTime: toHHMM(r.proposedTime),
            })));
          }
          if (Array.isArray(serverAttendance)) {
            setAttendance(serverAttendance.map(r => ({
              ...r,
              date: toISODate(r.date),
            })));
          }
          if (initial) showToast('Synced with Google Sheet.');
        } catch (err) {
          if (initial) showToast('Backend unreachable — using local copy.');
          console.warn('Backend fetch failed:', err);
        }
      }

      refresh(true);
      const onVisibility = () => { if (document.visibilityState === 'visible') refresh(false); };
      document.addEventListener('visibilitychange', onVisibility);
      // Auto-refresh every 30 seconds while the tab is visible.
      const pollId = setInterval(() => {
        if (document.visibilityState === 'visible') refresh(false);
      }, 30000);
      return () => {
        cancelled = true;
        document.removeEventListener('visibilitychange', onVisibility);
        clearInterval(pollId);
      };
    /* eslint-disable-next-line */ }, []);

    // Hide the splash once React has rendered.
    React.useEffect(() => {
      const s = document.getElementById('splash');
      if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 300); }
    }, []);

    function addStudent({ nickname, fullName, classId }) {
      if (!STUDENTS_BY_CLASS[classId]) STUDENTS_BY_CLASS[classId] = [];
      STUDENTS_BY_CLASS[classId].push(nickname);
      if (fullName) FULL_NAME_BY_NICK[nickname] = fullName;
      bump();
      callBackend('addStudent', { nickname, fullName, classId });
    }
    function removeStudent(classId, nickname) {
      if (STUDENTS_BY_CLASS[classId]) {
        STUDENTS_BY_CLASS[classId] = STUDENTS_BY_CLASS[classId].filter(s => s !== nickname);
      }
      bump();
      showToast(`Removed ${nickname} from ${classId}.`);
      callBackend('removeStudent', { classId, nickname });
    }
    function moveStudent(nickname, fromClass, toClass) {
      if (fromClass === toClass) return;
      if (STUDENTS_BY_CLASS[fromClass]) {
        STUDENTS_BY_CLASS[fromClass] = STUDENTS_BY_CLASS[fromClass].filter(s => s !== nickname);
      }
      if (!STUDENTS_BY_CLASS[toClass]) STUDENTS_BY_CLASS[toClass] = [];
      if (!STUDENTS_BY_CLASS[toClass].includes(nickname)) STUDENTS_BY_CLASS[toClass].push(nickname);
      bump();
      showToast(`Moved ${nickname}: ${fromClass} → ${toClass}.`);
      callBackend('moveStudent', { nickname, fromClass, toClass });
    }
    function addClass(cls) {
      CLASSES.push(cls);
      // Keep CLASSES sorted by day-of-week, then time, then id — matches dropdown order.
      CLASSES.sort((a, b) => {
        const dayDiff = (DAY_ORDER[a.day] ?? 99) - (DAY_ORDER[b.day] ?? 99);
        if (dayDiff !== 0) return dayDiff;
        const timeDiff = (a.time || '').localeCompare(b.time || '');
        if (timeDiff !== 0) return timeDiff;
        return (a.id || '').localeCompare(b.id || '');
      });
      STUDENTS_BY_CLASS[cls.id] = STUDENTS_BY_CLASS[cls.id] ?? [];
      bump();
      callBackend('addClass', cls);
    }
    function removeClass(classId) {
      const idx = CLASSES.findIndex(c => c.id === classId);
      if (idx >= 0) CLASSES.splice(idx, 1);
      delete STUDENTS_BY_CLASS[classId];
      bump();
      showToast(`Removed class ${classId}.`);
      callBackend('removeClass', { classId });
    }

    const toastTimer = React.useRef(null);
    function showToast(msg) {
      setToast(msg);
      if (toastTimer.current) clearTimeout(toastTimer.current);
      toastTimer.current = setTimeout(() => setToast(null), 2800);
    }

    function navigate(r, f = null) {
      setRoute(r);
      if (f) setFilter(f); else if (r !== 'makeup') setFilter('all');
      if (typeof window !== 'undefined') window.scrollTo({ top: 0 });
    }

    function updateRequest(id, patch) {
      setRequests(rs => rs.map(r => r.id === id ? { ...r, ...patch } : r));
      if (patch.teacherConfirmed)          showToast('Teacher confirmed.');
      else if (patch.adminApproved)        showToast('Admin manager approved — add to Google Calendar next.');
      else if (patch.calendarEventCreated) showToast('Marked as scheduled. All done!');
      callBackend('updateMakeup', { id, updates: patch });
    }

    function addRequest(form) {
      const nextNum = requests.reduce((m, r) => Math.max(m, parseInt(r.id.replace(/\D/g, ''), 10) || 0), 0) + 1;
      const newReq = {
        id: 'MR-' + String(nextNum).padStart(4, '0'),
        ...form,
        teacherConfirmed: false,
        adminApproved: false,
        calendarEventCreated: false,
      };
      setRequests(rs => [newReq, ...rs]);
      setModalOpen(false);
      setEditingRequest(null);
      showToast(`Request ${newReq.id} created — pending ${newReq.teacher}'s confirmation.`);
      navigate('makeup', 'pending-teacher');
      callBackend('createMakeup', newReq);
    }

    function editRequest(form) {
      if (!editingRequest?.id) return;
      const id = editingRequest.id;
      setRequests(rs => rs.map(r => r.id === id ? { ...r, ...form } : r));
      setModalOpen(false);
      setEditingRequest(null);
      showToast(`Request ${id} updated.`);
      callBackend('updateMakeup', { id, updates: form });
    }

    function openEditRequest(req) {
      setEditingRequest(req);
      setModalOpen(true);
    }

    // Opens the makeup-request modal pre-filled from an absence attendance row.
    // No id is set, so on submit the modal calls addRequest (creating a new MR).
    function openCreateFromAbsence(absence) {
      const cls = CLASSES.find(c => c.id === absence.classId);
      setEditingRequest({
        // No id → treated as a brand new request, but with fields pre-filled.
        studentNickname: absence.studentNickname,
        classId: absence.classId,
        teacher: cls?.teacher || '',
        missedDate: toISODate(absence.date),
        proposedDate: todayISO(),
        proposedTime: '10:00',
        reason: '',
        notes: '',
      });
      setModalOpen(true);
    }

    function removeRequest(req) {
      if (!window.confirm(`Delete makeup request ${req.id} for ${req.studentNickname}? This cannot be undone.`)) return;
      setRequests(rs => rs.filter(r => r.id !== req.id));
      showToast(`Request ${req.id} deleted.`);
      callBackend('removeMakeup', { id: req.id });
    }

    function closeModal() {
      setModalOpen(false);
      setEditingRequest(null);
    }

    function updateAttendance(id, patch) {
      const target = attendance.find(r => r.id === id);
      if (!target) return;
      setAttendance(a => a.map(r => r.id === id ? { ...r, ...patch } : r));
      showToast(`Updated ${target.studentNickname} (${target.classId}).`);
      callBackend('updateAttendance', { id, updates: patch });
    }

    function removeAttendance(row) {
      if (!window.confirm(`Delete attendance entry for ${row.studentNickname} on ${row.date} (${row.classId})?`)) return;
      setAttendance(a => a.filter(r => r.id !== row.id));
      showToast(`Deleted attendance for ${row.studentNickname}.`);
      callBackend('removeAttendance', { id: row.id });
    }

    function logSession(rows) {
      if (!rows || rows.length === 0) return;
      setAttendance(a => [...rows, ...a]);
      callBackend('createAttendance', { rows });
    }

    // Headcount = derived entirely from attendance log (not approval status).
    //   • Expected = current roster size for the class
    //   • Actual   = students marked Present in this week's attendance for the class
    //   • Makeups  = "Makeup attendee" rows attributed to that teacher in this week (regular-class slot)
    //   • Trials   = "Trial" rows in this week (regular-class slot)
    //   • Workshop = "Workshop attendee" rows in this week (workshop slot)
    //   • Extra teacher-level rows for off-schedule makeups and workshops
    const headcountRows = React.useMemo(() => {
      const inWeek = (d) => d >= HEADCOUNT_WEEK.start && d <= HEADCOUNT_WEEK.end;

      // Aggregate weekly attendance per (classId, teacher) bucket.
      const buckets = {}; // key = `${classId}|${teacher}` → { present, makeups, trials, workshops }
      for (const a of attendance) {
        if (!inWeek(a.date)) continue;
        const teacher = a.teacher
          || (CLASSES.find(c => c.id === a.classId)?.teacher)
          || 'UNASSIGNED';
        const key = `${a.classId}|${teacher}`;
        if (!buckets[key]) buckets[key] = { classId: a.classId, teacher, present: 0, makeups: 0, trials: 0, workshops: 0 };
        if      (a.status === 'Present')           buckets[key].present++;
        else if (a.status === 'Makeup attendee')   buckets[key].makeups++;
        else if (a.status === 'Trial')             buckets[key].trials++;
        else if (a.status === 'Workshop attendee') buckets[key].workshops++;
      }

      const rows = [];

      // One row per regular class.
      for (const cls of CLASSES) {
        const key = `${cls.id}|${cls.teacher}`;
        const b = buckets[key] ?? { present: 0, makeups: 0, trials: 0, workshops: 0 };
        const expected = (STUDENTS_BY_CLASS[cls.id] ?? []).length;
        rows.push({
          classId: cls.id,
          className: cls.name,
          teacher: cls.teacher,
          expected,
          actual:   b.present,
          makeups:  b.makeups,
          trials:   b.trials,
          workshops: 0, // workshops never happen during a regular slot
          total: b.present + b.makeups + b.trials,
          isSpecial: false,
        });
      }

      // Extra row per teacher for off-schedule makeups (if any in week).
      const offByTeacher = {};
      const workshopByTeacher = {};
      for (const key in buckets) {
        const b = buckets[key];
        if (b.classId === OFF_SCHEDULE_ID && b.makeups > 0) {
          offByTeacher[b.teacher] = (offByTeacher[b.teacher] ?? 0) + b.makeups;
        }
        if (b.classId === WORKSHOP_ID && b.workshops > 0) {
          workshopByTeacher[b.teacher] = (workshopByTeacher[b.teacher] ?? 0) + b.workshops;
        }
      }
      for (const teacher of Object.keys(offByTeacher).sort()) {
        const n = offByTeacher[teacher];
        rows.push({
          classId: OFF_SCHEDULE_ID,
          className: 'Off-schedule makeups',
          teacher, expected: 0, actual: 0,
          makeups: n, trials: 0, workshops: 0,
          total: n,
          isSpecial: true,
        });
      }
      for (const teacher of Object.keys(workshopByTeacher).sort()) {
        const n = workshopByTeacher[teacher];
        rows.push({
          classId: WORKSHOP_ID,
          className: 'Workshops',
          teacher, expected: 0, actual: 0,
          makeups: 0, trials: 0, workshops: n,
          total: n,
          isSpecial: true,
        });
      }

      return rows;
    }, [attendance]);

    let screen;
    if (route === 'dashboard') {
      screen = <Dashboard requests={requests} attendance={attendance} onNavigate={navigate} onNewRequest={() => { setEditingRequest(null); setModalOpen(true); }} onCreateFromAbsence={openCreateFromAbsence} />;
    } else if (route === 'makeup') {
      screen = <MakeupList requests={requests} initialFilter={filter} onUpdateRequest={updateRequest} onEditRequest={openEditRequest} onDeleteRequest={removeRequest} onNewRequest={() => { setEditingRequest(null); setModalOpen(true); }} onToast={showToast} />;
    } else if (route === 'attendance') {
      screen = <Attendance recent={attendance} onLogSession={logSession} onUpdateAttendance={updateAttendance} onDeleteAttendance={removeAttendance} onToast={showToast} />;
    } else if (route === 'headcount') {
      screen = <Headcount headcountRows={headcountRows} onToast={showToast} />;
    } else if (route === 'roster') {
      screen = <Roster
        onAddStudent={addStudent}
        onAddClass={addClass}
        onRemoveStudent={removeStudent}
        onMoveStudent={moveStudent}
        onRemoveClass={removeClass}
        onToast={showToast}
      />;
    }

    return (
      <Frame>
        <Nav active={route} onNavigate={navigate} onNewRequest={() => { setEditingRequest(null); setModalOpen(true); }} onSignOut={signOut} />
        <main className="max-w-6xl w-full mx-auto px-4 sm:px-6 py-8 flex-1">{screen}</main>
        <footer className="max-w-6xl w-full mx-auto px-4 sm:px-6 py-8 text-center text-xs text-navy-300">
          Math Mavens Thailand · Internal portal · The Sheet remains the source of truth.
        </footer>

        {modalOpen && <MakeupModal initial={editingRequest} onSubmit={editingRequest?.id ? editRequest : addRequest} onClose={closeModal} />}
        <Toast toast={toast} />
      </Frame>
    );
  };

  // Mount.
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
