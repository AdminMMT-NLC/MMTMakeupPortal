<style>
  html, body { margin: 0; font-family: Inter, system-ui, sans-serif; }
  /* Soft-gradient backdrop — white easing into light blue across the whole portal. */
  body {
    min-height: 100vh;
    background: linear-gradient(145deg, #FFFFFF 0%, #EAF4FE 42%, #C3DDF8 100%);
    background-attachment: fixed;
  }
  /* Uniform modal entrance. Transform-only so the element is always visible even if a
     throttled/background tab never advances the animation (opacity must never gate it). */
  @keyframes pop-in { from { transform: translateY(10px) scale(0.98); } to { transform: translateY(0) scale(1); } }
  @keyframes fade-in { from { opacity: 0.35; } to { opacity: 1; } }
  .animate-pop  { animation: pop-in .24s cubic-bezier(.16,1,.3,1); }
  .animate-fade { animation: fade-in .2s ease-out; }
  .live-dot { width: 8px; height: 8px; border-radius: 999px; background: #2A9D8F; box-shadow: 0 0 0 0 rgba(42,157,143,0.6); animation: pulse 1.8s infinite; display: inline-block; }
  @keyframes pulse {
    0%  { box-shadow: 0 0 0 0 rgba(42,157,143,0.55); }
    70% { box-shadow: 0 0 0 10px rgba(42,157,143,0); }
    100%{ box-shadow: 0 0 0 0 rgba(42,157,143,0); }
  }
  /* Initial loading splash so users never see a blank page while Babel compiles */
  .splash { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; background: linear-gradient(180deg,#F6F8FC,#EDF2FA); z-index: 50; }
  .splash .logo { width: 56px; height: 56px; border-radius: 14px; background: #0B2545; color: #F4D35E; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:28px; letter-spacing:-1px; box-shadow: 0 6px 24px rgba(11,37,69,0.18); }
  .splash .sub { color: #4F6CA0; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600; }
  .splash.hidden { opacity: 0; pointer-events: none; transition: opacity .25s ease-out; }
</style>

<!-- ============================================================
     CONFIG — plain JS, runs before Babel. Edit these to go live.
     ============================================================
     • Leave APPS_SCRIPT_URL blank to run as a self-contained demo
       (seed data + localStorage persistence).
     • Set both fields and BACKEND_ENABLED = true to make every
       mutation also POST to the Apps Script Web App, so the Sheet
       stays in sync. See apps-script/MMT_WebApp.gs for the server.
     ============================================================ -->
<script>
  window.MMT_CONFIG = {
    APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwBru9AnzMNnwgf0yhcGxUUz3PDYZKacRFo_K24DkyNlhP3rhHUmnMFwrmPPT4gdPZB/exec',
    BACKEND_ENABLED: true,
    STORAGE_KEY: 'mmt-portal-v1',
    // Auth via login screen + session token. The password lives only in the Apps Script
    // (Script Properties). No secrets are embedded in this client-side HTML.
    TOKEN_KEY:    'mmt-portal-v1:token',
    TOKEN_EXP_KEY:'mmt-portal-v1:tokenExp',
    // Academic calendar — Lesson 1 starts Sat 13 Sep 2025, year goes to Lesson 36 (ending Fri 3 Jul 2026).
    // ACADEMIC_BREAKS lists the Saturdays of weeks that DON'T count as lessons (workshop weeks
    // and other non-class weeks). Sourced from the 2025-2026 MMT academic calendar.
    ACADEMIC_YEAR_START: '2025-09-13',
    TOTAL_LESSONS: 36,
    ACADEMIC_BREAKS: [
      '2025-12-13', // Workshop week (mid-Dec)
      '2025-12-20', // Winter break (no class)
      '2025-12-27', // Winter break (no class)
      '2026-04-04', // Workshop week (incl. Chakri Memorial Day)
      '2026-04-11', // Songkran break (no class)
      '2026-05-30', // Workshop week (incl. Visakha Bucha Day)
    ],
  };
</script>

  // Auto-derive the Saturday→Friday week containing TODAY (or the real current date).
  function weekContaining(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const dow = d.getDay();           // 0=Sun … 6=Sat
    const daysBack = (dow + 1) % 7;   // distance back to most recent Saturday
    const sat = new Date(d); sat.setDate(d.getDate() - daysBack);
    const fri = new Date(sat); fri.setDate(sat.getDate() + 6);
    const fmt = (x) => `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
    return { start: fmt(sat), end: fmt(fri) };
  }
  const HEADCOUNT_WEEK = weekContaining(todayISO());

  // Title format: [MAKEUP - <classId>] <Student> - Lesson <n>, 1.5h duration, Asia/Bangkok.
  function buildCalendarUrl(r) {
    // Defensive: normalise in case raw Date strings sneak in from the backend.
    const propDate = toISODate(r.proposedDate);
    const propTime = toHHMM(r.proposedTime);
    const [y, m, d] = propDate.split('-').map(Number);
    const [hh, mm]  = propTime.split(':').map(Number);
    const pad = (n) => String(n).padStart(2, '0');
    const startLocal = `${y}${pad(m)}${pad(d)}T${pad(hh)}${pad(mm)}00`;
    let endH = hh + 1, endM = mm + 30;
    if (endM >= 60) { endM -= 60; endH += 1; }
    const endLocal = `${y}${pad(m)}${pad(d)}T${pad(endH)}${pad(endM)}00`;
    const title = `[MAKEUP - ${r.classId}] ${r.studentNickname} - Lesson ${r.lesson}`;
    const details = [
      `Student: ${r.studentNickname}`,
      `Class: ${r.classId}`,
      `Lesson missed: ${r.lesson}`,
      `Teacher: ${r.teacher}`,
      `Original missed date: ${prettyDate(r.missedDate)}`,
      `Reason: ${r.reason}`,
      r.notes ? `Notes: ${r.notes}` : '',
      ``,
      `Request ID: ${r.id}`,
    ].filter(Boolean).join('\n');
    const params = new URLSearchParams({
      action: 'TEMPLATE',
      text:   title,
      dates:  `${startLocal}/${endLocal}`,
      ctz:    'Asia/Bangkok',
      details,
    });
    return `https://calendar.google.com/calendar/render?${params.toString()}`;
  }

  function downloadCsv(filename, rows) {
    const esc = (v) => {
      const s = v == null ? '' : String(v);
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    };
    const body = rows.map(r => r.map(esc).join(',')).join('\n');
    // Prepend UTF-8 BOM so Excel opens special characters (e.g. middle-dot, arrow)
    // correctly instead of showing CP1252 mojibake.
    const blob = new Blob(['﻿', body], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  // ============================================================

  const PIE_PALETTE = ['#0B2545', '#3B82F6', '#2A9D8F', '#F4D35E', '#F0B429', '#7C92B9', '#A9B8D2', '#E76F51'];

  const PieChart = ({ data, size = 220, onSliceClick }) => {
    const [hover, setHover] = React.useState(null);
    const total = data.reduce((a, b) => a + b.count, 0) || 1;
    const cx = size / 2, cy = size / 2;
    const R  = size * 0.42;
    const r  = size * 0.26;

    let angle = -Math.PI / 2;
    const slices = data.map((d, i) => {
      const frac = d.count / total;
      let path;
      if (frac >= 0.9999) {
        // Single slice covering the entire ring — use two semicircle arcs to avoid
        // a degenerate "M point → A back to same point" path that renders as nothing.
        path = [
          `M ${cx} ${cy - R}`,
          `A ${R} ${R} 0 1 1 ${cx} ${cy + R}`,
          `A ${R} ${R} 0 1 1 ${cx} ${cy - R}`,
          `Z`,
          `M ${cx} ${cy - r}`,
          `A ${r} ${r} 0 1 0 ${cx} ${cy + r}`,
          `A ${r} ${r} 0 1 0 ${cx} ${cy - r}`,
          `Z`,
        ].join(' ');
        angle = angle + Math.PI * 2;
      } else {
        const a0 = angle;
        const a1 = angle + frac * Math.PI * 2;
        angle = a1;
        const large = a1 - a0 > Math.PI ? 1 : 0;
        const x0o = cx + R * Math.cos(a0), y0o = cy + R * Math.sin(a0);
        const x1o = cx + R * Math.cos(a1), y1o = cy + R * Math.sin(a1);
        const x0i = cx + r * Math.cos(a1), y0i = cy + r * Math.sin(a1);
        const x1i = cx + r * Math.cos(a0), y1i = cy + r * Math.sin(a0);
        path = [
          `M ${x0o} ${y0o}`,
          `A ${R} ${R} 0 ${large} 1 ${x1o} ${y1o}`,
          `L ${x0i} ${y0i}`,
          `A ${r} ${r} 0 ${large} 0 ${x1i} ${y1i}`,
          'Z',
        ].join(' ');
      }
      return { ...d, path, color: PIE_PALETTE[i % PIE_PALETTE.length], frac, i };
    });

    const focused = hover != null ? slices[hover] : null;
    const centerLabel = focused ? `${focused.count}` : `${total}`;
    const centerSub   = focused ? focused.reason : 'total';
    const centerPct   = focused ? `${Math.round(focused.frac * 100)}%` : '';

    if (data.reduce((a, b) => a + b.count, 0) === 0) {
      return <div className="text-sm text-navy-400 py-10 text-center">No absences in this period.</div>;
    }

    return (
      <div className="flex items-center gap-5 flex-wrap">
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="flex-shrink-0">
          {slices.map((s) => {
            const isHover = hover === s.i;
            return (
              <path key={s.i} d={s.path} fill={s.color} fillRule="evenodd"
                opacity={hover == null || isHover ? 1 : 0.35}
                style={{
                  transition: 'opacity 160ms, transform 200ms',
                  transformOrigin: `${cx}px ${cy}px`,
                  transform: isHover ? 'scale(1.04)' : 'scale(1)',
                  cursor: onSliceClick ? 'pointer' : 'default',
                }}
                onMouseEnter={() => setHover(s.i)}
                onMouseLeave={() => setHover(null)}
                onClick={() => onSliceClick?.(s.reason)}
              />
            );
          })}
          <text x={cx} y={cy - 6} textAnchor="middle" className="fill-navy" style={{ fontSize: 28, fontWeight: 700 }}>{centerLabel}</text>
          <text x={cx} y={cy + 14} textAnchor="middle" className="fill-navy-400" style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.12em' }}>{centerSub}</text>
          {centerPct && <text x={cx} y={cy + 30} textAnchor="middle" className="fill-navy-500" style={{ fontSize: 11, fontWeight: 600 }}>{centerPct}</text>}
        </svg>
        <ul className="text-sm flex-1 min-w-0 space-y-1.5">
          {slices.map((s) => {
            const isHover = hover === s.i;
            return (
              <li key={s.i}
                onMouseEnter={() => setHover(s.i)}
                onMouseLeave={() => setHover(null)}
                onClick={() => onSliceClick?.(s.reason)}
                className={[
                  'flex items-center gap-2 px-2 py-1 rounded-md transition',
                  isHover ? 'bg-navy-50' : '',
                  onSliceClick ? 'cursor-pointer' : '',
                ].join(' ')}
              >
                <span className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{ background: s.color }} />
                <span className="flex-1 truncate text-navy-600">{s.reason}</span>
                <span className="tabular-nums font-semibold text-navy">{s.count}</span>
                <span className="tabular-nums text-xs text-navy-400 w-9 text-right">{Math.round(s.frac * 100)}%</span>
              </li>
            );
          })}
        </ul>
      </div>
    );
  };
