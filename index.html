<style type="text/tailwindcss">
  @layer components {
    .btn        { @apply inline-flex items-center justify-center gap-2 px-4 py-2 rounded-lg font-medium text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed; }

    let endH = hh + 1, endM = mm + 30;
    if (endM >= 60) { endM -= 60; endH += 1; }
    const endLocal = `${y}${pad(m)}${pad(d)}T${pad(endH)}${pad(endM)}00`;
    const title = `[MAKEUP - ${r.classId}] ${r.studentNickname} - Lesson ${r.lesson}`;
    const details = [
      `Student: ${r.studentNickname}`,
      `Class: ${r.classId}`,
      `Lesson missed: ${r.lesson}`,
      `Teacher: ${r.teacher}`,
      `Original missed date: ${r.missedDate}`,
      `Reason: ${r.reason}`,
      r.notes ? `Notes: ${r.notes}` : '',
      ``,
      `Request ID: ${r.id}`,
    ].filter(Boolean).join('\n');
    const params = new URLSearchParams({
      action: 'TEMPLATE',
      text:   title,
      dates:  `${startLocal}/${endLocal}`,
      ctz:    'Asia/Bangkok',
      details,
    });
    return `https://calendar.google.com/calendar/render?${params.toString()}`;
  }

  function downloadCsv(filename, rows) {
    const esc = (v) => {
      const s = v == null ? '' : String(v);
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    };
    const body = rows.map(r => r.map(esc).join(',')).join('\n');
    const blob = new Blob([body], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  const PIE_PALETTE = ['#0B2545', '#3B82F6', '#2A9D8F', '#F4D35E', '#F0B429', '#7C92B9', '#A9B8D2', '#E76F51'];

  const PieChart = ({ data, size = 220 }) => {
    const [hover, setHover] = React.useState(null);
    const total = data.reduce((a, b) => a + b.count, 0) || 1;
    const cx = size / 2, cy = size / 2;
    const R  = size * 0.42;
    const r  = size * 0.26;

    let angle = -Math.PI / 2;
    const slices = data.map((d, i) => {
      const frac = d.count / total;
      const a0 = angle;
      const a1 = angle + frac * Math.PI * 2;
      angle = a1;
      const large = a1 - a0 > Math.PI ? 1 : 0;
      const x0o = cx + R * Math.cos(a0), y0o = cy + R * Math.sin(a0);
      const x1o = cx + R * Math.cos(a1), y1o = cy + R * Math.sin(a1);
      const x0i = cx + r * Math.cos(a1), y0i = cy + r * Math.sin(a1);
      const x1i = cx + r * Math.cos(a0), y1i = cy + r * Math.sin(a0);
      const path = [
        `M ${x0o} ${y0o}`,
        `A ${R} ${R} 0 ${large} 1 ${x1o} ${y1o}`,
        `L ${x0i} ${y0i}`,
        `A ${r} ${r} 0 ${large} 0 ${x1i} ${y1i}`,
        'Z',
      ].join(' ');
      return { ...d, path, color: PIE_PALETTE[i % PIE_PALETTE.length], frac, i };
    });

    const focused = hover != null ? slices[hover] : null;
    const centerLabel = focused ? `${focused.count}` : `${total}`;
    const centerSub   = focused ? focused.reason : 'total';
    const centerPct   = focused ? `${Math.round(focused.frac * 100)}%` : '';

    if (data.reduce((a, b) => a + b.count, 0) === 0) {
      return <div className="text-sm text-navy-400 py-10 text-center">No absences in this period.</div>;
    }

    return (
      <div className="flex items-center gap-5 flex-wrap">
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="flex-shrink-0">
          {slices.map((s) => {
            const isHover = hover === s.i;
            return (
              <path key={s.i} d={s.path} fill={s.color}
                opacity={hover == null || isHover ? 1 : 0.35}
                style={{
                  transition: 'opacity 160ms, transform 200ms',
                  transformOrigin: `${cx}px ${cy}px`,
                  transform: isHover ? 'scale(1.04)' : 'scale(1)',
                  cursor: 'pointer',
                }}
                onMouseEnter={() => setHover(s.i)}
                onMouseLeave={() => setHover(null)}
              />
            );
          })}
          <text x={cx} y={cy - 6} textAnchor="middle" className="fill-navy" style={{ fontSize: 28, fontWeight: 700 }}>{centerLabel}</text>
          <text x={cx} y={cy + 14} textAnchor="middle" className="fill-navy-400" style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.12em' }}>{centerSub}</text>
          {centerPct && <text x={cx} y={cy + 30} textAnchor="middle" className="fill-navy-500" style={{ fontSize: 11, fontWeight: 600 }}>{centerPct}</text>}
        </svg>
        <ul className="text-sm flex-1 min-w-0 space-y-1.5">
          {slices.map((s) => {
            const isHover = hover === s.i;
            return (
              <li key={s.i}
                onMouseEnter={() => setHover(s.i)}
                onMouseLeave={() => setHover(null)}
                className={[
                  'flex items-center gap-2 px-2 py-1 rounded-md cursor-pointer transition',
                  isHover ? 'bg-navy-50' : '',
                ].join(' ')}
              >
                <span className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{ background: s.color }} />
                <span className="flex-1 truncate text-navy-600">{s.reason}</span>
                <span className="tabular-nums font-semibold text-navy">{s.count}</span>
                <span className="tabular-nums text-xs text-navy-400 w-9 text-right">{Math.round(s.frac * 100)}%</span>
              </li>
            );
          })}
        </ul>
      </div>
    );
  };

                <button type="submit" className="btn-primary">Submit request</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    );
  };

  const MakeupCard = ({ request: r, onUpdate }) => {
    const status = deriveStatus(r);
    const calendarUrl = buildCalendarUrl(r);
    return (
      <article className={['card p-5 transition', r.calendarEventCreated ? 'bg-navy-50/40' : ''].join(' ')}>
        <header className="flex items-start justify-between gap-4 flex-wrap">
          <div>
            <div className="flex items-baseline gap-2 flex-wrap">
              <h3 className="text-lg font-semibold text-navy">{r.studentNickname}</h3>
              <span className="text-sm text-navy-400">· {r.classId}</span>
              <span className="chip bg-navy-50 text-navy-600 border border-navy-100 !text-[10px] !uppercase tracking-wider">Lesson {r.lesson}</span>
              <span className="text-xs text-navy-300">· {r.teacher}</span>
            </div>
            <p className="text-sm text-navy-500 mt-0.5">
              Missed <strong>{r.missedDate}</strong> → Proposed <strong>{r.proposedDate} {r.proposedTime}</strong>{' '}
              <span className="text-navy-300">· 1.5h</span>
            </p>
          </div>
          <StatusBadge status={status} />
        </header>

        {(r.reason || r.notes) && (
          <div className="mt-3 text-sm text-navy-600 bg-navy-50/60 rounded-lg p-3">
            {r.reason && <div><strong>Reason:</strong> {r.reason}</div>}
            {r.notes && <div className="text-navy-500 mt-1">{r.notes}</div>}
          </div>
        )}

        <div className="mt-4 flex flex-wrap gap-2 items-center">
          {!r.teacherConfirmed && (
            <button className="btn-info" onClick={() => onUpdate(r.id, { teacherConfirmed: true })}>Teacher confirm</button>
          )}
          {r.teacherConfirmed && !r.adminApproved && (
            <button className="btn-success" onClick={() => onUpdate(r.id, { adminApproved: true })}>Admin Manager approve</button>
          )}
          {r.adminApproved && !r.calendarEventCreated && (
            <>
              <a href={calendarUrl} target="_blank" rel="noopener noreferrer" className="btn-accent">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                + Add to Google Calendar
              </a>
              <button className="btn-ghost" onClick={() => onUpdate(r.id, { calendarEventCreated: true })}>Mark scheduled</button>
              <span className="text-[11px] font-mono text-navy-400 ml-1 truncate max-w-[280px]" title={`[MAKEUP - ${r.classId}] ${r.studentNickname} - Lesson ${r.lesson}`}>
                [MAKEUP - {r.classId}] {r.studentNickname} - Lesson {r.lesson}
              </span>
            </>
          )}
          {r.calendarEventCreated && (
            <span className="text-xs text-leaf-600 font-medium flex items-center gap-1.5">
              <span className="w-2 h-2 rounded-full bg-leaf" /> On calendar · all done
            </span>
          )}
          <div className="ml-auto text-xs text-navy-300 font-mono">{r.id}</div>
        </div>
      </article>
    );
  };

  const FILTERS = [
    { id: 'all', label: 'All' },
    { id: 'pending-teacher', label: 'Pending teacher' },
    { id: 'pending-admin', label: 'Pending admin' },
    { id: 'approved-not-scheduled', label: 'Approved · need calendar' },
    { id: 'scheduled', label: 'Scheduled' },
  ];

  const MakeupList = ({ requests, onUpdateRequest, onNewRequest, initialFilter = 'all', onToast }) => {
    const [filter, setFilter] = React.useState(initialFilter);
    const [query, setQuery]   = React.useState('');
    React.useEffect(() => setFilter(initialFilter), [initialFilter]);

    function filtered() {
      let base = requests;
      if (filter === 'pending-teacher')        base = base.filter(r => !r.teacherConfirmed);
      else if (filter === 'pending-admin')     base = base.filter(r => r.teacherConfirmed && !r.adminApproved);
      else if (filter === 'approved-not-scheduled') base = base.filter(r => r.adminApproved && !r.calendarEventCreated);
      else if (filter === 'scheduled')         base = base.filter(r => r.calendarEventCreated);
      if (query.trim()) {
        const q = query.toLowerCase();
        base = base.filter(r =>
          r.studentNickname.toLowerCase().includes(q) ||
          r.classId.toLowerCase().includes(q) ||
          r.teacher.toLowerCase().includes(q));
      }
      return base;
    }

    function handleExport(from, to) {
      const inRange = (d) => d >= from && d <= to;
      const matches = requests.filter(r => inRange(r.missedDate) || inRange(r.proposedDate));
      const rows = [
        ['Request ID','Class','Student','Lesson','Teacher','Missed date','Proposed date','Proposed time','Reason','Status','Notes'],
        ...matches.map(r => [r.id, r.classId, r.studentNickname, r.lesson, r.teacher, r.missedDate, r.proposedDate, r.proposedTime, r.reason, deriveStatus(r), r.notes || ''])
      ];
      downloadCsv(`makeup-requests_${from}_to_${to}.csv`, rows);
      onToast?.(`Exported ${matches.length} makeup request${matches.length === 1 ? '' : 's'} (${from} → ${to})`);
    }

    const rows = filtered();

    return (
      <div className="space-y-6">
        <SectionHeader
          eyebrow="Workflow"
          title="Makeup Requests"
          description="Submit, approve, and schedule makeup classes. All classes are 1.5 hours."
          action={<button className="btn-accent" onClick={onNewRequest}>+ New Request</button>}
        />

        <div className="flex flex-wrap items-center gap-2">
          {FILTERS.map(f => (
            <button key={f.id} onClick={() => setFilter(f.id)}
              className={[
                'px-3 py-1.5 rounded-full text-xs font-medium transition',
                f.id === filter ? 'bg-navy text-white' : 'bg-white text-navy-600 border border-navy-100 hover:bg-navy-50'
              ].join(' ')}>{f.label}</button>
          ))}
          <input value={query} onChange={(e)=>setQuery(e.target.value)} className="input ml-auto max-w-xs" placeholder="Search by student, class, teacher…" />
        </div>

        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="text-xs text-navy-400">
            Showing <strong className="text-navy">{rows.length}</strong> of {requests.length} requests
          </div>
          <ExportRange label="makeup requests" onExport={handleExport} />
        </div>

        <div className="grid gap-3">
          {rows.map(r => <MakeupCard key={r.id} request={r} onUpdate={onUpdateRequest} />)}
          {rows.length === 0 && (
            <div className="card p-10 text-center text-sm text-navy-400">No requests in this view.</div>
          )}
        </div>
      </div>
    );
  };

  // ============================================================
  // ATTENDANCE — weekly tracker + log roster + recent log
  // ============================================================
  const STATUS_BTNS = ['Present', 'Absent (no notice)', 'Absent (pre-notified)'];

  const AttendanceChip = ({ status }) => {
    const map = {
      'Present':               'bg-leaf-100 text-leaf-600 border border-leaf-200',
      'Absent (no notice)':    'bg-red-100 text-red-700 border border-red-200',
      'Absent (pre-notified)': 'bg-sky-100 text-sky-600 border border-sky-200',
      'Makeup attendee':       'bg-sun-100 text-navy-700 border border-sun-300',
      'Trial':                 'bg-navy-50 text-navy-600 border border-navy-100',
    };
    return <span className={`chip ${map[status] ?? ''}`}>{status}</span>;
  };

  const WeeklyTracker = ({ tracker }) => {
    const [hover, setHover] = React.useState(null);
    return (
      <div className="card overflow-hidden">
        <div className="px-5 py-3 border-b border-navy-50 flex items-center justify-between flex-wrap gap-2">
          <div>
            <h2 className="font-semibold text-navy">Weekly attendance tracker</h2>
            <p className="text-xs text-navy-400">Week of <strong>Sat 9 May → Fri 15 May 2026</strong> · stacked bars show Present / Pre-notified / No notice.</p>
          </div>
          <div className="flex items-center gap-3 text-[11px] text-navy-500 flex-wrap">
            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-leaf" /> Present</span>
            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-sky" /> Pre-notified</span>
            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-red-400" /> No notice</span>
            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-navy-100" /> Not yet logged</span>
          </div>
        </div>

        <ul className="divide-y divide-navy-50">
          {tracker.map((c, i) => {
            const cls = CLASSES.find(x => x.id === c.classId);
            const logged = c.status === 'logged';
            const accounted = c.present + c.preNotified + c.noNotice;
            const unlogged  = logged ? Math.max(0, c.expected - accounted) : c.expected;
            const max = c.expected || 1;
            const pct = (n) => `${(n / max) * 100}%`;
            const isHover = hover === i;
            return (
              <li key={c.classId + i}
                onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}
                className={`px-5 py-3 grid grid-cols-12 gap-3 items-center transition ${isHover ? 'bg-navy-50/40' : ''}`}>
                <div className="col-span-4 sm:col-span-2">
                  <div className="font-mono text-sm text-navy font-semibold">{c.classId}</div>
                  <div className="text-xs text-navy-400">{cls?.teacher ?? ''}</div>
                </div>
                <div className="col-span-4 sm:col-span-2 text-sm text-navy-600">
                  <div className="font-medium">{c.day} {c.time}</div>
                  <div className="text-xs text-navy-300">{logged ? 'Logged' : 'Not yet logged'}</div>
                </div>
                <div className="col-span-12 sm:col-span-6 order-last sm:order-none">
                  <div className="h-3 rounded-full bg-navy-50 overflow-hidden flex">
                    {logged ? (
                      <>
                        <div className="bg-leaf h-full transition-all"    style={{ width: pct(c.present) }} title={`Present: ${c.present}`} />
                        <div className="bg-sky h-full transition-all"     style={{ width: pct(c.preNotified) }} title={`Pre-notified: ${c.preNotified}`} />
                        <div className="bg-red-400 h-full transition-all" style={{ width: pct(c.noNotice) }} title={`No notice: ${c.noNotice}`} />
                        {unlogged > 0 && <div className="bg-navy-100 h-full" style={{ width: pct(unlogged) }} />}
                      </>
                    ) : (
                      <div className="h-full w-full" style={{
                        background: 'repeating-linear-gradient(45deg, #D6DEEC 0 6px, transparent 6px 12px)'
                      }} />
                    )}
                  </div>
                  <div className="mt-1 text-[11px] text-navy-400 flex gap-3 flex-wrap">
                    {logged ? (
                      <>
                        <span><strong className="text-leaf-600">{c.present}</strong> present</span>
                        {c.preNotified > 0 && <span><strong className="text-sky-600">{c.preNotified}</strong> pre-notified</span>}
                        {c.noNotice > 0    && <span><strong className="text-red-600">{c.noNotice}</strong> no notice</span>}
                      </>
                    ) : (
                      <span className="text-navy-300">Roster not submitted yet</span>
                    )}
                  </div>
                </div>
                <div className="col-span-4 sm:col-span-2 text-right">
                  <div className="text-xs text-navy-400 uppercase tracking-wider font-semibold">Attended</div>
                  <div className="font-bold tabular-nums text-navy">
                    {logged ? c.present : 0}<span className="text-navy-300 font-normal"> / {c.expected}</span>
                  </div>
                </div>
              </li>
            );
          })}
        </ul>
      </div>
    );
  };

  const Attendance = ({ tracker, recent, onLogSession, onToast }) => {
    const today = MMT_CONFIG.TODAY;
    const [date, setDate] = React.useState(today);
    const [classId, setClassId] = React.useState('');
    const [statuses, setStatuses] = React.useState({});
    const [notes, setNotes] = React.useState('');

    const selectedClass = CLASSES.find(c => c.id === classId);
    const roster = classId ? (STUDENTS_BY_CLASS[classId] ?? []) : [];

    function setStatus(nick, st) { setStatuses(s => ({ ...s, [nick]: st })); }

    function save() {
      if (!classId) { onToast?.('Pick a class first.'); return; }
      const rows = roster.map((s, i) => ({
        id: 'A' + Date.now() + '-' + i,
        date, slot: selectedClass.slot, classId,
        studentNickname: s,
        status: statuses[s] ?? 'Absent (no notice)',
        notes,
      }));
      onLogSession(rows);
      onToast?.(`Logged ${rows.length} attendance rows for ${classId}.`);
      setStatuses({});
      setNotes('');
    }

    return (
      <div className="space-y-6">
        <SectionHeader
          eyebrow="Daily logging"
          title="Class Attendance"
          description="Pick a slot → class, then mark each student. Rows post directly to the Sheet."
        />

        <WeeklyTracker tracker={tracker} />

        <div className="card p-5 grid gap-4">
          <div className="text-xs font-semibold uppercase tracking-wider text-navy-500">Log a session</div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label className="label">Class date</label>
              <input type="date" className="input" value={date} onChange={(e)=>setDate(e.target.value)} />
            </div>
            <div>
              <label className="label">Class</label>
              <select className="input" value={classId} onChange={(e)=>{ setClassId(e.target.value); setStatuses({}); }}>
                <option value="">Select class…</option>
                {CLASSES.map((c) => (
                  <option key={c.id} value={c.id}>{c.id} · {c.slot} · {c.teacher}</option>
                ))}
              </select>
            </div>
          </div>
        </div>

        {classId && (
          <div className="card overflow-hidden">
            <div className="px-5 py-3 border-b border-navy-50 flex items-center justify-between flex-wrap gap-2">
              <div className="font-semibold text-navy">
                Roster · {classId} <span className="text-navy-400 font-normal">· {roster.length} student{roster.length === 1 ? '' : 's'}</span>
              </div>
              <div className="text-xs text-navy-400">Default = Absent (no notice). Toggle as you go.</div>
            </div>
            {roster.length === 0 ? (
              <div className="p-6 text-sm text-navy-400">No active students mapped to {classId}.</div>
            ) : (
              <ul className="divide-y divide-navy-50">
                {roster.map(nick => {
                  const active = statuses[nick] ?? '';
                  const fullName = FULL_NAME_BY_NICK[nick];
                  return (
                    <li key={nick} className="px-5 py-3 flex items-center justify-between gap-4 flex-wrap">
                      <div>
                        <div className="font-medium text-navy">{nick}</div>
                        {fullName && <div className="text-xs text-navy-300">{fullName}</div>}
                      </div>
                      <div className="flex flex-wrap gap-1">
                        {STATUS_BTNS.map(st => {
                          const isActive = active === st;
                          const tone = st === 'Present'
                            ? (isActive ? 'bg-leaf text-white' : 'border border-leaf text-leaf-600 hover:bg-leaf-50')
                            : st === 'Absent (pre-notified)'
                            ? (isActive ? 'bg-sky text-white' : 'border border-sky text-sky-600 hover:bg-sky-50')
                            : (isActive ? 'bg-red-500 text-white' : 'border border-red-300 text-red-600 hover:bg-red-50');
                          return (
                            <button key={st} className={`text-xs px-2.5 py-1 rounded-full transition ${tone}`} onClick={() => setStatus(nick, st)}>
                              {st}
                            </button>
                          );
                        })}
                      </div>
                    </li>
                  );
                })}
              </ul>
            )}
            <div className="p-5 border-t border-navy-50 grid gap-3">
              <label className="label">Notes for this session (optional)</label>
              <textarea rows={2} className="input" value={notes} onChange={(e)=>setNotes(e.target.value)} placeholder="Trial attendees, makeup attendees, anything notable…" />
              <div className="flex justify-end">
                <button className="btn-primary" onClick={save} disabled={roster.length === 0}>Save {roster.length} rows</button>
              </div>
            </div>
          </div>
        )}

        <div className="card overflow-hidden">
          <div className="px-5 py-3 border-b border-navy-50 flex items-center justify-between">
            <h2 className="font-semibold text-navy">Recent attendance</h2>
            <div className="text-xs text-navy-400 flex items-center gap-1.5">
              <span className="live-dot" /> live
            </div>
          </div>
          <div className="overflow-x-auto">
            <table className="min-w-full text-sm">
              <thead className="text-xs uppercase text-navy-400 bg-navy-50/40">
                <tr>
                  <th className="text-left px-5 py-2 font-medium">Date</th>
                  <th className="text-left px-5 py-2 font-medium">Slot</th>
                  <th className="text-left px-5 py-2 font-medium">Class</th>
                  <th className="text-left px-5 py-2 font-medium">Student</th>
                  <th className="text-left px-5 py-2 font-medium">Status</th>
                </tr>
              </thead>
              <tbody>
                {recent.slice(0, 25).map(r => (
                  <tr key={r.id} className="border-t border-navy-50">
                    <td className="px-5 py-2">{r.date}</td>
                    <td className="px-5 py-2 text-navy-500">{r.slot}</td>
                    <td className="px-5 py-2">{r.classId}</td>
                    <td className="px-5 py-2 font-medium">{r.studentNickname}</td>
                    <td className="px-5 py-2"><AttendanceChip status={r.status} /></td>
                  </tr>
                ))}
                {recent.length === 0 && (
                  <tr><td className="px-5 py-4 text-navy-400" colSpan={5}>No attendance yet.</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  };

  // ============================================================
  // HEADCOUNTS — per-teacher summary + tables
  // ============================================================
  const TEACHER_TONES = {
    BEA:    { bg: 'bg-leaf',   bg50: 'bg-leaf-50',   text: 'text-leaf-600',   border: 'border-leaf-200',   chip: 'bg-leaf-100 text-leaf-600 border border-leaf-200' },
    BREEZE: { bg: 'bg-sky',    bg50: 'bg-sky-50',    text: 'text-sky-600',    border: 'border-sky-200',    chip: 'bg-sky-100 text-sky-600 border border-sky-200' },
    POND:   { bg: 'bg-sun-500',bg50: 'bg-sun-50',    text: 'text-navy-700',   border: 'border-sun-300',    chip: 'bg-sun-100 text-navy-700 border border-sun-300' },
  };
  const teacherTone = (t) => TEACHER_TONES[t] ?? TEACHER_TONES.BEA;

  const TeacherSummaryCard = ({ teacher, rows, isActive, onClick }) => {
    const totals = rows.reduce((acc, r) => ({
      classes: acc.classes + 1,
      actual:  acc.actual  + r.actual,
      makeups: acc.makeups + r.makeups,
      trials:  acc.trials  + r.trials,
      total:   acc.total   + r.total,
    }), { classes: 0, actual: 0, makeups: 0, trials: 0, total: 0 });
    const tone = teacherTone(teacher);

    return (
      <button
        onClick={onClick}
        className={[
          'card text-left p-5 transition border-t-4 hover:shadow-pop',
          isActive ? `${tone.border} shadow-pop` : 'border-transparent',
        ].join(' ')}
      >
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <div className={`w-9 h-9 rounded-full ${tone.bg} flex items-center justify-center text-white font-bold text-sm`}>
              {teacher.slice(0, 2)}
            </div>
            <div>
              <div className="font-bold text-navy tracking-tight">{teacher}</div>
              <div className="text-[11px] uppercase tracking-wider text-navy-400 font-semibold">{totals.classes} classes</div>
            </div>
          </div>
          <span className={`chip ${tone.chip} !text-[10px]`}>Bonus base</span>
        </div>
        <div className="mt-4 flex items-baseline gap-2">
          <div className="text-4xl font-bold text-navy tabular-nums">{totals.total}</div>
          <div className="text-xs text-navy-400 uppercase tracking-wider font-semibold">students taught</div>
        </div>
        <div className="mt-3 grid grid-cols-3 gap-2 text-center">
          <div className="bg-navy-50/60 rounded-md py-1.5">
            <div className="text-[10px] uppercase text-navy-400 font-semibold tracking-wider">Regular</div>
            <div className="font-bold text-navy tabular-nums">{totals.actual}</div>
          </div>
          <div className="bg-sun-100/60 rounded-md py-1.5">
            <div className="text-[10px] uppercase text-navy-400 font-semibold tracking-wider">Makeups</div>
            <div className="font-bold text-navy tabular-nums">{totals.makeups}</div>
          </div>
          <div className="bg-sky-100/60 rounded-md py-1.5">
            <div className="text-[10px] uppercase text-navy-400 font-semibold tracking-wider">Trials</div>
            <div className="font-bold text-navy tabular-nums">{totals.trials}</div>
          </div>
        </div>
      </button>
    );
  };

  const TeacherClassesTable = ({ teacher, rows }) => {
    const tone = teacherTone(teacher);
    const totals = rows.reduce((acc, r) => ({
      expected: acc.expected + r.expected, actual: acc.actual + r.actual,
      makeups:  acc.makeups  + r.makeups,  trials: acc.trials + r.trials, total: acc.total + r.total,
    }), { expected: 0, actual: 0, makeups: 0, trials: 0, total: 0 });

    return (
      <div className="card overflow-hidden">
        <div className={`px-5 py-3 flex items-center justify-between gap-3 border-l-4 ${tone.border} flex-wrap`}>
          <div className="flex items-center gap-3">
            <div className={`w-8 h-8 rounded-full ${tone.bg} flex items-center justify-center text-white font-bold text-xs`}>{teacher.slice(0,2)}</div>
            <div>
              <h3 className="font-semibold text-navy">{teacher}</h3>
              <div className="text-xs text-navy-400">{rows.length} class{rows.length === 1 ? '' : 'es'} this week</div>
            </div>
          </div>
          <div className="flex items-baseline gap-1.5">
            <div className="text-2xl font-bold text-navy tabular-nums">{totals.total}</div>
            <div className="text-[10px] uppercase text-navy-400 font-semibold tracking-wider">total students taught</div>
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="min-w-full text-sm">
            <thead className="bg-navy-50/40">
              <tr className="text-xs uppercase text-navy-400">
                <th className="text-left px-5 py-2 font-medium">Class</th>
                <th className="text-left px-5 py-2 font-medium">Slot</th>
                <th className="text-right px-5 py-2 font-medium">Expected</th>
                <th className="text-right px-5 py-2 font-medium">Actual</th>
                <th className="text-right px-5 py-2 font-medium">Makeups</th>
                <th className="text-right px-5 py-2 font-medium">Trials</th>
                <th className="text-right px-5 py-2 font-medium">Total</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r => {
                const cls = CLASSES.find(c => c.id === r.classId);
                const ratio = r.expected > 0 ? Math.min(1, r.actual / r.expected) : 1;
                return (
                  <tr key={r.classId} className="border-t border-navy-50 hover:bg-navy-50/40 transition">
                    <td className="px-5 py-3 font-mono text-navy">{r.classId}</td>
                    <td className="px-5 py-3 text-navy-500">{cls?.slot ?? ''}</td>
                    <td className="px-5 py-3 text-right">{r.expected}</td>
                    <td className="px-5 py-3 text-right">
                      <div className="flex items-center justify-end gap-2">
                        <div className="w-14 h-1.5 rounded-full bg-navy-50 overflow-hidden">
                          <div className={`h-full ${tone.bg}`} style={{ width: `${ratio * 100}%` }} />
                        </div>
                        <span className="tabular-nums">{r.actual}</span>
                      </div>
                    </td>
                    <td className="px-5 py-3 text-right">{r.makeups}</td>
                    <td className="px-5 py-3 text-right">{r.trials}</td>
                    <td className="px-5 py-3 text-right font-semibold tabular-nums">{r.total}</td>
                  </tr>
                );
              })}
              <tr className="border-t-2 border-navy-100 bg-navy-50/30 font-semibold">
                <td className="px-5 py-2.5 text-navy text-xs uppercase tracking-wider">Subtotal</td>
                <td />
                <td className="px-5 py-2.5 text-right tabular-nums">{totals.expected}</td>
                <td className="px-5 py-2.5 text-right tabular-nums">{totals.actual}</td>
                <td className="px-5 py-2.5 text-right tabular-nums">{totals.makeups}</td>
                <td className="px-5 py-2.5 text-right tabular-nums">{totals.trials}</td>
                <td className={`px-5 py-2.5 text-right tabular-nums ${tone.text}`}>{totals.total}</td>
              </tr>

          </table>

  const Stat = ({ label, value, highlight }) => (
    <div className="text-right">
      <div className="text-[10px] uppercase tracking-wider text-white/60 font-semibold">{label}</div>
      <div className={`tabular-nums ${highlight ? 'text-3xl font-bold text-sun' : 'text-xl font-semibold text-white'}`}>{value}</div>
    </div>

  const Headcount = ({ headcountRows, onToast }) => {
    const [focusTeacher, setFocusTeacher] = React.useState(null);

    const byTeacher = {};
    for (const r of headcountRows) {
      const cls = CLASSES.find(c => c.id === r.classId);
      const teacher = cls?.teacher ?? 'UNASSIGNED';
      (byTeacher[teacher] = byTeacher[teacher] || []).push(r);
    }
    const teachers = Object.keys(byTeacher).sort();

    const grand = headcountRows.reduce((acc, r) => ({
      expected: acc.expected + r.expected, actual: acc.actual + r.actual,
      makeups: acc.makeups + r.makeups, trials: acc.trials + r.trials, total: acc.total + r.total,
    }), { expected: 0, actual: 0, makeups: 0, trials: 0, total: 0 });

    function handleExport(from, to) {
      const rows = [
        ['Week start','Week end','Teacher','Class','Name','Expected','Actual','Makeups','Trials','Total (bonus base)'],
        ...teachers.flatMap(t =>
          byTeacher[t].map(r => [from, to, t, r.classId, r.className, r.expected, r.actual, r.makeups, r.trials, r.total])
        ),
        [],
        ['','','TEACHER SUBTOTALS'],
        ...teachers.map(t => {
          const sub = byTeacher[t].reduce((acc, r) => ({
            expected: acc.expected + r.expected, actual: acc.actual + r.actual,
            makeups: acc.makeups + r.makeups, trials: acc.trials + r.trials, total: acc.total + r.total,
          }), { expected: 0, actual: 0, makeups: 0, trials: 0, total: 0 });
          return ['', '', t, byTeacher[t].length + ' classes', '', sub.expected, sub.actual, sub.makeups, sub.trials, sub.total];
        }),
      ];
      downloadCsv(`headcount-by-teacher_${from}_to_${to}.csv`, rows);
      onToast?.(`Exported headcounts by teacher (${from} → ${to})`);
    }

    const visibleTeachers = focusTeacher ? [focusTeacher] : teachers;

    return (
      <div className="space-y-6">
        <SectionHeader
          eyebrow="Reporting · Bonus"
          title="Weekly Headcounts by Teacher"
          description="Each teacher's weekly bonus is based on the total students they taught — actual + makeups + trials. Click a card to focus on one teacher."
          action={
            <select className="input max-w-xs">
              <option>{HEADCOUNT_WEEK.start} → {HEADCOUNT_WEEK.end}</option>
              <option>2026-05-02 → 2026-05-08</option>
              <option>2026-04-25 → 2026-05-01</option>
            </select>
          }
        />

        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="text-xs text-navy-400">
            Showing week <strong className="text-navy">{HEADCOUNT_WEEK.start} → {HEADCOUNT_WEEK.end}</strong>
            {focusTeacher && <> · focused on <strong className="text-navy">{focusTeacher}</strong> <button onClick={() => setFocusTeacher(null)} className="text-sky hover:underline ml-1">clear</button></>}
          </div>
          <ExportRange label="headcounts by teacher" defaultFrom="2026-04-01" defaultTo="2026-05-15" onExport={handleExport} />
        </div>

        <div className={`grid gap-4 grid-cols-1 sm:grid-cols-2 ${teachers.length <= 3 ? 'lg:grid-cols-3' : 'lg:grid-cols-4'}`}>
          {teachers.map(t => (
            <TeacherSummaryCard
              key={t}
              teacher={t}
              rows={byTeacher[t]}
              isActive={focusTeacher === t}
              onClick={() => setFocusTeacher(focusTeacher === t ? null : t)}
            />
          ))}
        </div>

        <div className="grid gap-4">
          {visibleTeachers.map(t => <TeacherClassesTable key={t} teacher={t} rows={byTeacher[t]} />)}
        </div>

        {!focusTeacher && (
          <div className="card p-5 bg-navy text-white">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div>
                <div className="text-xs uppercase tracking-wider text-white/70 font-semibold">All teachers · week total</div>
                <div className="text-sm text-white/60">{teachers.length} teachers · {headcountRows.length} classes</div>
              </div>
              <div className="flex items-center gap-6 flex-wrap">
                <Stat label="Expected" value={grand.expected} />
                <Stat label="Actual"   value={grand.actual} />
                <Stat label="Makeups"  value={grand.makeups} />
                <Stat label="Trials"   value={grand.trials} />
                <Stat label="Total in seats" value={grand.total} highlight />
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ============================================================
  // ROSTER — admin: add/remove/move students, add/remove classes

  const AddStudentForm = ({ onAdd, onToast }) => {

  const DAYS  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  const AddClassForm = ({ onAdd, onToast }) => {

        </div>
        <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
          <div>
            <label className="label">Class ID *</label>
            <input className="input" placeholder="1-BT10" value={id} onChange={(e)=>setId(e.target.value)} />
          </div>
          <div>
            <label className="label">Year</label>
            <select className="input" value={year} onChange={(e)=>setYear(e.target.value)}>
              <option>Year 1</option><option>Year 2</option><option>Year 3</option><option>Year 4</option>
            </select>
          </div>
          <div>
            <label className="label">Day</label>
            <select className="input" value={day} onChange={(e)=>setDay(e.target.value)}>
              {DAYS.map(d => <option key={d}>{d}</option>)}
            </select>
          </div>
          <div>
            <label className="label">Time</label>

          </div>
          <div>
            <label className="label">Teacher</label>
            <select className="input" value={teacher} onChange={(e)=>setTeacher(e.target.value)}>
              {TEACHERS.map(t => <option key={t}>{t}</option>)}

          </div>
        </div>
        {err && <div className="text-sm text-red-600 bg-red-50 rounded-md p-3 border border-red-100">{err}</div>}
        <div className="flex justify-end">

  const ClassRosterList = ({ onRemoveStudent, onMoveStudent, onRemoveClass }) => {
    const [open, setOpen] = React.useState(() => new Set());
    function toggle(id) {
      setOpen(s => { const next = new Set(s); next.has(id) ? next.delete(id) : next.add(id); return next; });
    }

    return (
      <div className="card overflow-hidden">
        <div className="px-5 py-3 border-b border-navy-50 flex items-center justify-between">
          <div>
            <h2 className="font-semibold text-navy">All classes & students</h2>
            <p className="text-xs text-navy-400">{CLASSES.length} classes · {Object.values(STUDENTS_BY_CLASS).reduce((a, b) => a + b.length, 0)} students</p>
          </div>
        </div>
        <ul className="divide-y divide-navy-50">
          {CLASSES.map((c) => {
            const roster = STUDENTS_BY_CLASS[c.id] ?? [];
            const isOpen = open.has(c.id);
            return (
              <li key={c.id}>
                <button onClick={() => toggle(c.id)}
                  className="w-full px-5 py-3 flex items-center justify-between gap-4 hover:bg-navy-50/40 transition text-left">
                  <div className="flex items-center gap-3">
                    <span className={`transition-transform ${isOpen ? 'rotate-90' : ''}`}>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </span>
                    <div>
                      <div className="font-mono font-semibold text-navy">{c.id}</div>
                      <div className="text-xs text-navy-400">{c.slot} · {c.teacher}</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="chip bg-navy-50 text-navy-600 border border-navy-100">{roster.length} student{roster.length === 1 ? '' : 's'}</span>
                    <button
                      onClick={(e) => { e.stopPropagation(); if (confirm(`Remove class ${c.id}? Its ${roster.length} student(s) will become unassigned.`)) onRemoveClass(c.id); }}
                      className="text-navy-300 hover:text-red-500 transition text-xs"
                      aria-label="Remove class"
                    >Remove</button>
                  </div>
                </button>
                {isOpen && (
                  <div className="px-5 pb-4 pt-1 bg-navy-50/30">
                    {roster.length === 0 ? (
                      <div className="text-sm text-navy-400 py-2">No students yet — add one above.</div>
                    ) : (
                      <ul className="grid gap-1.5">
                        {roster.map(nick => (
                          <li key={nick} className="flex items-center justify-between px-3 py-2 bg-white rounded-md border border-navy-50 gap-2 flex-wrap">
                            <div>
                              <div className="font-medium text-navy text-sm">{nick}</div>
                              {FULL_NAME_BY_NICK[nick] && <div className="text-xs text-navy-300">{FULL_NAME_BY_NICK[nick]}</div>}
                            </div>
                            <div className="flex items-center gap-2">
                              <select
                                value={c.id}
                                onChange={(e) => onMoveStudent(nick, c.id, e.target.value)}
                                className="text-xs px-2 py-1 rounded-md border border-navy-100 bg-white text-navy-600"
                                title="Move to another class"
                              >
                                {CLASSES.map(x => <option key={x.id} value={x.id}>{x.id}</option>)}
                              </select>
                              <button
                                onClick={() => onRemoveStudent(c.id, nick)}
                                className="text-navy-300 hover:text-red-500 transition w-7 h-7 rounded-md hover:bg-red-50 flex items-center justify-center"
                                aria-label={`Remove ${nick}`}
                              >
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                              </button>
                            </div>
                          </li>
                        ))}
                      </ul>
                    )}
                  </div>
                )}
              </li>
            );
          })}
        </ul>
      </div>
    );

  const Roster = ({ onAddStudent, onAddClass, onRemoveStudent, onMoveStudent, onRemoveClass, onToast }) => (
    <div className="space-y-6">
      <SectionHeader
        eyebrow="Admin"
        title="Roster & Classes"
        description="Add new students joining a class, or open up a new class timeslot. Mirrors the Students and Classes tabs in the Sheet."
      />

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <AddStudentForm onAdd={onAddStudent} onToast={onToast} />
        <AddClassForm   onAdd={onAddClass}   onToast={onToast} />
      </div>

      <ClassRosterList
        onRemoveStudent={onRemoveStudent}
        onMoveStudent={onMoveStudent}
        onRemoveClass={onRemoveClass}
      />
    </div>
  );

  // ============================================================
  // APP SHELL — state + routing + modal + persistence
  // ============================================================
  const App = () => {
    // Hydrate from localStorage if present, else use seed data.
    const initial = storage.load();
    const [route, setRoute]             = React.useState('dashboard');
    const [filter, setFilter]           = React.useState('all');
    const [requests, setRequests]       = React.useState(() => initial?.requests   ?? SEED_REQUESTS);
    const [attendance, setAttendance]   = React.useState(() => initial?.attendance ?? SEED_RECENT_ATTENDANCE);
    const [tracker, setTracker]         = React.useState(() => initial?.tracker    ?? SEED_WEEK_TRACKER);
    const [modalOpen, setModalOpen]     = React.useState(false);
    const [toast, setToast]             = React.useState(null);
    const [, bump] = React.useReducer(x => x + 1, 0);

    // Persist on every meaningful change.
    React.useEffect(() => {
      storage.save({ requests, attendance, tracker });
    }, [requests, attendance, tracker]);

    // Hide the splash once React has rendered.
    React.useEffect(() => {
      const s = document.getElementById('splash');
      if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 300); }
    }, []);

    function addStudent({ nickname, fullName, classId }) {
      if (!STUDENTS_BY_CLASS[classId]) STUDENTS_BY_CLASS[classId] = [];
      STUDENTS_BY_CLASS[classId].push(nickname);
      if (fullName) FULL_NAME_BY_NICK[nickname] = fullName;
      bump();
      callBackend('addStudent', { nickname, fullName, classId });
    }
    function removeStudent(classId, nickname) {
      if (STUDENTS_BY_CLASS[classId]) {
        STUDENTS_BY_CLASS[classId] = STUDENTS_BY_CLASS[classId].filter(s => s !== nickname);
      }
      bump();
      showToast(`Removed ${nickname} from ${classId}.`);
      callBackend('removeStudent', { classId, nickname });
    }
    function moveStudent(nickname, fromClass, toClass) {
      if (fromClass === toClass) return;
      if (STUDENTS_BY_CLASS[fromClass]) {
        STUDENTS_BY_CLASS[fromClass] = STUDENTS_BY_CLASS[fromClass].filter(s => s !== nickname);
      }
      if (!STUDENTS_BY_CLASS[toClass]) STUDENTS_BY_CLASS[toClass] = [];
      if (!STUDENTS_BY_CLASS[toClass].includes(nickname)) STUDENTS_BY_CLASS[toClass].push(nickname);
      bump();
      showToast(`Moved ${nickname}: ${fromClass} → ${toClass}.`);
      callBackend('moveStudent', { nickname, fromClass, toClass });
    }
    function addClass(cls) {
      CLASSES.push(cls);
      CLASSES.sort((a, b) => a.id.localeCompare(b.id));
      STUDENTS_BY_CLASS[cls.id] = STUDENTS_BY_CLASS[cls.id] ?? [];
      bump();
      callBackend('addClass', cls);
    }
    function removeClass(classId) {
      const idx = CLASSES.findIndex(c => c.id === classId);
      if (idx >= 0) CLASSES.splice(idx, 1);
      delete STUDENTS_BY_CLASS[classId];
      bump();
      showToast(`Removed class ${classId}.`);
      callBackend('removeClass', { classId });
    }

    const toastTimer = React.useRef(null);
    function showToast(msg) {
      setToast(msg);
      if (toastTimer.current) clearTimeout(toastTimer.current);
      toastTimer.current = setTimeout(() => setToast(null), 2800);
    }

    function navigate(r, f = null) {
      setRoute(r);
      if (f) setFilter(f); else if (r !== 'makeup') setFilter('all');
      if (typeof window !== 'undefined') window.scrollTo({ top: 0 });
    }

    function updateRequest(id, patch) {
      setRequests(rs => rs.map(r => r.id === id ? { ...r, ...patch } : r));
      if (patch.teacherConfirmed)          showToast('Teacher confirmed.');
      else if (patch.adminApproved)        showToast('Admin manager approved — add to Google Calendar next.');
      else if (patch.calendarEventCreated) showToast('Marked as scheduled. All done!');
      callBackend('updateMakeup', { id, updates: patch });
    }

    function addRequest(form) {
      const nextNum = requests.reduce((m, r) => Math.max(m, parseInt(r.id.replace(/\D/g, ''), 10) || 0), 0) + 1;
      const newReq = {
        id: 'MR-' + String(nextNum).padStart(4, '0'),
        ...form,
        teacherConfirmed: false,
        adminApproved: false,
        calendarEventCreated: false,
      };
      setRequests(rs => [newReq, ...rs]);
      setModalOpen(false);
      showToast(`Request ${newReq.id} created — pending ${newReq.teacher}'s confirmation.`);
      navigate('makeup', 'pending-teacher');
      callBackend('createMakeup', newReq);
    }

    function logSession(rows) {
      setAttendance(a => [...rows, ...a]);
      setTracker(t => t.map(c => {
        if (c.classId !== rows[0].classId) return c;
        const counts = rows.reduce((acc, r) => {
          if (r.status === 'Present') acc.present++;
          else if (r.status === 'Absent (pre-notified)') acc.preNotified++;
          else if (r.status === 'Absent (no notice)') acc.noNotice++;
          return acc;
        }, { present: 0, preNotified: 0, noNotice: 0 });
        return { ...c, ...counts, status: 'logged' };
      }));
      callBackend('createAttendance', { rows });
    }

    const headcountRows = React.useMemo(() => tracker.map(t => {
      const cls = CLASSES.find(c => c.id === t.classId);
      const seedRow = SEED_HEADCOUNT_ROWS.find(s => s.classId === t.classId);
      return {
        classId: t.classId,
        className: cls?.name ?? t.classId,
        expected: t.expected,
        actual: t.status === 'logged' ? t.present + t.preNotified : 0,
        makeups: seedRow?.makeups ?? 0,
        trials:  seedRow?.trials ?? 0,
        total:   (t.status === 'logged' ? t.present + t.preNotified : 0) + (seedRow?.makeups ?? 0) + (seedRow?.trials ?? 0),
      };
    }), [tracker, requests]);

    let screen;
    if (route === 'dashboard') {
      screen = <Dashboard requests={requests} attendance={attendance} onNavigate={navigate} onNewRequest={() => setModalOpen(true)} />;
    } else if (route === 'makeup') {
      screen = <MakeupList requests={requests} initialFilter={filter} onUpdateRequest={updateRequest} onNewRequest={() => setModalOpen(true)} onToast={showToast} />;
    } else if (route === 'attendance') {
      screen = <Attendance tracker={tracker} recent={attendance} onLogSession={logSession} onToast={showToast} />;
    } else if (route === 'headcount') {
      screen = <Headcount headcountRows={headcountRows} onToast={showToast} />;
    } else if (route === 'roster') {
      screen = <Roster
        onAddStudent={addStudent}
        onAddClass={addClass}
        onRemoveStudent={removeStudent}
        onMoveStudent={moveStudent}
        onRemoveClass={removeClass}
        onToast={showToast}
      />;
    }

    return (
      <Frame>
        <Nav active={route} onNavigate={navigate} onNewRequest={() => setModalOpen(true)} />
        <main className="max-w-6xl w-full mx-auto px-4 sm:px-6 py-8 flex-1">{screen}</main>
        <footer className="max-w-6xl w-full mx-auto px-4 sm:px-6 py-8 text-center text-xs text-navy-300">
          Math Mavens Thailand · Internal portal · The Sheet remains the source of truth.
        </footer>

        {modalOpen && <NewMakeupModal onSubmit={addRequest} onClose={() => setModalOpen(false)} />}
        <Toast toast={toast} />
      </Frame>
    );
  };

  // Mount.
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
