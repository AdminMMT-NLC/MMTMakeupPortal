  // -------- Recent attendance table (shared) --------
  const RecentAttendanceTable = ({ recent, onUpdateAttendance, onDeleteAttendance }) => {
    const PAGE_SIZE = 10;
    // Sort newest first (defensive — backend already does this, but guard against any other source).
    const sorted = React.useMemo(
      () => [...recent].sort((a, b) => (a.date < b.date ? 1 : (a.date > b.date ? -1 : 0))),
      [recent]
    );
    const totalPages = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
    const [page, setPage] = React.useState(0);
    // Clamp page if data shrinks underneath us.
    React.useEffect(() => { if (page >= totalPages) setPage(Math.max(0, totalPages - 1)); }, [totalPages, page]);

    const pageRows = sorted.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
    const firstShown = sorted.length === 0 ? 0 : page * PAGE_SIZE + 1;
    const lastShown  = Math.min(sorted.length, (page + 1) * PAGE_SIZE);

    // Mark a row visually when it's the start of a new (Sat→Fri) week vs the row above.
    function weekStartISO(iso) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(iso)) return '';
      const d = new Date(iso + 'T00:00:00');
      const daysBack = (d.getDay() + 1) % 7;
      const sat = new Date(d); sat.setDate(d.getDate() - daysBack);
      return fmtDate(sat);
    }
    let lastWeek = null;

    return (
      <div className="card overflow-hidden">
        <div className="px-5 py-3 border-b border-navy-50 flex items-center justify-between gap-2 flex-wrap">
          <div>
            <h2 className="font-semibold text-navy">Recent attendance</h2>
            <p className="text-xs text-navy-400">
              {sorted.length === 0
                ? 'No attendance yet.'
                : `Showing ${firstShown}–${lastShown} of ${sorted.length}. Newest first; week starts Saturday.`}
            </p>
          </div>
          <div className="flex items-center gap-2 text-xs">
            <button
              onClick={() => setPage(p => Math.max(0, p - 1))}
              disabled={page === 0}
              className="px-2 py-1 rounded-md border border-navy-100 text-navy-600 hover:bg-navy-50 disabled:opacity-40 disabled:cursor-not-allowed transition"
              title="Newer 10"
              aria-label="Newer 10 records"
            >← Newer</button>
            <span className="text-navy-400 tabular-nums">Page {page + 1} / {totalPages}</span>
            <button
              onClick={() => setPage(p => Math.min(totalPages - 1, p + 1))}
              disabled={page >= totalPages - 1}
              className="px-2 py-1 rounded-md border border-navy-100 text-navy-600 hover:bg-navy-50 disabled:opacity-40 disabled:cursor-not-allowed transition"
              title="Previous 10 (older)"
              aria-label="Previous 10 (older) records"
            >Older →</button>
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="min-w-full text-sm">
            <thead className="text-xs uppercase text-navy-400 bg-navy-50/40">
              <tr>
                <th className="text-left px-5 py-2 font-medium">Date</th>
                <th className="text-left px-5 py-2 font-medium">Lesson</th>
                <th className="text-left px-5 py-2 font-medium">Slot</th>
                <th className="text-left px-5 py-2 font-medium">Class / Session</th>
                <th className="text-left px-5 py-2 font-medium">Teacher</th>
                <th className="text-left px-5 py-2 font-medium">Student</th>
                <th className="text-left px-5 py-2 font-medium">Status</th>
                <th className="text-right px-5 py-2 font-medium">Actions</th>
              </tr>
            </thead>
            <tbody>
              {pageRows.map(r => {
                const wk = weekStartISO(toISODate(r.date));
                const isNewWeek = wk !== lastWeek;
                lastWeek = wk;
                const ln = lessonNumberFor(r.date);
                return (
                  <React.Fragment key={r.id}>
                    {isNewWeek && wk && (
                      <tr className="bg-sun-50/40">
                        <td colSpan={8} className="px-5 py-1.5 text-[11px] uppercase tracking-wider font-semibold text-navy-500">
                          Week of {prettyDate(wk)}
                          {ln != null && <span className="ml-2 text-navy-400 normal-case font-normal">· Lesson {ln}</span>}
                        </td>
                      </tr>
                    )}
                    <tr className="border-t border-navy-50">
                      <td className="px-5 py-2">{prettyDate(r.date)}</td>
                      <td className="px-5 py-2 text-navy-500 tabular-nums">{ln != null ? ln : '—'}</td>
                      <td className="px-5 py-2 text-navy-500">{r.slot}</td>
                      <td className="px-5 py-2">
                        {isSpecialClassId(r.classId)
                          ? <span className="chip bg-navy-50 text-navy-600 border border-navy-100 !text-[10px]">{displayClassId(r.classId)}</span>
                          : <span className="font-mono">{r.classId}</span>}
                      </td>
                      <td className="px-5 py-2 text-navy-500">{r.teacher || ''}</td>
                      <td className="px-5 py-2 font-medium">{r.studentNickname}</td>
                      <td className="px-5 py-2"><AttendanceChip status={r.status} /></td>
                      <td className="px-5 py-2">
                        <div className="flex items-center justify-end gap-1.5">
                          <select
                            value={r.status}
                            onChange={(e) => onUpdateAttendance?.(r.id, { status: e.target.value })}

  // -------- Parent component: mode tabs + DailyTracker + form + recent --------
  const Attendance = ({ recent, onLogSession, onUpdateAttendance, onDeleteAttendance, onToast }) => {

  // ============================================================
  // HEADCOUNTS — per-teacher summary + tables

  const TEACHER_TONES = {

    const totals = rows.reduce((acc, r) => ({

    return (

              <tr className="border-t-2 border-navy-100 bg-navy-50/30 font-semibold">

                <td className="px-5 py-2.5 text-right tabular-nums">{totals.trials}</td>
                <td className="px-5 py-2.5 text-right tabular-nums">{totals.workshops}</td>

  };

  const Stat = ({ label, value, highlight }) => (
    <div className="text-right">
      <div className="text-[10px] uppercase tracking-wider text-white/60 font-semibold">{label}</div>
      <div className={`tabular-nums ${highlight ? 'text-3xl font-bold text-sun' : 'text-xl font-semibold text-white'}`}>{value}</div>
    </div>
  );

  const Headcount = ({ headcountRows, attendance = [], onToast }) => {
    const [focusTeacher, setFocusTeacher] = React.useState(null);

    const byTeacher = {};
    for (const r of headcountRows) {
      const teacher = r.teacher
        || CLASSES.find(c => c.id === r.classId)?.teacher
        || 'UNASSIGNED';
      (byTeacher[teacher] = byTeacher[teacher] || []).push(r);
    }
    const teachers = Object.keys(byTeacher).sort();

    const grand = headcountRows.reduce((acc, r) => ({
      expected:  acc.expected  + r.expected,
      actual:    acc.actual    + r.actual,
      makeups:   acc.makeups   + r.makeups,
      trials:    acc.trials    + r.trials,
      workshops: acc.workshops + (r.workshops || 0),
      total:     acc.total     + r.total,
    }), { expected: 0, actual: 0, makeups: 0, trials: 0, workshops: 0, total: 0 });

    function handleExport(from, to) {
      // Build a per-class-per-date attendance map for fast lookup.
      // key = `${classId}|${YYYY-MM-DD}` → list of attendance rows.
      const byKey = {};
      for (const a of attendance) {
        const iso = toISODate(a.date);
        if (!iso || iso < from || iso > to) continue;
        const k = `${a.classId}|${iso}`;
        if (!byKey[k]) byKey[k] = [];
        byKey[k].push(a);
      }
      // Per-date special-class (off-schedule / trial / workshop) buckets keyed by (classId|teacher).
      const specialByDate = {};
      for (const a of attendance) {
        const iso = toISODate(a.date);
        if (!iso || iso < from || iso > to) continue;
        if (!isSpecialClassId(a.classId)) continue;
        if (!specialByDate[iso]) specialByDate[iso] = {};
        const teacher = a.teacher || 'UNASSIGNED';
        const sk = `${a.classId}|${teacher}`;
        if (!specialByDate[iso][sk]) specialByDate[iso][sk] = { rows: [], teacher, classId: a.classId };
        specialByDate[iso][sk].rows.push(a);
      }

      // Compute the list of (Saturday) week-start dates intersected by [from, to].
      function weekStartFor(iso) {
        const d = new Date(iso + 'T00:00:00');
        const back = (d.getDay() + 1) % 7; // distance back to Saturday
        d.setDate(d.getDate() - back);
        return fmtDate(d);
      }
      const weeks = [];
      let cur = weekStartFor(from);
      while (cur <= to) {
        weeks.push(cur);
        const d = new Date(cur + 'T00:00:00'); d.setDate(d.getDate() + 7);
        cur = fmtDate(d);
      }

      const HEADER = ['Week','Date','Day','Lesson','Teacher','Class ID','Class Name','Expected','Present','Pre-notified','No notice','Makeup attendees','Trials','Workshop','Total taught'];
      const out = [HEADER];
      const grand = {};

      function addToTeacherTotals(bucket, t, x) {
        if (!bucket[t]) bucket[t] = { present:0, makeups:0, trials:0, workshops:0, preNot:0, noNot:0, expected:0 };
        bucket[t].present   += x.present;
        bucket[t].makeups   += x.makeups;
        bucket[t].trials    += x.trials;
        bucket[t].workshops += x.workshops;
        bucket[t].preNot    += x.preNot;
        bucket[t].noNot     += x.noNot;
        bucket[t].expected  += x.expected;
      }

      for (const weekStart of weeks) {
        const weekEnd = (() => { const d = new Date(weekStart + 'T00:00:00'); d.setDate(d.getDate() + 6); return fmtDate(d); })();
        const weekLabel = `${weekStart} → ${weekEnd}`;
        const weekTotals = {};

        // Iterate the 7 days of the week, clipped to [from, to].
        for (let i = 0; i < 7; i++) {
          const d = new Date(weekStart + 'T00:00:00'); d.setDate(d.getDate() + i);
          const dateISO = fmtDate(d);
          if (dateISO < from || dateISO > to) continue;
          const dayName = DAY_NAMES[d.getDay()];
          const lesson = lessonNumberFor(dateISO);

          // Regular classes scheduled on this weekday.
          const classesOnDay = [...CLASSES]
            .filter(c => c.day === dayName)
            .sort((a, b) => (a.time || '').localeCompare(b.time || ''));

          for (const cls of classesOnDay) {
            const rows = byKey[`${cls.id}|${dateISO}`] || [];
            const x = {
              expected: (STUDENTS_BY_CLASS[cls.id] ?? []).length,
              present:   rows.filter(r => r.status === 'Present').length,
              preNot:    rows.filter(r => r.status === 'Absent (pre-notified)').length,
              noNot:     rows.filter(r => r.status === 'Absent (no notice)').length,
              makeups:   rows.filter(r => r.status === 'Makeup attendee').length,
              trials:    rows.filter(r => r.status === 'Trial').length,
              workshops: rows.filter(r => r.status === 'Workshop attendee').length,
            };
            const total = x.present + x.makeups + x.trials + x.workshops;
            out.push([
              weekLabel, dateISO, dayName, (lesson != null ? lesson : ''),
              cls.teacher, cls.id, cls.name,
              x.expected, x.present, x.preNot, x.noNot, x.makeups, x.trials, x.workshops, total,
            ]);
            addToTeacherTotals(weekTotals, cls.teacher, x);
            addToTeacherTotals(grand,      cls.teacher, x);
          }

          // Special sessions (off-schedule / trial / workshop) logged on this date.
          const specials = specialByDate[dateISO] || {};
          for (const sk of Object.keys(specials).sort()) {
            const b = specials[sk];
            const rows = b.rows;
            const x = {
              expected: 0,
              present:   rows.filter(r => r.status === 'Present').length,
              preNot:    0, noNot: 0,
              makeups:   rows.filter(r => r.status === 'Makeup attendee').length,
              trials:    rows.filter(r => r.status === 'Trial').length,
              workshops: rows.filter(r => r.status === 'Workshop attendee').length,
            };
            const total = x.present + x.makeups + x.trials + x.workshops;
            out.push([
              weekLabel, dateISO, dayName, '',
              b.teacher, b.classId, displayClassId(b.classId),
              0, x.present, 0, 0, x.makeups, x.trials, x.workshops, total,
            ]);
            addToTeacherTotals(weekTotals, b.teacher, x);
            addToTeacherTotals(grand,      b.teacher, x);
          }
        }

        // Per-teacher weekly subtotal rows.
        if (Object.keys(weekTotals).length > 0) {
          out.push(['', '', '', '', `--- WEEK ${weekLabel} TOTALS ---`, '', '', '', '', '', '', '', '', '', '']);
          Object.keys(weekTotals).sort().forEach(t => {
            const x = weekTotals[t];
            const total = x.present + x.makeups + x.trials + x.workshops;
            out.push([
              weekLabel, '', '', '',
              t, '', 'WEEKLY TOTAL',
              x.expected, x.present, x.preNot, x.noNot, x.makeups, x.trials, x.workshops, total,
            ]);
          });
          out.push(['', '', '', '', '', '', '', '', '', '', '', '', '', '', '']);
        }
      }

      // Grand totals across the full range.
      if (Object.keys(grand).length > 0) {
        out.push(['', '', '', '', `=== GRAND TOTALS ${from} → ${to} ===`, '', '', '', '', '', '', '', '', '', '']);
        Object.keys(grand).sort().forEach(t => {
          const x = grand[t];
          const total = x.present + x.makeups + x.trials + x.workshops;
          out.push([
            `${from} → ${to}`, '', '', '',
            t, '', 'GRAND TOTAL',
            x.expected, x.present, x.preNot, x.noNot, x.makeups, x.trials, x.workshops, total,
          ]);
        });
      }

      downloadCsv(`headcount_${from}_to_${to}.csv`, out);
      onToast?.(`Exported headcount ${from} → ${to}`);
    }

    const visibleTeachers = focusTeacher ? [focusTeacher] : teachers;

    return (
      <div className="space-y-6">
        <SectionHeader
          eyebrow="Reporting · Bonus"
          title="Weekly Headcounts by Teacher"
          description="Each teacher's weekly bonus is based on the total students they actually taught (Present + Makeup + Trial + Workshop). Only attendance counts — approved-but-not-attended makeups are excluded. Click a card to focus."
          action={
            <div className="chip bg-navy-50 text-navy-600 border border-navy-100 !text-xs">
              Week of {HEADCOUNT_WEEK.start} → {HEADCOUNT_WEEK.end}
            </div>
          }
        />

        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="text-xs text-navy-400">
            Showing week <strong className="text-navy">{HEADCOUNT_WEEK.start} → {HEADCOUNT_WEEK.end}</strong>
            {focusTeacher && <> · focused on <strong className="text-navy">{focusTeacher}</strong> <button onClick={() => setFocusTeacher(null)} className="text-sky hover:underline ml-1">clear</button></>}
          </div>
          <ExportRange label="headcounts by teacher" defaultFrom={HEADCOUNT_WEEK.start} defaultTo={HEADCOUNT_WEEK.end} onExport={handleExport} />
        </div>

        <div className={`grid gap-4 grid-cols-1 sm:grid-cols-2 ${teachers.length <= 3 ? 'lg:grid-cols-3' : 'lg:grid-cols-4'}`}>
          {teachers.map(t => (
            <TeacherSummaryCard
              key={t}
              teacher={t}
              rows={byTeacher[t]}
              isActive={focusTeacher === t}
              onClick={() => setFocusTeacher(focusTeacher === t ? null : t)}
            />
          ))}
        </div>

        <div className="grid gap-4">
          {visibleTeachers.map(t => <TeacherClassesTable key={t} teacher={t} rows={byTeacher[t]} />)}
        </div>

        {!focusTeacher && (
          <div className="card p-5 bg-navy text-white">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div>
                <div className="text-xs uppercase tracking-wider text-white/70 font-semibold">All teachers · week total</div>
                <div className="text-sm text-white/60">{teachers.length} teacher{teachers.length === 1 ? '' : 's'} · {headcountRows.filter(r => !r.isSpecial).length} classes</div>
              </div>
              <div className="flex items-center gap-6 flex-wrap">
                <Stat label="Expected" value={grand.expected} />
                <Stat label="Actual"   value={grand.actual} />
                <Stat label="Makeups"  value={grand.makeups} />
                <Stat label="Trials"   value={grand.trials} />
                <Stat label="Workshop" value={grand.workshops} />
                <Stat label="Total in seats" value={grand.total} highlight />
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ============================================================
  // ROSTER — admin: add/remove/move students, add/remove classes
  // ============================================================
  const AddStudentForm = ({ onAdd, onToast }) => {
    const [nick, setNick]       = React.useState('');
    const [full, setFull]       = React.useState('');
    const [classId, setClassId] = React.useState('');
    const [err, setErr]         = React.useState('');

    function submit(e) {
      e.preventDefault();
      if (!nick.trim() || !classId) { setErr('Nickname and class are required.'); return; }
      if ((STUDENTS_BY_CLASS[classId] ?? []).map(s => s.toLowerCase()).includes(nick.trim().toLowerCase())) {
        setErr(`"${nick}" is already in ${classId}.`); return;
      }
      onAdd({ nickname: nick.trim(), fullName: full.trim(), classId });
      onToast?.(`Added ${nick.trim()} to ${classId}.`);
      setNick(''); setFull(''); setErr('');
    }

    return (
      <form onSubmit={submit} className="card p-5 grid gap-4">
        <div>
          <div className="text-xs font-semibold uppercase tracking-wider text-leaf">Add a student</div>
          <p className="text-xs text-navy-400 mt-0.5">New student joining a class? Log them here.</p>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">

        name: `${year} · ${day} ${time}`,

  // ============================================================
  // ACADEMIC CALENDAR — MONTH VIEW + EDITOR
  // ============================================================
  // Month-by-month calendar that renders ABOVE the editor. Lessons appear as horizontal
  // "streak bars" running across each week (Sat→Fri) with L# tags pinned to the streak's
  // left end. Breaks/workshops get their own tags. Mondays show closed/open dots that the
  // user can click to override.
  const CAL_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const CAL_WEEKDAYS_SAT = ['Sat','Sun','Mon','Tue','Wed','Thu','Fri'];
  // Two-colour streak palette, alternated by lesson parity.
  const STREAK_TONES = [
    { bar: 'bg-sun-300/55',  chip: 'bg-sun-400 text-navy' },
    { bar: 'bg-sky-300/45',  chip: 'bg-sky-500 text-white' },
  ];
  const CalendarMonthView = ({ items, endDate, closures = [], onToggleMonday, holidays = [] }) => {
    const hasItems = items && items.length > 0;
    const firstISO = hasItems ? items[0].date : todayISO();
    const lastISO  = hasItems ? items[items.length - 1].date : firstISO;
    const [view, setView] = React.useState(() => {
      const f = new Date(firstISO + 'T00:00:00');
      const t = new Date(todayISO() + 'T00:00:00');
      const last = new Date(lastISO + 'T00:00:00');
      const fMonth = new Date(f.getFullYear(), f.getMonth(), 1);
      if (t >= fMonth && t <= last) return new Date(t.getFullYear(), t.getMonth(), 1);
      return fMonth;
    });

    if (!hasItems) {
      return <div className="card p-6 text-sm text-navy-400">Enter a Lesson 1 start date below to render the calendar.</div>;
    }

    const lessonByDate = {}, breakByDate = {};
    items.forEach(it => {
      if (it.kind === 'lesson') lessonByDate[it.date] = it.number;
      else breakByDate[it.date] = { label: it.label || '', type: it.breakType === 'workshop' ? 'workshop' : 'break' };
    });
    const overrideByDate = {};
    (closures || []).forEach(c => { if (c && c.date) overrideByDate[c.date] = c.state; });
    // Split holidays (centre closed) from events (open, informational). Each renders a
    // different-coloured dot so users can spot both types at a glance.
    const holidayByDate = {};
    const eventByDate   = {};
    (holidays || []).forEach(h => {
      if (!h || !h.date) return;
      if (h.kind === 'event') eventByDate[h.date]   = h.label || '';
      else                    holidayByDate[h.date] = h.label || '';
    });

    const first    = new Date(firstISO + 'T00:00:00');
    const lastItem = new Date(lastISO + 'T00:00:00');
    const end      = endDate ? new Date(endDate + 'T00:00:00') : lastItem;
    const todayStr = todayISO();

    // Navigation bounds: first lesson month → one month past the last item.
    const minM = new Date(first.getFullYear(), first.getMonth(), 1);
    const maxM = new Date(lastItem.getFullYear(), lastItem.getMonth() + 1, 1);
    const atMin = view <= minM, atMax = view >= maxM;
    const step = (n) => {
      const d = new Date(view.getFullYear(), view.getMonth() + n, 1);
      if (d < minM || d > maxM) return;
      setView(d);
    };
    const goToday = () => {
      const t = new Date(todayStr + 'T00:00:00');
      let d = new Date(t.getFullYear(), t.getMonth(), 1);
      if (d < minM) d = new Date(minM); if (d > maxM) d = new Date(maxM);
      setView(d);
    };

    // Build full Saturday→Friday week rows covering the visible month.
    const vy = view.getFullYear(), vm = view.getMonth();
    const monthStart = new Date(vy, vm, 1);
    const back = (monthStart.getDay() + 1) % 7;       // days back to the week's Saturday
    const daysInMonth = new Date(vy, vm + 1, 0).getDate();
    const numWeeks = Math.ceil((back + daysInMonth) / 7);
    const weeks = [];
    const gridStart = new Date(vy, vm, 1 - back);
    for (let w = 0; w < numWeeks; w++) {
      const row = [];
      for (let i = 0; i < 7; i++) {
        row.push(new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + w * 7 + i));
      }
      weeks.push(row);
    }

    const Legend = ({ swatch, label }) => (
      <span className="inline-flex items-center gap-1.5 text-[11px] text-navy-500"><span className={`w-4 h-2.5 rounded-full ${swatch}`} />{label}</span>
    );
    const Dot = ({ color, label }) => (
      <span className="inline-flex items-center gap-1.5 text-[11px] text-navy-500"><span className={`w-2 h-2 rounded-full ${color}`} />{label}</span>
    );

    return (
      <div className="card p-5 sm:p-6">
        <div className="flex items-end justify-between gap-4 flex-wrap mb-4">
          <div>
            <div className="text-xs font-semibold uppercase tracking-wider text-leaf mb-1">Year at a glance</div>
            <h2 className="text-lg font-bold text-navy">Academic Calendar {MMT_CONFIG.ACADEMIC_LABEL ? `· ${MMT_CONFIG.ACADEMIC_LABEL}` : ''}</h2>
          </div>
          <div className="flex items-center gap-x-3 gap-y-1.5 flex-wrap">
            <Legend swatch="bg-sun-300" label="Lesson (odd)" />
            <Legend swatch="bg-sky-300" label="Lesson (even)" />
            <Legend swatch="bg-navy-200" label="Break" />
            <Legend swatch="bg-leaf-400" label="Workshop / Camp" />
            <Dot color="bg-red-400" label="Closed Mon" />
            <Dot color="bg-leaf-400" label="Open Mon" />
            <Dot color="bg-red-500 ring-2 ring-red-200" label="Holiday" />
            <Dot color="bg-sky-500 ring-2 ring-sky-200" label="Event" />
          </div>
        </div>

        <div className="max-w-xl mx-auto">
          {/* Month nav */}
          <div className="flex items-center justify-between mb-3">
            <button onClick={() => step(-1)} disabled={atMin} className="w-9 h-9 rounded-xl bg-white/70 border border-navy-100/70 flex items-center justify-center text-navy hover:bg-white disabled:opacity-30 disabled:cursor-not-allowed transition" aria-label="Previous month">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div className="text-center">
              <div className="font-bold text-navy text-base">{CAL_MONTHS[view.getMonth()]} <span className="text-navy-300 font-normal">{view.getFullYear()}</span></div>
              <button onClick={goToday} className="text-[11px] text-leaf hover:text-leaf-600 font-semibold">Jump to today</button>
            </div>
            <button onClick={() => step(1)} disabled={atMax} className="w-9 h-9 rounded-xl bg-white/70 border border-navy-100/70 flex items-center justify-center text-navy hover:bg-white disabled:opacity-30 disabled:cursor-not-allowed transition" aria-label="Next month">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>

          {/* Weekday header (Saturday first) */}
          <div className="grid grid-cols-7 gap-1 mb-1.5">
            {CAL_WEEKDAYS_SAT.map(w => (
              <div key={w} className={`text-[10px] font-semibold uppercase tracking-wide text-center ${w === 'Mon' ? 'text-red-300' : 'text-navy-300'}`}>{w}</div>
            ))}
          </div>

          {/* Week rows — each lesson week is one continuous streak */}
          <div className="space-y-0.5">
            {weeks.map((row, wi) => {
              const satISO = fmtDate(row[0]);
              const lessonN = lessonByDate[satISO];
              const brk = breakByDate[satISO];
              const isBreak = brk !== undefined;
              const isWorkshop = isBreak && brk.type === 'workshop';
              const tone = lessonN !== undefined ? STREAK_TONES[lessonN % 2 === 1 ? 0 : 1] : null;
              return (
                <div key={wi} className="relative pt-1 pb-4">
                  {/* streak bar behind the week */}
                  {(lessonN !== undefined) && <div className={`absolute left-0 right-0 bottom-1.5 h-2.5 rounded-full ${tone.bar}`} />}
                  {isBreak && <div className={`absolute left-0 right-0 bottom-1.5 h-2.5 rounded-full ${isWorkshop ? 'bg-leaf-300/55' : 'bg-navy-200/45'}`} />}
                  {/* day numbers */}
                  <div className="grid grid-cols-7 gap-1 relative">
                    {row.map((day, di) => {
                      const iso = fmtDate(day);
                      const inMonth = day.getMonth() === vm;
                      const isMon = day.getDay() === 1;
                      const withinYear = day >= first && day <= end;
                      const override = overrideByDate[iso];
                      const isHoliday = holidayByDate[iso] !== undefined;
                      const isEvent   = eventByDate[iso] !== undefined;
                      const closed = isHoliday ? true : (override === 'closed' ? true : override === 'open' ? false : (isMon && withinYear));
                      const openException = !isHoliday && isMon && withinYear && override === 'open';
                      const isToday = iso === todayStr;
                      const dayTitle = isHoliday
                        ? `${prettyDate(iso)} — Holiday${holidayByDate[iso] ? ': ' + holidayByDate[iso] : ''} (centre closed)`
                        : isEvent
                        ? `${prettyDate(iso)} — Event${eventByDate[iso] ? ': ' + eventByDate[iso] : ''} (centre open)`
                        : null;
                      return (
                        <div key={di}
                          onClick={isMon ? () => onToggleMonday && onToggleMonday(iso, withinYear) : undefined}
                          title={dayTitle || (isMon ? `${prettyDate(iso)} — ${closed ? 'Centre closed' : 'Open'} (click to ${closed ? 'open' : 'close'})` : (lessonN !== undefined ? `Lesson ${lessonN} week` : prettyDate(iso)))}
                          className={`relative h-6 flex items-center justify-center ${isMon ? 'cursor-pointer group' : ''}`}>
                          <span className={[
                            'text-[12px] leading-none w-6 h-6 flex items-center justify-center rounded-full transition',
                            inMonth ? 'text-navy-600' : 'text-navy-300/50',
                            closed && inMonth ? '!text-red-500 font-semibold' : '',
                            openException && inMonth ? '!text-leaf-600 font-semibold' : '',
                            isToday ? 'ring-2 ring-navy ring-offset-1' : '',
                            isMon ? 'group-hover:bg-navy-50' : '',
                          ].join(' ')}>{day.getDate()}</span>
                          {/* Day-level marker dot: holiday wins over event wins over Monday default. */}
                          {isHoliday && inMonth ? (
                            <span className="absolute top-0 right-0.5 w-1.5 h-1.5 rounded-full bg-red-500 ring-2 ring-red-200" />
                          ) : isEvent && inMonth ? (
                            <span className="absolute top-0 right-0.5 w-1.5 h-1.5 rounded-full bg-sky-500 ring-2 ring-sky-200" />
                          ) : (isMon && inMonth && (
                            <span className={`absolute top-0 right-0.5 w-1.5 h-1.5 rounded-full ${closed ? 'bg-red-400' : 'bg-leaf-400'}`} />
                          ))}
                        </div>
                      );
                    })}
                  </div>
                  {/* lesson / break tag pinned to the streak's left end */}
                  {lessonN !== undefined && (
                    <span className={`absolute left-0 bottom-0.5 h-3.5 px-1.5 rounded-full text-[9px] font-bold leading-none flex items-center shadow-sm ${tone.chip}`}>L{lessonN}</span>
                  )}
                  {isBreak && (
                    <span className={`absolute left-0 bottom-0.5 h-3.5 px-1.5 rounded-full text-[9px] font-semibold leading-none flex items-center shadow-sm ${isWorkshop ? 'bg-leaf-500 text-white' : 'bg-navy-300 text-navy-800'}`}>{brk.label || (isWorkshop ? 'Workshop' : 'Break')}</span>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        <p className="text-[11px] text-navy-400 mt-4 text-center max-w-xl mx-auto">
          The centre is closed every <strong className="text-navy-600">Monday</strong> through the final lesson{end ? ` (${prettyDate(fmtDate(end))})` : ''}. <strong className="text-navy-600">Click any Monday</strong> to open or close it — changes are saved when you press <strong className="text-navy-600">Save calendar</strong>.
        </p>
      </div>
    );
  };

  // ============================================================
  // ACADEMIC CALENDAR SETTINGS (admin)
  // ============================================================
  // Edit the academic-year calendar: year start, total lessons, and the list of break
  // weeks (workshop / holiday weeks where no lesson runs). Saves to the Settings tab in
  // the Sheet — anyone who reloads the portal will pick up the new values.
  const CalendarSettings = ({ onToast }) => {
    const [label, setLabel]               = React.useState(MMT_CONFIG.ACADEMIC_LABEL || '');
    const [yearStart, setYearStart]       = React.useState(MMT_CONFIG.ACADEMIC_YEAR_START || '');
    const [totalLessons, setTotalLessons] = React.useState(String(MMT_CONFIG.TOTAL_LESSONS || 36));
    const [breaks, setBreaks]             = React.useState(() => {
      const labels = MMT_CONFIG.ACADEMIC_BREAK_LABELS || {};
      const types = MMT_CONFIG.ACADEMIC_BREAK_TYPES || {};
      return (MMT_CONFIG.ACADEMIC_BREAKS || []).map(d => ({ date: d, label: labels[d] || '', type: types[d] || 'break' }));
    });
    const [saving, setSaving] = React.useState(false);
    const [confirmOverwrite, setConfirmOverwrite] = React.useState(false);
    // Per-Monday open/close overrides: [{ date, state:'open'|'closed' }]. Empty = pure default rule.
    const [closures, setClosures] = React.useState(() => (MMT_CONFIG.ACADEMIC_CLOSURES || []).map(c => ({ date: c.date, state: c.state })));
    // Holidays + events: [{ date, label, kind: 'holiday' | 'event' }]
    //   • holiday → centre closed that day (red dot)
    //   • event   → informational only, centre stays open (sky dot)
    // Multiple entries per week are allowed; each one gets its own dot on the calendar.
    const [holidays, setHolidays] = React.useState(() => (MMT_CONFIG.ACADEMIC_HOLIDAYS || []).map(h => ({ date: h.date, label: h.label || '', kind: h.kind === 'event' ? 'event' : 'holiday' })));

    // Toggle a Monday between open and closed. Stores an override only when it differs from
    // the default (Mondays inside the academic year are closed by default; outside, open).
    function toggleMonday(iso, withinYear) {
      setClosures(prev => {
        const existing = prev.find(c => c.date === iso);
        if (existing) return prev.filter(c => c.date !== iso); // clear override → back to default
        // No override yet: add one that flips the default.
        return [...prev, { date: iso, state: withinYear ? 'open' : 'closed' }];
      });
    }

    function addBreak() { setBreaks(bs => [...bs, { date: '', label: '', type: 'break' }]); }
    function removeBreak(idx) { setBreaks(bs => bs.filter((_, i) => i !== idx)); }
    function updateBreak(idx, field, value) {
      // Breaks are whole-week (Saturday-anchored). Snap any picked date to that week's
      // Saturday so the break always lands on the schedule and shows on the calendar.
      let v = value;
      if (field === 'date' && value) {
        const d = new Date(value + 'T00:00:00');
        if (!isNaN(d.getTime())) { d.setDate(d.getDate() - ((d.getDay() + 1) % 7)); v = fmtDate(d); }
      }
      setBreaks(bs => bs.map((b, i) => i === idx ? { ...b, [field]: v } : b));
    }
    function addHoliday(kind = 'holiday') { setHolidays(hs => [...hs, { date: '', label: '', kind }]); }
    function removeHoliday(idx) { setHolidays(hs => hs.filter((_, i) => i !== idx)); }
    function updateHoliday(idx, field, value) {
      setHolidays(hs => hs.map((h, i) => i === idx ? { ...h, [field]: value } : h));
    }
    function resetToSheet() {
      setLabel(MMT_CONFIG.ACADEMIC_LABEL || '');
      setYearStart(MMT_CONFIG.ACADEMIC_YEAR_START || '');
      setTotalLessons(String(MMT_CONFIG.TOTAL_LESSONS || 36));
      const labels = MMT_CONFIG.ACADEMIC_BREAK_LABELS || {};
      const types = MMT_CONFIG.ACADEMIC_BREAK_TYPES || {};
      setBreaks((MMT_CONFIG.ACADEMIC_BREAKS || []).map(d => ({ date: d, label: labels[d] || '', type: types[d] || 'break' })));
      setClosures((MMT_CONFIG.ACADEMIC_CLOSURES || []).map(c => ({ date: c.date, state: c.state })));
      setHolidays((MMT_CONFIG.ACADEMIC_HOLIDAYS || []).map(h => ({ date: h.date, label: h.label || '', kind: h.kind === 'event' ? 'event' : 'holiday' })));
    }

    // Build a preview of the lesson schedule using the in-progress form values.
    const preview = React.useMemo(() => {
      const warnings = [];
      const items = [];
      if (!yearStart) { warnings.push('Year start date is required.'); return { items, warnings }; }
      const total = parseInt(totalLessons, 10);
      if (isNaN(total) || total < 1) { warnings.push('Total lessons must be a positive number.'); return { items, warnings }; }

      const startD = new Date(yearStart + 'T00:00:00');
      if (isNaN(startD.getTime())) { warnings.push('Year start date is invalid.'); return { items, warnings }; }
      if (startD.getDay() !== 6) warnings.push('Year start should be a Saturday (got ' + DAY_NAMES[startD.getDay()] + ').');

      const breakSet = new Set();
      const breakLabels = {};
      const breakTypes = {};
      breaks.forEach(b => {
        const d = (b && b.date) ? String(b.date).trim() : '';
        if (!d) return;
        breakSet.add(d);
        breakLabels[d] = b.label || '';
        breakTypes[d] = b.type === 'workshop' ? 'workshop' : 'break';
        const bd = new Date(d + 'T00:00:00');
        if (!isNaN(bd.getTime()) && bd.getDay() !== 6) {
          warnings.push(`${b.type === 'workshop' ? 'Workshop' : 'Break'} week ${d} is a ${DAY_NAMES[bd.getDay()]}, not a Saturday.`);
        }
      });

      // Walk Saturdays from start. Emit a lesson or a break for each week. Keep going past
      // the final lesson if there are configured breaks/workshops AFTER it (e.g. July workshops
      // after Lesson 36), so those appear on the month calendar too.
      // `endDate` stays as the last LESSON Saturday — that's what the "Monday closed through
      // final lesson" default rule uses; weeks past that default to "flexible Mondays".
      const latestBreakISO = Array.from(breakSet).sort().reverse()[0] || null;
      const safetyCap = 80 + breaks.length;  // headroom for post-lesson breaks
      let lesson = 0;
      let lastLessonISO = '';
      let week = 0;
      const cur = new Date(startD);
      while (week < safetyCap) {
        const iso = fmtDate(cur);
        if (breakSet.has(iso)) {
          items.push({ kind: 'break', date: iso, label: breakLabels[iso] || '', breakType: breakTypes[iso] || 'break' });
        } else if (lesson < total) {
          lesson++;
          lastLessonISO = iso;
          items.push({ kind: 'lesson', number: lesson, date: iso });
        } else {
          // Past the final lesson AND this Saturday isn't a configured break — only keep
          // walking if there are still configured breaks AFTER this date.
          if (!latestBreakISO || iso > latestBreakISO) break;
        }
        cur.setDate(cur.getDate() + 7);
        week++;
      }
      if (lesson < total) warnings.push(`Only ${lesson} of ${total} lessons fit in ${safetyCap} weeks — check your break dates.`);
      const endDate = lastLessonISO || (items.length > 0 ? items[items.length - 1].date : '');
      return { items, warnings, endDate, lessonCount: lesson };
    }, [yearStart, totalLessons, breaks]);

    // Validate first, then ask for explicit confirmation before overwriting the schedule.
    function requestSave() {
      if (!yearStart) { onToast?.('Year start date is required.'); return; }
      const tl = parseInt(totalLessons, 10);
      if (isNaN(tl) || tl < 1) { onToast?.('Total lessons must be a positive number.'); return; }
      setConfirmOverwrite(true);
    }

    async function save() {
      setConfirmOverwrite(false); // close the popup immediately on Yes; the toast reports the result
      if (!yearStart) { onToast?.('Year start date is required.'); return; }
      const tl = parseInt(totalLessons, 10);
      if (isNaN(tl) || tl < 1) { onToast?.('Total lessons must be a positive number.'); return; }
      setSaving(true);
      // Normalize: drop empty break rows, sort by date.
      const cleanBreaks = breaks
        .filter(b => b && b.date && b.date.trim())
        .map(b => ({ date: String(b.date).trim(), label: String(b.label || '').trim(), type: b.type === 'workshop' ? 'workshop' : 'break' }))
        .sort((a, b) => a.date.localeCompare(b.date));
      const payload = {
        'academic.label':        String(label || '').trim(),
        'academic.yearStart':    String(yearStart).trim(),
        'academic.totalLessons': String(tl),
        'academic.breaks':       cleanBreaks,
        'academic.closures':     closures.filter(c => c && c.date).map(c => ({ date: String(c.date).trim(), state: c.state === 'closed' ? 'closed' : 'open' })),
        'academic.holidays':     holidays.filter(h => h && h.date && h.date.trim()).map(h => ({ date: String(h.date).trim(), label: String(h.label || '').trim(), kind: h.kind === 'event' ? 'event' : 'holiday' })).sort((a, b) => a.date.localeCompare(b.date)),
      };
      const result = await callBackend('updateSettings', payload);
      setSaving(false);
      if (result == null) { onToast?.('Save failed — could not reach backend.'); return; }
      // Apply locally so lesson numbers update everywhere without a page refresh.
      applySettingsToConfig(payload);
      onToast?.(`Calendar saved (${cleanBreaks.length} break week${cleanBreaks.length === 1 ? '' : 's'}).`);
    }

    return (
      <div className="space-y-6">
        <SectionHeader
          eyebrow="Admin"
          title="Academic Calendar"
          description="Configure the lesson schedule. Lesson numbers across the portal (attendance form, makeup requests, exports, dashboard drill-down) are derived from these values. Saved to the Sheet's Settings tab."
        />

        {/* Month-by-month calendar with lesson streaks, breaks, clickable Monday closures. */}
        <CalendarMonthView items={preview.items} endDate={preview.endDate} closures={closures} onToggleMonday={toggleMonday} holidays={holidays} />

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          {/* Left: editor form */}
          <div className="card p-5 grid gap-4">
            <div className="text-xs font-semibold uppercase tracking-wider text-leaf">Calendar editor</div>
            <div className="flex items-start gap-2.5 rounded-xl bg-sun-50 border border-sun-200 px-3.5 py-3 text-sm text-navy-700">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F0B429" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="flex-shrink-0 mt-0.5"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              <span><strong className="font-semibold">Heads up:</strong> saving here overwrites the current lesson numbers and schedule everywhere in the portal — attendance form, makeup requests, exports, and the dashboard.</span>
            </div>
            <div>
              <label className="label">Year label</label>
              <input className="input" placeholder="e.g. 2025-2026" value={label} onChange={(e)=>setLabel(e.target.value)} />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="label">Lesson 1 start (Saturday)</label>
                <input type="date" className="input" value={yearStart} onChange={(e)=>setYearStart(e.target.value)} />
              </div>
              <div>
                <label className="label">Total lessons</label>
                <input type="number" min="1" max="80" className="input" value={totalLessons} onChange={(e)=>setTotalLessons(e.target.value)} />
              </div>
            </div>

            <div>
              <div className="flex items-center justify-between mb-1.5">
                <label className="label !mb-0">Non-lesson weeks <span className="normal-case text-navy-400 font-normal">(Saturdays with no regular lesson)</span></label>
                <button onClick={addBreak} className="text-xs px-2 py-1 rounded-md bg-navy-50 text-navy-600 border border-navy-100 hover:bg-navy-100 transition">+ Add week</button>
              </div>
              {breaks.length === 0 ? (
                <div className="text-xs text-navy-400 py-2">No non-lesson weeks yet. Add winter break, Songkran, workshop or camp weeks here.</div>
              ) : (
                <ul className="grid gap-1.5">
                  {breaks.map((b, idx) => (
                    <li key={idx} className="flex gap-1.5 items-center flex-wrap">
                      <input type="date" className="input !py-1.5 text-sm" style={{maxWidth: '140px'}} value={b.date} onChange={(e)=>updateBreak(idx, 'date', e.target.value)} />
                      <select className="input !py-1.5 text-sm !w-auto" value={b.type || 'break'} onChange={(e)=>updateBreak(idx, 'type', e.target.value)}>
                        <option value="break">Break · no classes</option>
                        <option value="workshop">Workshop / Camp</option>
                      </select>
                      <input className="input !py-1.5 text-sm flex-1" style={{minWidth: '120px'}} placeholder="Label (e.g. Songkran)" value={b.label} onChange={(e)=>updateBreak(idx, 'label', e.target.value)} />
                      <button onClick={() => removeBreak(idx)} className="text-navy-300 hover:text-red-500 w-9 h-9 rounded-md hover:bg-red-50 flex items-center justify-center transition flex-shrink-0" aria-label="Remove week">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                      </button>
                    </li>
                  ))}
                </ul>
              )}
            </div>

            <div>
              <div className="flex items-center justify-between mb-1.5 flex-wrap gap-2">
                <label className="label !mb-0">Holidays &amp; events <span className="normal-case text-navy-400 font-normal">(any number per week)</span></label>
                <div className="flex gap-1.5">
                  <button onClick={() => addHoliday('holiday')} className="text-xs px-2 py-1 rounded-md bg-navy-50 text-navy-600 border border-navy-100 hover:bg-navy-100 transition">+ Holiday</button>
                  <button onClick={() => addHoliday('event')} className="text-xs px-2 py-1 rounded-md bg-sky-50 text-sky-600 border border-sky-100 hover:bg-sky-100 transition">+ Event</button>
                </div>
              </div>
              <p className="text-[11px] text-navy-400 mb-1.5">Holidays close the centre that day · Events are informational and the centre stays open.</p>
              {holidays.length === 0 ? (
                <div className="text-xs text-navy-400 py-2">No holidays or events yet. Add as many as you like — they can stack within the same week.</div>
              ) : (
                <ul className="grid gap-1.5">
                  {holidays.map((h, idx) => (
                    <li key={idx} className="flex gap-1.5 items-center flex-wrap">
                      <input type="date" className="input !py-1.5 text-sm" style={{maxWidth: '140px'}} value={h.date} onChange={(e)=>updateHoliday(idx, 'date', e.target.value)} />
                      <select className="input !py-1.5 text-sm !w-auto" value={h.kind || 'holiday'} onChange={(e)=>updateHoliday(idx, 'kind', e.target.value)}>
                        <option value="holiday">Holiday · closed</option>
                        <option value="event">Event · open</option>
                      </select>
                      <input className="input !py-1.5 text-sm flex-1" style={{minWidth: '120px'}} placeholder="Label (e.g. King's Birthday)" value={h.label} onChange={(e)=>updateHoliday(idx, 'label', e.target.value)} />
                      <button onClick={() => removeHoliday(idx)} className="text-navy-300 hover:text-red-500 w-9 h-9 rounded-md hover:bg-red-50 flex items-center justify-center transition flex-shrink-0" aria-label="Remove">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                      </button>
                    </li>
                  ))}
                </ul>
              )}
            </div>

            <div className="flex justify-end gap-2 pt-2 border-t border-navy-50">
              <button onClick={resetToSheet} className="btn-ghost" disabled={saving}>Reset</button>
              <button onClick={requestSave} className="btn-primary" disabled={saving}>{saving ? 'Saving…' : 'Save calendar'}</button>
            </div>
          </div>

          {/* Right: preview / verify */}
          <div className="card p-5">
            <div className="flex items-center justify-between mb-1">
              <div className="text-xs font-semibold uppercase tracking-wider text-leaf">Preview</div>
              <div className="text-xs text-navy-400">{preview.lessonCount ?? 0} / {totalLessons} lessons</div>
            </div>
            <p className="text-xs text-navy-500 mb-3">
              Scroll the schedule below to verify each lesson lands on the right Saturday before you save.
            </p>
            {preview.warnings.length > 0 && (
              <div className="text-xs bg-sun-50 border border-sun-200 rounded-md p-2.5 mb-3">
                {preview.warnings.map((w, i) => <div key={i} className="text-navy-700">⚠ {w}</div>)}
              </div>
            )}
            <ul className="max-h-[400px] overflow-y-auto rounded-md border border-navy-50 divide-y divide-navy-50 text-sm">
              {preview.items.map((it, i) => (
                it.kind === 'lesson' ? (
                  <li key={i} className="px-3 py-1.5 flex items-center justify-between gap-2 bg-white">
                    <span className="font-medium text-navy">Lesson {it.number}</span>
                    <span className="text-navy-500 tabular-nums text-xs">{prettyDate(it.date)}</span>
                  </li>
                ) : (
                  <li key={i} className="px-3 py-1.5 flex items-center justify-between gap-2 bg-navy-50/30">
                    <span className="text-xs text-navy-500 italic">— Break —{it.label ? ` ${it.label}` : ''}</span>
                    <span className="text-navy-400 tabular-nums text-xs">{prettyDate(it.date)}</span>
                  </li>
                )
              ))}
              {preview.items.length === 0 && (
                <li className="px-3 py-3 text-xs text-navy-400">Enter a year start date to see the preview.</li>
              )}
            </ul>
          </div>
        </div>

        {/* Overwrite confirmation before committing the new schedule to the Sheet. */}
        <ConfirmDialog
          open={confirmOverwrite}
          tone="sun"
          busy={saving}
          icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>}
          title="Overwrite the current schedule?"
          intro="This recalculates lesson numbers across the entire portal. The existing lesson numbers and schedule will be replaced."
          confirmLabel="Yes, overwrite & save"
          cancelLabel="No, keep current"
          onCancel={() => setConfirmOverwrite(false)}
          onConfirm={save}
        >
          <div className="rounded-xl bg-white/60 border border-navy-100/70 divide-y divide-navy-50 text-sm">
            <div className="px-3.5 py-2 flex items-center justify-between"><span className="text-navy-400">Year</span><span className="font-semibold text-navy">{label || '—'}</span></div>
            <div className="px-3.5 py-2 flex items-center justify-between"><span className="text-navy-400">Lessons</span><span className="font-semibold text-navy">{preview.lessonCount ?? 0} of {totalLessons}</span></div>
            <div className="px-3.5 py-2 flex items-center justify-between"><span className="text-navy-400">Schedule ends</span><span className="font-semibold text-navy">{preview.endDate ? prettyDate(preview.endDate) : '—'}</span></div>
            <div className="px-3.5 py-2 flex items-center justify-between"><span className="text-navy-400">Break weeks</span><span className="font-semibold text-navy">{breaks.filter(b => b && b.date && b.date.trim()).length}</span></div>
            <div className="px-3.5 py-2 flex items-center justify-between"><span className="text-navy-400">Monday overrides</span><span className="font-semibold text-navy">{closures.filter(c => c && c.date).length}</span></div>
            <div className="px-3.5 py-2 flex items-center justify-between"><span className="text-navy-400">Holidays / events</span><span className="font-semibold text-navy">{holidays.filter(h => h && h.date && h.date.trim() && (h.kind || 'holiday') === 'holiday').length} / {holidays.filter(h => h && h.date && h.date.trim() && h.kind === 'event').length}</span></div>
          </div>
          {preview.warnings.length > 0 && (
            <div className="mt-2.5 text-xs bg-sun-50 border border-sun-200 rounded-xl p-2.5 text-navy-700">
              {preview.warnings.map((w, i) => <div key={i}>⚠ {w}</div>)}
            </div>
          )}
        </ConfirmDialog>
      </div>
    );
  };

  // ============================================================
  // APP SHELL — state + routing + modal + persistence
  // ============================================================
  const App = () => {
    // ===== All hooks declared up front (Rules of Hooks: same order every render) =====

    // Auth: if there's a valid session token in localStorage, skip the login screen.
    // BACKEND_ENABLED off bypasses login (useful for local-only demo testing).
    const [authToken, setAuthToken] = React.useState(() => MMT_CONFIG.BACKEND_ENABLED ? getSessionToken() : 'no-backend');

    // Hydrate from localStorage if present, else use seed data.
    const initial = storage.load();
    const [route, setRoute]             = React.useState('dashboard');
    const [filter, setFilter]           = React.useState('all');
    const [requests, setRequests]       = React.useState(() => initial?.requests   ?? SEED_REQUESTS);
    const [attendance, setAttendance]   = React.useState(() => initial?.attendance ?? SEED_RECENT_ATTENDANCE);
    const [modalOpen, setModalOpen]     = React.useState(false);
    const [editingRequest, setEditingRequest] = React.useState(null);
    const [toast, setToast]             = React.useState(null);
    const [, bump] = React.useReducer(x => x + 1, 0);

    // Hide the splash on first render, regardless of auth state, so the user always
    // sees either the LoginScreen or the main UI (never a stuck "Loading portal…").
    React.useEffect(() => {
      const s = document.getElementById('splash');
      if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 300); }
    }, []);

    // Persist on every meaningful change. (Tracker is now derived from attendance — no state to save.)
    React.useEffect(() => {
      storage.save({ requests, attendance });
    }, [requests, attendance]);

    // Cross-device sync: hydrate from the Apps Script backend on mount/login, on tab-focus,
    // and on a slow background poll (30s). The poll skips refreshing while any write
    // is in-flight so a fetched snapshot can't clobber an optimistic local change.
    // Skips entirely until the user is authenticated.
    React.useEffect(() => {
      if (!authToken) return;
      if (!MMT_CONFIG.BACKEND_ENABLED || !MMT_CONFIG.APPS_SCRIPT_URL) return;
      let cancelled = false;

      async function refresh(initial) {
        // Don't refresh while writes are in flight — would overwrite local changes
        // with a not-yet-up-to-date server snapshot.
        if (!initial && window.__mmtPendingWrites && window.__mmtPendingWrites() > 0) return;
        try {
          // Roster (classes + students) and Settings (academic calendar) are only fetched
          // on initial load. After mount, local mutations are pushed straight to the backend.
          // No need to re-pull every 30 s — saves quota.
          const promises = [callBackend('listMakeups'), callBackend('listAttendance')];
          if (initial) {
            promises.push(callBackend('listClasses'));
            promises.push(callBackend('listStudents'));
            promises.push(callBackend('listSettings'));
          }
          const results = await Promise.all(promises);
          if (cancelled) return;

          const serverMakeups    = results[0];
          const serverAttendance = results[1];
          const serverClasses    = initial ? results[2] : null;
          const serverStudents   = initial ? results[3] : null;
          const serverSettings   = initial ? results[4] : null;

          // Apply academic-calendar settings BEFORE any lesson-number computation downstream.
          if (initial && serverSettings && typeof serverSettings === 'object') {
            applySettingsToConfig(serverSettings);
          }

          // Normalize date/time fields so the portal always renders clean strings even
          // if the backend sends ISO timestamps or JS Date.toString().
          if (Array.isArray(serverMakeups)) {
            setRequests(serverMakeups.map(r => ({
              ...r,
              missedDate:   toISODate(r.missedDate),
              proposedDate: toISODate(r.proposedDate),
              proposedTime: toHHMM(r.proposedTime),
            })));
          }
          if (Array.isArray(serverAttendance)) {
            setAttendance(serverAttendance.map(r => ({
              ...r,
              date: toISODate(r.date),
            })));
          }

          // Apply roster from Sheet, if the backend returned any.
          // Empty arrays mean "Sheet has no roster yet" — keep the in-memory defaults.
          if (Array.isArray(serverClasses) && serverClasses.length > 0) {
            window.CLASSES.length = 0;
            serverClasses.forEach(c => {
              // Sheets auto-stores '15:30' as a time value; reading it back gives a JS
              // Date string like 'Sat Dec 30 1899 15:30:00 GMT+0642'. Normalize to HH:MM.
              const cleanTime = toHHMM(c.time);
              const slot = c.day && cleanTime ? `${c.day} ${cleanTime}` : (c.slot || '');
              window.CLASSES.push({
                id: c.id,
                name: c.name || c.id,
                teacher: c.teacher || '',
                slot: slot,
                day: c.day || '',
                time: cleanTime,
              });
            });
          }
          if (Array.isArray(serverStudents) && serverStudents.length > 0) {
            // Clear and rebuild the by-class index + full-name map.
            Object.keys(window.STUDENTS_BY_CLASS).forEach(k => delete window.STUDENTS_BY_CLASS[k]);
            Object.keys(window.FULL_NAME_BY_NICK).forEach(k => delete window.FULL_NAME_BY_NICK[k]);
            for (const s of serverStudents) {
              if (!s.nickname) continue;
              if (s.primaryClassId) {
                if (!window.STUDENTS_BY_CLASS[s.primaryClassId]) window.STUDENTS_BY_CLASS[s.primaryClassId] = [];
                if (!window.STUDENTS_BY_CLASS[s.primaryClassId].includes(s.nickname)) {
                  window.STUDENTS_BY_CLASS[s.primaryClassId].push(s.nickname);
                }
              }
              if (s.fullName) window.FULL_NAME_BY_NICK[s.nickname] = s.fullName;
            }
          }
          if (initial && (serverClasses || serverStudents || serverSettings)) bump(); // re-render so roster + calendar UI update

          if (initial) showToast('Synced with Google Sheet.');
        } catch (err) {
          if (initial) showToast('Backend unreachable — using local copy.');
          console.warn('Backend fetch failed:', err);
        }
      }

      refresh(true);
      const onVisibility = () => { if (document.visibilityState === 'visible') refresh(false); };
      document.addEventListener('visibilitychange', onVisibility);
      // Auto-refresh every 30 seconds while the tab is visible.
      const pollId = setInterval(() => {
        if (document.visibilityState === 'visible') refresh(false);
      }, 30000);
      return () => {
        cancelled = true;
        document.removeEventListener('visibilitychange', onVisibility);
        clearInterval(pollId);
      };
    /* eslint-disable-next-line */ }, [authToken]);

    function addStudent({ nickname, fullName, classId }) {
      if (!STUDENTS_BY_CLASS[classId]) STUDENTS_BY_CLASS[classId] = [];
      STUDENTS_BY_CLASS[classId].push(nickname);
      if (fullName) FULL_NAME_BY_NICK[nickname] = fullName;
      bump();
      callBackend('addStudent', { nickname, fullName, classId });
    }
    function removeStudent(classId, nickname) {
      if (STUDENTS_BY_CLASS[classId]) {
        STUDENTS_BY_CLASS[classId] = STUDENTS_BY_CLASS[classId].filter(s => s !== nickname);
      }
      bump();
      showToast(`Removed ${nickname} from ${classId}.`);
      callBackend('removeStudent', { classId, nickname });
    }
    function moveStudent(nickname, fromClass, toClass) {
      if (fromClass === toClass) return;
      if (STUDENTS_BY_CLASS[fromClass]) {
        STUDENTS_BY_CLASS[fromClass] = STUDENTS_BY_CLASS[fromClass].filter(s => s !== nickname);
      }
      if (!STUDENTS_BY_CLASS[toClass]) STUDENTS_BY_CLASS[toClass] = [];
      if (!STUDENTS_BY_CLASS[toClass].includes(nickname)) STUDENTS_BY_CLASS[toClass].push(nickname);
      bump();
      showToast(`Moved ${nickname}: ${fromClass} → ${toClass}.`);
      callBackend('moveStudent', { nickname, fromClass, toClass });
    }
    function addClass(cls) {
      CLASSES.push(cls);
      // Keep CLASSES sorted by day-of-week, then time, then id — matches dropdown order.
      CLASSES.sort((a, b) => {
        const dayDiff = (DAY_ORDER[a.day] ?? 99) - (DAY_ORDER[b.day] ?? 99);
        if (dayDiff !== 0) return dayDiff;
        const timeDiff = (a.time || '').localeCompare(b.time || '');
        if (timeDiff !== 0) return timeDiff;
        return (a.id || '').localeCompare(b.id || '');
      });
      STUDENTS_BY_CLASS[cls.id] = STUDENTS_BY_CLASS[cls.id] ?? [];
      bump();
      callBackend('addClass', cls);
    }
    function removeClass(classId) {
      const idx = CLASSES.findIndex(c => c.id === classId);
      if (idx >= 0) CLASSES.splice(idx, 1);
      delete STUDENTS_BY_CLASS[classId];
      bump();
      showToast(`Removed class ${classId}.`);
      callBackend('removeClass', { classId });
    }

    const toastTimer = React.useRef(null);
    function showToast(msg) {
      setToast(msg);
      if (toastTimer.current) clearTimeout(toastTimer.current);
      toastTimer.current = setTimeout(() => setToast(null), 2800);
    }

    function navigate(r, f = null) {
      setRoute(r);
      if (f) setFilter(f); else if (r !== 'makeup') setFilter('all');
      if (typeof window !== 'undefined') window.scrollTo({ top: 0 });
    }

    function updateRequest(id, patch) {
      setRequests(rs => rs.map(r => r.id === id ? { ...r, ...patch } : r));
      if (patch.teacherConfirmed)          showToast('Teacher confirmed.');
      else if (patch.adminApproved)        showToast('Admin manager approved — add to Google Calendar next.');
      else if (patch.calendarEventCreated) showToast('Marked as scheduled. All done!');
      callBackend('updateMakeup', { id, updates: patch });
    }

    function addRequest(form) {
      // Reject duplicate: same student + same missed date already has a request.
      const dup = requests.find(r =>
        r.studentNickname === form.studentNickname &&
        toISODate(r.missedDate) === toISODate(form.missedDate)
      );
      if (dup) {
        setModalOpen(false);
        setEditingRequest(null);
        showToast(`${form.studentNickname} already has a makeup request for ${prettyDate(form.missedDate)} (${dup.id}). No duplicate created.`);
        navigate('makeup', 'all');
        return;
      }
      const nextNum = requests.reduce((m, r) => Math.max(m, parseInt(r.id.replace(/\D/g, ''), 10) || 0), 0) + 1;
      const newReq = {
        id: 'MR-' + String(nextNum).padStart(4, '0'),
        ...form,
        teacherConfirmed: false,
        adminApproved: false,
        calendarEventCreated: false,
      };
      setRequests(rs => [newReq, ...rs]);
      setModalOpen(false);
      setEditingRequest(null);
      showToast(`Request ${newReq.id} created — pending ${newReq.teacher}'s confirmation.`);
      navigate('makeup', 'pending-teacher');
      callBackend('createMakeup', newReq);
    }

    function editRequest(form) {
      if (!editingRequest?.id) return;
      const id = editingRequest.id;
      setRequests(rs => rs.map(r => r.id === id ? { ...r, ...form } : r));
      setModalOpen(false);
      setEditingRequest(null);
      showToast(`Request ${id} updated.`);
      callBackend('updateMakeup', { id, updates: form });
    }

    function openEditRequest(req) {
      setEditingRequest(req);
      setModalOpen(true);
    }

    // Opens the makeup-request modal pre-filled from an absence attendance row.
    // No id is set, so on submit the modal calls addRequest (creating a new MR).
    function openCreateFromAbsence(absence) {
      const cls = CLASSES.find(c => c.id === absence.classId);
      const lesson = lessonNumberFor(absence.date);
      setEditingRequest({
        // No id → treated as a brand new request, but with fields pre-filled.
        studentNickname: absence.studentNickname,
        classId: absence.classId,
        teacher: cls?.teacher || '',
        missedDate: toISODate(absence.date),
        lesson: lesson != null ? lesson : '',
        proposedDate: todayISO(),
        proposedTime: '10:00',
        reason: '',
        notes: '',
      });
      setModalOpen(true);
    }

    function removeRequest(req) {
      if (!window.confirm(`Delete makeup request ${req.id} for ${req.studentNickname}? This cannot be undone.`)) return;
      setRequests(rs => rs.filter(r => r.id !== req.id));
      showToast(`Request ${req.id} deleted.`);
      callBackend('removeMakeup', { id: req.id });
    }

    function closeModal() {
      setModalOpen(false);
      setEditingRequest(null);
    }

    function updateAttendance(id, patch) {
      const target = attendance.find(r => r.id === id);
      if (!target) return;
      setAttendance(a => a.map(r => r.id === id ? { ...r, ...patch } : r));
      showToast(`Updated ${target.studentNickname} (${target.classId}).`);
      callBackend('updateAttendance', { id, updates: patch });
    }

    function removeAttendance(row) {
      if (!window.confirm(`Delete attendance entry for ${row.studentNickname} on ${row.date} (${row.classId})?`)) return;
      setAttendance(a => a.filter(r => r.id !== row.id));
      showToast(`Deleted attendance for ${row.studentNickname}.`);
      callBackend('removeAttendance', { id: row.id });
    }

    function logSession(rows) {
      if (!rows || rows.length === 0) return;
      // Dedupe: skip rows whose (date, classId, studentNickname) already exists in attendance.
      // This is what lets a teacher come back to add a forgotten trial student without re-logging
      // everyone else in the class.
      const existingKeys = new Set(
        attendance.map(a => `${toISODate(a.date)}|${a.classId}|${a.studentNickname}`)
      );
      const newRows = [];
      const skipped = [];
      for (const r of rows) {
        const key = `${toISODate(r.date)}|${r.classId}|${r.studentNickname}`;
        if (existingKeys.has(key)) { skipped.push(r.studentNickname); continue; }
        newRows.push(r);
      }
      if (newRows.length === 0) {
        showToast(`All ${rows.length} student${rows.length === 1 ? '' : 's'} already logged for this class on this date.`);
        return;
      }
      setAttendance(a => [...newRows, ...a]);
      callBackend('createAttendance', { rows: newRows });
      if (skipped.length > 0) {
        showToast(`Logged ${newRows.length} new · skipped ${skipped.length} duplicate${skipped.length === 1 ? '' : 's'} (${skipped.slice(0, 3).join(', ')}${skipped.length > 3 ? '…' : ''}).`);
      } else {
        showToast(`Logged ${newRows.length} attendance row${newRows.length === 1 ? '' : 's'}.`);
      }
    }

    // Headcount = derived entirely from attendance log (not approval status).
    //   • Expected = current roster size for the class
    //   • Actual   = students marked Present in this week's attendance for the class
    //   • Makeups  = "Makeup attendee" rows attributed to that teacher in this week (regular-class slot)
    //   • Trials   = "Trial" rows in this week (regular-class slot)
    //   • Workshop = "Workshop attendee" rows in this week (workshop slot)
    //   • Extra teacher-level rows for off-schedule makeups and workshops
    const headcountRows = React.useMemo(() => {
      const inWeek = (d) => d >= HEADCOUNT_WEEK.start && d <= HEADCOUNT_WEEK.end;

      // Aggregate weekly attendance per (classId, teacher) bucket.
      const buckets = {}; // key = `${classId}|${teacher}` → { present, makeups, trials, workshops }
      for (const a of attendance) {
        if (!inWeek(a.date)) continue;
        const teacher = a.teacher
          || (CLASSES.find(c => c.id === a.classId)?.teacher)
          || 'UNASSIGNED';
        const key = `${a.classId}|${teacher}`;
        if (!buckets[key]) buckets[key] = { classId: a.classId, teacher, present: 0, makeups: 0, trials: 0, workshops: 0 };
        if      (a.status === 'Present')           buckets[key].present++;
        else if (a.status === 'Makeup attendee')   buckets[key].makeups++;
        else if (a.status === 'Trial')             buckets[key].trials++;
        else if (a.status === 'Workshop attendee') buckets[key].workshops++;
      }

      const rows = [];

      // One row per regular class.
      for (const cls of CLASSES) {
        const key = `${cls.id}|${cls.teacher}`;
        const b = buckets[key] ?? { present: 0, makeups: 0, trials: 0, workshops: 0 };
        const expected = (STUDENTS_BY_CLASS[cls.id] ?? []).length;
        rows.push({
          classId: cls.id,
          className: cls.name,
          teacher: cls.teacher,
          expected,
          actual:   b.present,
          makeups:  b.makeups,
          trials:   b.trials,
          workshops: 0, // workshops never happen during a regular slot
          total: b.present + b.makeups + b.trials,
          isSpecial: false,
        });
      }

      // Extra row per teacher for off-schedule makeups / trial walk-ins / workshops (if any in week).
      const offByTeacher = {};
      const trialByTeacher = {};
      const workshopByTeacher = {};
      for (const key in buckets) {
        const b = buckets[key];
        if (b.classId === OFF_SCHEDULE_ID && b.makeups > 0) {
          offByTeacher[b.teacher] = (offByTeacher[b.teacher] ?? 0) + b.makeups;
        }
        if (b.classId === TRIAL_ID && b.trials > 0) {
          trialByTeacher[b.teacher] = (trialByTeacher[b.teacher] ?? 0) + b.trials;
        }
        if (b.classId === WORKSHOP_ID && b.workshops > 0) {
          workshopByTeacher[b.teacher] = (workshopByTeacher[b.teacher] ?? 0) + b.workshops;
        }
      }
      for (const teacher of Object.keys(offByTeacher).sort()) {
        const n = offByTeacher[teacher];
        rows.push({
          classId: OFF_SCHEDULE_ID,
          className: 'Off-schedule makeups',
          teacher, expected: 0, actual: 0,
          makeups: n, trials: 0, workshops: 0,
          total: n,
          isSpecial: true,
        });
      }
      for (const teacher of Object.keys(trialByTeacher).sort()) {
        const n = trialByTeacher[teacher];
        rows.push({
          classId: TRIAL_ID,
          className: 'Trial walk-ins',
          teacher, expected: 0, actual: 0,
          makeups: 0, trials: n, workshops: 0,
          total: n,
          isSpecial: true,
        });
      }
      for (const teacher of Object.keys(workshopByTeacher).sort()) {
        const n = workshopByTeacher[teacher];
        rows.push({
          classId: WORKSHOP_ID,
          className: 'Workshops',
          teacher, expected: 0, actual: 0,
          makeups: 0, trials: 0, workshops: n,
          total: n,
          isSpecial: true,
        });
      }

      return rows;
    }, [attendance]);

    // ===== Render: all hooks declared above. Conditional UI from here down. =====

    function signOut() {
      // Best-effort server-side revoke; even if it fails, clear the local token.
      callBackend('logout', {});
      clearSessionToken();
      setAuthToken(null);
    }

    // Auth gate: render the login screen if no valid session token is present.
    if (!authToken) {
      return <LoginScreen onSuccess={(t) => setAuthToken(t)} />;
    }

    let screen;
    if (route === 'dashboard') {
      screen = <Dashboard requests={requests} attendance={attendance} onNavigate={navigate} onNewRequest={() => { setEditingRequest(null); setModalOpen(true); }} onCreateFromAbsence={openCreateFromAbsence} />;
    } else if (route === 'makeup') {
      screen = <MakeupList requests={requests} attendance={attendance} initialFilter={filter} onUpdateRequest={updateRequest} onEditRequest={openEditRequest} onDeleteRequest={removeRequest} onNewRequest={() => { setEditingRequest(null); setModalOpen(true); }} onToast={showToast} />;
    } else if (route === 'attendance') {
      screen = <Attendance recent={attendance} onLogSession={logSession} onUpdateAttendance={updateAttendance} onDeleteAttendance={removeAttendance} onToast={showToast} />;
    } else if (route === 'headcount') {
      screen = <Headcount headcountRows={headcountRows} attendance={attendance} onToast={showToast} />;
    } else if (route === 'roster') {
      screen = <Roster
        onAddStudent={addStudent}
        onAddClass={addClass}
        onRemoveStudent={removeStudent}
        onMoveStudent={moveStudent}
        onRemoveClass={removeClass}
        onToast={showToast}
      />;
    } else if (route === 'calendar') {
      screen = <CalendarSettings onToast={showToast} />;
    }

    return (
      <Frame>
        <Nav active={route} onNavigate={navigate} onNewRequest={() => { setEditingRequest(null); setModalOpen(true); }} onSignOut={signOut} />
        <main className="max-w-6xl w-full mx-auto px-4 sm:px-6 py-8 flex-1">{screen}</main>
        <footer className="max-w-6xl w-full mx-auto px-4 sm:px-6 py-8 text-center text-xs text-navy-300">
          Math Mavens Thailand · Internal portal · The Sheet remains the source of truth.
        </footer>

        {modalOpen && <MakeupModal initial={editingRequest} onSubmit={editingRequest?.id ? editRequest : addRequest} onClose={closeModal} />}
        <Toast toast={toast} />
      </Frame>
    );
  };

  // Mount.
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
